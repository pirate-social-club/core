# Proposed workflow for the standalone `pirate-contracts` repository.

name: contracts-ci

on:
  pull_request:
    paths:
      - ".github/workflows/contracts-ci.yml"
      - "story/delivery/**"
      - "story/scrobble/**"
  push:
    paths:
      - ".github/workflows/contracts-ci.yml"
      - "story/delivery/**"
      - "story/scrobble/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delivery:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: story/delivery

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build delivery contracts
        run: forge build

      - name: Test delivery contracts
        run: forge test -vv

  scrobble:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: story/scrobble

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build scrobble contracts
        run: forge build

      - name: Test scrobble contracts
        run: forge test -vv
