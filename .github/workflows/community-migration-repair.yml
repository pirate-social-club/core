name: community-migration-repair

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Remote environment to inspect or repair"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      execute:
        description: "Apply safe repairs and missing migrations"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-egress-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          egress-rules: egress-rules.yaml
          warn: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  repair:
    runs-on: ubuntu-latest
    needs: dependency-egress-audit
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit lockfile
        run: npm audit --audit-level=high --package-lock-only

      - name: Fetch migration secrets
        env:
          INFISICAL_IDENTITY_ID: ${{ inputs.environment == 'prod' && '3141c3e2-a32c-4299-9382-c2684d11fe06' || 'ddbd02c6-359a-42c1-9cb7-d4ed0eb86be7' }}
          INFISICAL_PROJECT_ID: 5acea78e-7813-4d8a-b29c-9b862a0b1c71
          INFISICAL_ENV: ${{ inputs.environment }}
          INFISICAL_SECRET_PATH: /services/api
          SECRET_NAMES: CONTROL_PLANE_DATABASE_URL TURSO_COMMUNITY_DB_WRAP_KEY
        run: scripts/ci/fetch-infisical-secrets.sh

      - name: Verify required secrets
        run: |
          test -n "$CONTROL_PLANE_DATABASE_URL"
          test -n "$TURSO_COMMUNITY_DB_WRAP_KEY"

      - name: Inspect or repair community migration drift
        run: |
          if [ "${{ inputs.execute }}" = "true" ]; then
            bun scripts/community/repair-community-migration-ledger.ts --execute
          else
            bun scripts/community/repair-community-migration-ledger.ts
          fi
