name: community-migration-repair

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Remote environment to inspect or repair"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      execute:
        description: "Apply safe repairs and missing migrations"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-egress-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          egress-rules: egress-rules.yaml
          warn: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  repair:
    runs-on: ubuntu-latest
    needs: dependency-egress-audit
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit lockfile
        run: npm audit --audit-level=high --package-lock-only

      - name: Load staging migration secrets
        if: ${{ inputs.environment == 'staging' }}
        env:
          STAGING_CONTROL_PLANE_DATABASE_URL: ${{ secrets.STAGING_CONTROL_PLANE_DATABASE_URL }}
          STAGING_TURSO_COMMUNITY_DB_WRAP_KEY: ${{ secrets.STAGING_TURSO_COMMUNITY_DB_WRAP_KEY }}
        run: |
          echo "::add-mask::$STAGING_CONTROL_PLANE_DATABASE_URL"
          echo "::add-mask::$STAGING_TURSO_COMMUNITY_DB_WRAP_KEY"
          {
            printf 'CONTROL_PLANE_DATABASE_URL=%s\n' "$STAGING_CONTROL_PLANE_DATABASE_URL"
            printf 'TURSO_COMMUNITY_DB_WRAP_KEY=%s\n' "$STAGING_TURSO_COMMUNITY_DB_WRAP_KEY"
          } >> "$GITHUB_ENV"

      - name: Fetch production migration secrets
        if: ${{ inputs.environment == 'prod' }}
        env:
          INFISICAL_IDENTITY_ID: 3141c3e2-a32c-4299-9382-c2684d11fe06
          INFISICAL_PROJECT_ID: 5acea78e-7813-4d8a-b29c-9b862a0b1c71
        run: |
          set -euo pipefail

          oidc_response="$(
            curl -fsS \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fgithub.com%2Fpirate-social-club"
          )"
          oidc_token="$(
            OIDC_RESPONSE="$oidc_response" node -e 'const response = JSON.parse(process.env.OIDC_RESPONSE); if (!response.value) process.exit(1); process.stdout.write(response.value);'
          )"
          login_payload="$(
            INFISICAL_IDENTITY_ID="$INFISICAL_IDENTITY_ID" OIDC_TOKEN="$oidc_token" node -e 'process.stdout.write(JSON.stringify({ identityId: process.env.INFISICAL_IDENTITY_ID, jwt: process.env.OIDC_TOKEN }));'
          )"
          infisical_token="$(
            curl -fsS \
              -X POST "https://app.infisical.com/api/v1/auth/oidc-auth/login" \
              -H "Content-Type: application/json" \
              --data "$login_payload" \
              | node -e 'let input = ""; process.stdin.on("data", (chunk) => input += chunk); process.stdin.on("end", () => { const response = JSON.parse(input); if (!response.accessToken) process.exit(1); process.stdout.write(response.accessToken); });'
          )"

          fetch_secret() {
            local name="$1"
            curl -fsS --get "https://app.infisical.com/api/v4/secrets/$name" \
              -H "Authorization: Bearer $infisical_token" \
              --data-urlencode "projectId=$INFISICAL_PROJECT_ID" \
              --data-urlencode "environment=prod" \
              --data-urlencode "secretPath=/services/api" \
              --data-urlencode "type=shared" \
              --data-urlencode "viewSecretValue=true" \
              --data-urlencode "expandSecretReferences=true" \
              --data-urlencode "includeImports=false" \
              | node -e 'let input = ""; process.stdin.on("data", (chunk) => input += chunk); process.stdin.on("end", () => { const response = JSON.parse(input); const value = response.secret && response.secret.secretValue; if (!value) process.exit(1); process.stdout.write(value); });'
          }

          CONTROL_PLANE_DATABASE_URL="$(fetch_secret CONTROL_PLANE_DATABASE_URL)"
          TURSO_COMMUNITY_DB_WRAP_KEY="$(fetch_secret TURSO_COMMUNITY_DB_WRAP_KEY)"
          echo "::add-mask::$CONTROL_PLANE_DATABASE_URL"
          echo "::add-mask::$TURSO_COMMUNITY_DB_WRAP_KEY"
          {
            printf 'CONTROL_PLANE_DATABASE_URL=%s\n' "$CONTROL_PLANE_DATABASE_URL"
            printf 'TURSO_COMMUNITY_DB_WRAP_KEY=%s\n' "$TURSO_COMMUNITY_DB_WRAP_KEY"
          } >> "$GITHUB_ENV"

      - name: Verify required secrets
        run: |
          test -n "$CONTROL_PLANE_DATABASE_URL"
          test -n "$TURSO_COMMUNITY_DB_WRAP_KEY"

      - name: Inspect or repair community migration drift
        run: |
          if [ "${{ inputs.execute }}" = "true" ]; then
            bun scripts/community/repair-community-migration-ledger.ts --execute
          else
            bun scripts/community/repair-community-migration-ledger.ts
          fi
