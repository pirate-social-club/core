name: community-migration-doctor

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-egress-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start iron-proxy egress audit
        uses: ironsh/iron-proxy-action@fa1fd82ec32396d044deba7040a6db576bec927a
        with:
          egress-rules: egress-rules.yaml
          warn: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Show iron-proxy egress summary
        uses: ironsh/iron-proxy-action/summary@fa1fd82ec32396d044deba7040a6db576bec927a
        if: always()

  prod-read-only:
    runs-on: ubuntu-latest
    needs: dependency-egress-audit
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit lockfile
        run: npm audit --audit-level=high --package-lock-only

      - name: Fetch production migration secrets
        uses: Infisical/secrets-action@8a06c1bdcd5b8635d510c52d4b57a92c1ccef785
        with:
          method: oidc
          identity-id: ec0ad659-af1c-4009-a845-9e6092cc062b
          project-slug: pirate-dev-pr33
          env-slug: prod
          secret-path: /services/api

      - name: Verify required secrets
        run: |
          test -n "$CONTROL_PLANE_DATABASE_URL"
          test -n "$TURSO_COMMUNITY_DB_WRAP_KEY"

      - name: Check production community migration drift
        run: bun scripts/community/apply-remote-community-migrations.ts
