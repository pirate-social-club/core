name: core-ci

on:
  pull_request:
    paths:
      - ".github/workflows/core-ci.yml"
      - "db/control-plane/migrations/**"
      - "db/known-community-migration-drifts.json"
      - "db/local-control-plane-migration-drifts.json"
      - "db/community-template/migrations/**"
      - "references/templates/api-worker-auth-first-slice/**"
      - "scripts/apply-sqlite-migrations.sh"
      - "scripts/check-migration-integrity.mjs"
      - "specs/api/**"
  push:
    paths:
      - ".github/workflows/core-ci.yml"
      - "db/control-plane/migrations/**"
      - "db/known-community-migration-drifts.json"
      - "db/local-control-plane-migration-drifts.json"
      - "db/community-template/migrations/**"
      - "references/templates/api-worker-auth-first-slice/**"
      - "scripts/apply-sqlite-migrations.sh"
      - "scripts/check-migration-integrity.mjs"
      - "specs/api/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install spec dependencies
        working-directory: specs/api
        run: bun install --frozen-lockfile

      - name: Run repo hygiene checks
        run: npm run check

      - name: Check migration integrity
        run: npm run check:migrations

      # Full `bun run verify` is intentionally excluded here because it writes
      # generated contracts into the standalone API sidecar when available.
      - name: Rebuild core-owned spec artifacts
        run: |
          bun specs/api/scripts/bundle-openapi.ts
          bun specs/api/scripts/bundle-openapi-implemented.ts
          bun specs/api/scripts/generate-reference-template-types.ts
          bun run --cwd specs/api typecheck
          bun specs/api/scripts/validate-provider-matrix.ts
          bun specs/api/scripts/validate-openapi-examples.ts

      - name: Fail on uncommitted generated changes
        run: |
          git diff --exit-code -- \
            specs/api/openapi.yaml \
            specs/api/openapi-implemented.yaml \
            references/templates/api-worker-auth-first-slice/src/types/api.ts
