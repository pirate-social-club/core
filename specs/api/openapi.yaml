        membership_mode:
          type: string
          enum:
            - open
            - request
            - gated
        allow_anonymous_identity:
          type: boolean
        anonymous_identity_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        allowed_disclosed_qualifiers:
          type: array
          items:
            type: string
          nullable: true
        allow_qualifiers_on_anonymous_posts:
          type: boolean
          nullable: true
          description: |
            Whether anonymous posts in the community may attach disclosed qualifiers from `allowed_disclosed_qualifiers`.
        root_post_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        reply_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        anonymous_posting_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        root_post_quota_by_trust_tier:
          $ref: "#/components/schemas/RootPostQuotaByTrustTier"
          nullable: true
        reply_quota_by_trust_tier:
          $ref: "#/components/schemas/ReplyQuotaByTrustTier"
          nullable: true
        probation_window_days:
          type: integer
          nullable: true
        link_post_policy:
          type: string
          enum:
            - allow
            - require_established
          nullable: true
        default_age_gate_policy:
          type: string
          enum:
