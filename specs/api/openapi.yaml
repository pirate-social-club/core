    CreatePostRequest:
      type: object
      description: |
        V0 write requests do not distinguish human-initiated writes from agent-initiated writes on the canonical post object. If Pirate later supports user-owned agents posting on behalf of a user, a field such as `submission_mode` or `authorship_mode` should be added as the auditability extension point.
      oneOf:
        - description: Link posts must include `link_url`.
          required:
            - post_type
            - link_url
          properties:
            post_type:
              type: string
              enum:
                - link
        - description: Non-link posts must not send `link_url`.
          required:
            - post_type
          properties:
            post_type:
              type: string
              enum:
                - text
                - image
                - video
                - song
          not:
            required:
              - link_url
      required:
        - community_id
        - idempotency_key
        - post_type
      properties:
        community_id:
          type: string
        idempotency_key:
          type: string
          description: |
            Client-supplied deduplication key for create retries. For the same authenticated author,
            reusing the same `idempotency_key` on an equivalent create request must return the
            originally created post rather than creating a duplicate row.
        identity_mode:
          type: string
          enum:
            - public
            - anonymous
          default: public
        anonymous_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
          description: |
            Required when `identity_mode = anonymous`. Must be null when `identity_mode = public`.
        disclosed_qualifier_ids:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Platform-defined `qualifier_template_id` values chosen by the author for this post. In v0 these are only valid when `identity_mode = anonymous`.
        parent_post_id:
          type: string
          nullable: true
        flair_id:
          type: string
          nullable: true
        post_type:
          type: string
          enum:
            - text
            - image
            - video
            - link
            - song
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        link_url:
          type: string
          format: uri
          nullable: true
          description: Required when post_type is link. Must be null for all other post types.
        media_refs:
          type: array
          items:
            $ref: "#/components/schemas/MediaDescriptor"
        translation_policy:
          type: string
          enum:
            - none
            - machine_allowed
            - human_only
            - hybrid
          nullable: true
        asset_id:
          type: string
          nullable: true
        song_mode:
          type: string
          enum:
            - original
            - remix
          nullable: true
        rights_basis:
          type: string
          enum:
            - none
            - original
            - derivative
            - attribution_only
          nullable: true
        age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
          nullable: true
        lyrics:
          type: string
          nullable: true
          description: |
            Plain-text lyrics for song posts. Required when post_type is song. Optional for other post types.
    Post:
      type: object
      description: |
        Canonical post row. V0 read models do not distinguish human-initiated writes from agent-initiated writes on the base object; if Pirate later supports user-owned agents posting on behalf of a user, a field such as `submission_mode` or `authorship_mode` should be added rather than overloading `author_user_id`.
      required:
        - post_id
        - community_id
        - identity_mode
        - post_type
        - status
        - analysis_state
        - content_safety_state
        - age_gate_policy
        - created_at
        - updated_at
      properties:
        post_id:
          type: string
        community_id:
          type: string
        author_user_id:
          type: string
          nullable: true
          description: |
            Public read models omit this field for anonymous posts. It remains present for non-anonymous posts and privileged internal reads.
        identity_mode:
          type: string
          enum:
            - public
            - anonymous
        anonymous_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        anonymous_label:
          type: string
          nullable: true
        disclosed_qualifiers_json:
          type: array
          items:
            $ref: "#/components/schemas/DisclosedQualifierSnapshot"
          nullable: true
        flair_id:
          type: string
          nullable: true
        post_type:
          type: string
          enum:
            - text
            - image
            - video
            - link
            - song
        status:
          type: string
          enum:
            - draft
            - published
            - hidden
            - removed
            - deleted
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        link_url:
          type: string
          format: uri
          nullable: true
        media_refs:
          type: array
          items:
            $ref: "#/components/schemas/MediaDescriptor"
        source_language:
          type: string
          nullable: true
          description: |
            Server-authored detected source language. May be null only while `analysis_state = pending`; published posts should have a non-null value.
        translation_policy:
          type: string
          enum:
            - none
            - machine_allowed
            - human_only
            - hybrid
          nullable: true
        asset_id:
          type: string
          nullable: true
        parent_post_id:
          type: string
          nullable: true
        song_mode:
          type: string
          enum:
            - original
            - remix
          nullable: true
        rights_basis:
          type: string
          enum:
            - none
            - original
            - derivative
            - attribution_only
          nullable: true
        analysis_state:
          type: string
          enum:
            - pending
            - allow
            - allow_with_required_reference
            - review_required
            - blocked
        analysis_result_ref:
          type: string
          nullable: true
        content_safety_state:
          type: string
          enum:
            - pending
            - safe
            - sensitive
            - adult
        age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LocalizedPostResponse:
      type: object
      description: |
        Localized read envelope for a canonical post. Read endpoints return this wrapper so locale-resolved translation fields stay out of the canonical `Post` schema.
      required:
        - post
        - upvote_count
        - downvote_count
        - like_count
        - viewer_vote
        - viewer_reaction_kinds
        - resolved_locale
        - translation_state
        - machine_translated
        - source_hash
      properties:
        post:
          $ref: "#/components/schemas/Post"
        flair:
          $ref: "#/components/schemas/PostFlair"
          nullable: true
        upvote_count:
          type: integer
          minimum: 0
        downvote_count:
          type: integer
          minimum: 0
        like_count:
          type: integer
          minimum: 0
        viewer_vote:
          type: integer
          enum:
            - -1
            - 1
          nullable: true
          description: |
            The caller's active vote on the post. Null means the caller has not cast a vote.
        viewer_reaction_kinds:
          type: array
          description: |
            Active reaction kinds from the caller on this post. Empty when the caller has no active reactions.
          items:
            type: string
            enum:
              - like
        resolved_locale:
          type: string
        translation_state:
          type: string
          enum:
            - ready
            - pending
            - same_language
            - policy_blocked
          description: |
            Translation resolution state for the resolved locale. `ready` means a machine translation exists. `pending` means the translation is being materialized lazily. `same_language` means no translation is needed. `policy_blocked` means `translation_policy` forbids machine translation.
        machine_translated:
          type: boolean
          description: |
            True only when `translation_state = ready` and translated text is being surfaced for the resolved locale.
        translated_body:
          type: string
          nullable: true
          description: |
            Viewer-facing translated body text when `translation_state = ready`.
        translated_caption:
          type: string
          nullable: true
          description: |
            Viewer-facing translated caption text when `translation_state = ready`.
        source_hash:
          type: string
          description: |
            Content fingerprint for translation cache invalidation. Changes when the canonical source text changes.
    MediaDescriptor:
      type: object
      required:
        - storage_ref
      properties:
        storage_ref:
          type: string
        mime_type:
          type: string
          nullable: true
        size_bytes:
          type: integer
          nullable: true
        content_hash:
          type: string
          nullable: true
        duration_ms:
          type: integer
          nullable: true
    Question:
      type: object
      required:
        - question_id
        - post_id
        - community_id
        - author_user_id
        - question_kind
        - prompt
        - status
        - published_at
      properties:
        question_id:
          type: string
        post_id:
          type: string
        community_id:
          type: string
        author_user_id:
          type: string
        question_kind:
          type: string
          enum:
            - meaning
