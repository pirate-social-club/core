openapi: 3.0.3
info:
  title: Pirate API
  version: 0.1.0
  description: |
    First-pass happy-path API for Pirate v2.
    This OpenAPI file is intentionally narrow. It encodes the core v0 flows that are already stable in the domain specs: auth bootstrap, verification, onboarding, global profile identity, guilds, namespace handles, posts, daily questions, tracks, scrobbles, feeds, and async jobs.
servers:
  - url: https://api.pirate.example
    description: Placeholder production server
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Verification
  - name: Onboarding
  - name: Users
  - name: Profiles
  - name: Guilds
  - name: Handles
  - name: Posts
  - name: Livestreams
  - name: Questions
  - name: Feeds
  - name: Tracks
  - name: Scrobbles
  - name: MPP
  - name: Jobs
paths:
  /auth/session/exchange:
    post:
      tags:
        - Auth
      summary: Exchange a Privy proof for a Pirate app session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - privy_access_token
              properties:
                privy_access_token:
                  type: string
                wallet_address:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Session created or resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExchangeResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /verification/sessions:
    post:
      tags:
        - Verification
      summary: Start a verification session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
              properties:
                provider:
                  type: string
                  enum:
                    - self
                    - very
                wallet_attachment_id:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Verification session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /verification/sessions/{verification_session_id}:
    get:
      tags:
        - Verification
      summary: Inspect a verification session
      parameters:
        - $ref: "#/components/parameters/VerificationSessionId"
      responses:
        "200":
          description: Verification session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /verification/sessions/{verification_session_id}/complete:
    post:
      tags:
        - Verification
      summary: Complete or refresh a verification session
      parameters:
        - $ref: "#/components/parameters/VerificationSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                attestation_id:
                  type: string
                  nullable: true
                proof_hash:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Verification session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /onboarding/status:
    get:
      tags:
        - Onboarding
      summary: Fetch onboarding status for the current user
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"
        "401":
          $ref: "#/components/responses/AuthError"
  /onboarding/reddit-verification:
    post:
      tags:
        - Onboarding
      summary: Start or refresh Reddit ownership verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reddit_username
              properties:
                reddit_username:
                  type: string
      responses:
        "200":
          description: Reddit verification state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedditVerification"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /onboarding/reddit-imports:
    post:
      tags:
        - Onboarding
      summary: Trigger a Reddit snapshot import job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reddit_username
              properties:
                reddit_username:
                  type: string
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /users/me:
    get:
      tags:
        - Users
      summary: Get the current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/AuthError"
  /profiles/me:
    get:
      tags:
        - Profiles
      summary: Get the current user's public/editable profile
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
    patch:
      tags:
        - Profiles
      summary: Update editable profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar_ref:
                  type: string
                  nullable: true
                bio:
                  type: string
                  nullable: true
                preferred_locale:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
  /profiles/me/global-handle/rename:
    post:
      tags:
        - Profiles
      summary: Rename the current active global .pirate handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - desired_label
              properties:
                desired_label:
                  type: string
      responses:
        "200":
          description: Global handle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalHandle"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /profiles/me/global-handle/upgrade-quote:
    post:
      tags:
        - Profiles
      summary: Quote a paid upgrade into a cleaner .pirate handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - desired_label
              properties:
                desired_label:
                  type: string
      responses:
        "200":
          description: Upgrade quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandleUpgradeQuote"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
  /profiles/{user_id}:
    get:
      tags:
        - Profiles
      summary: Get a public profile
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /guilds:
    post:
      tags:
        - Guilds
      summary: Create a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuildRequest"
      responses:
        "201":
          description: Guild created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      tags:
        - Guilds
      summary: List guilds
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: artist_identity_id
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Guilds
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Guild"
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /guilds/{guild_id}:
    get:
      tags:
        - Guilds
      summary: Get a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Guild
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Guilds
      summary: Update mutable guild settings
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildRequest"
      responses:
        "200":
          description: Guild updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /guilds/{guild_id}/attach-governance:
    post:
      tags:
        - Guilds
      summary: Attach or replace an external governance backend for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachGovernanceRequest"
      responses:
        "202":
          description: Governance attachment action accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAction"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /guilds/{guild_id}/flairs:
    get:
      tags:
        - Guilds
      summary: List flair definitions for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Guild flair policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildFlairPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Guilds
      summary: Replace or update flair definitions for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildFlairPolicyRequest"
      responses:
        "200":
          description: Guild flair policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildFlairPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /guilds/{guild_id}/community-profile:
    get:
      tags:
        - Guilds
      summary: Get the community profile for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Guild community profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildCommunityProfile"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Guilds
      summary: Update the community profile for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildCommunityProfileRequest"
      responses:
        "200":
          description: Guild community profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildCommunityProfile"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /guilds/{guild_id}/donation-policy:
    get:
      tags:
        - Guilds
      summary: Get the active donation policy for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Guild donation policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildDonationPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Guilds
      summary: Configure or update the donation policy for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuildDonationPolicyRequest"
      responses:
        "200":
          description: Guild donation policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildDonationPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /guilds/{guild_id}/join:
    post:
      tags:
        - Guilds
      summary: Join a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Membership created or request recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/GateFailed"
  /guilds/{guild_id}/live-rooms:
    post:
      tags:
        - Livestreams
      summary: Create a livestream room for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLiveRoomRequest"
      responses:
        "201":
          description: Livestream room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoom"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
  /guilds/{guild_id}/leave:
    post:
      tags:
        - Guilds
      summary: Leave a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Membership removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipResult"
        "401":
          $ref: "#/components/responses/AuthError"
  /guilds/{guild_id}/posts:
    get:
      tags:
        - Posts
      summary: List posts in a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/FeedSort"
        - $ref: "#/components/parameters/TopWindow"
        - $ref: "#/components/parameters/FlairId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Guild posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /live-rooms/{live_room_id}:
    get:
      tags:
        - Livestreams
      summary: Get a livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoom"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /live-rooms/{live_room_id}/access:
    get:
      tags:
        - Livestreams
      summary: Inspect current access state for a livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream access state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomAccessView"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /live-rooms/{live_room_id}/host-attach:
    post:
      tags:
        - Livestreams
      summary: Issue host broadcast credentials for a livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostAttachRequest"
      responses:
        "200":
          description: Host attach credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomAttachSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /live-rooms/{live_room_id}/guest-attach:
    post:
      tags:
        - Livestreams
      summary: Issue guest broadcast credentials for an invited livestream collaborator
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestAttachRequest"
      responses:
        "200":
          description: Guest attach credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomAttachSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /live-rooms/{live_room_id}/replay:
    get:
      tags:
        - Livestreams
      summary: Inspect replay state and replay-facing metadata for a livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream replay view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomReplayView"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /live-rooms/{live_room_id}/replay/access:
    get:
      tags:
        - Livestreams
      summary: Inspect current replay access state for a livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream replay access state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoomReplayAccessView"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /live-rooms/{live_room_id}/start:
    post:
      tags:
        - Livestreams
      summary: Transition a scheduled livestream room to live
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream room started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoom"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /live-rooms/{live_room_id}/end:
    post:
      tags:
        - Livestreams
      summary: End a live livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      responses:
        "200":
          description: Livestream room ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoom"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /live-rooms/{live_room_id}/cancel:
    post:
      tags:
        - Livestreams
      summary: Cancel a scheduled or active livestream room
      parameters:
        - $ref: "#/components/parameters/LiveRoomId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Livestream room canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRoom"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /guilds/{guild_id}/questions/daily:
    get:
      tags:
        - Questions
      summary: Fetch the current daily question for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      responses:
        "200":
          description: Current daily question or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    type: object
                    allOf:
                      - $ref: "#/components/schemas/Question"
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
    post:
      tags:
        - Questions
      summary: Publish or schedule a daily question for a guild
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionRequest"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /guilds/{guild_id}/questions/daily/answers:
    post:
      tags:
        - Questions
      summary: Submit an answer to the current daily question
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
