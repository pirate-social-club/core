        - $ref: "#/components/parameters/FeedSort"
        - $ref: "#/components/parameters/TopWindow"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Home feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
  /feeds/your-guilds:
    get:
      tags:
        - Feeds
      summary: Read the Your Guilds feed
      parameters:
        - $ref: "#/components/parameters/Locale"
        - $ref: "#/components/parameters/FeedSort"
        - $ref: "#/components/parameters/TopWindow"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Personalized guild feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /tracks:
    post:
      tags:
        - Tracks
      summary: Resolve or create a canonical track identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackResolveRequest"
      responses:
        "200":
          description: Track resolved or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /tracks/{track_id}:
    get:
      tags:
        - Tracks
      summary: Get a canonical track
      parameters:
        - $ref: "#/components/parameters/TrackId"
      responses:
        "200":
          description: Track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /tracks/{track_id}/listeners:
    get:
      tags:
        - Scrobbles
      summary: Read listener summaries for a track
      parameters:
        - $ref: "#/components/parameters/TrackId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Listener summaries
          content:
            application/json:
              schema:
                type: object
                required:
                  - track_id
                  - items
                properties:
                  track_id:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ListenerSummary"
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /scrobbles:
    post:
      tags:
        - Scrobbles
      summary: Submit a scrobble
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScrobbleRequest"
      responses:
        "201":
          description: Scrobble accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scrobble"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /users/{user_id}/scrobbles:
    get:
      tags:
        - Scrobbles
      summary: Read scrobbles for a user
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Scrobbles
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Scrobble"
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /mpp/guilds/{guild_id}/threads/export:
    post:
      tags:
        - MPP
      summary: Request a paid guild thread export
      description: |
        This is the v0 machine-access export surface. Initial requests may return `402 Payment Required` with `WWW-Authenticate: Payment`. Successful paid requests return `Payment-Receipt` and a pollable export job. Payment-auth callers complete the async flow through `/mpp/jobs/{job_id}`.
      security:
        - paymentAuth: []
      parameters:
        - $ref: "#/components/parameters/GuildId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreadExportRequest"
      responses:
        "202":
          description: Export accepted as an async job
          headers:
            Payment-Receipt:
              description: Machine-payment receipt for the accepted export request
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadExportAcceptedResponse"
        "402":
          $ref: "#/components/responses/PaymentRequiredOrFailed"
        "403":
          $ref: "#/components/responses/MppExportForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /mpp/jobs/{job_id}:
    get:
      tags:
        - MPP
      summary: Inspect a pollable async MPP job
      description: |
        Payment-auth callers use this endpoint to poll async jobs returned by paid machine-access endpoints such as guild thread exports.
      security:
        - paymentAuth: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /jobs:
    get:
      tags:
        - Jobs
      summary: List jobs by subject or type
      parameters:
        - in: query
          name: subject_type
          schema:
            type: string
        - in: query
          name: subject_id
          schema:
            type: string
        - in: query
          name: job_type
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
  /jobs/{job_id}:
    get:
      tags:
        - Jobs
      summary: Inspect a pollable async job
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    paymentAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Payment credential sent as `Authorization: Payment ...` on retry after an MPP `402 Payment Required` challenge.
  parameters:
    GuildId:
      in: path
      name: guild_id
      required: true
      schema:
        type: string
    NamespaceId:
      in: path
      name: namespace_id
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    PostId:
      in: path
      name: post_id
      required: true
      schema:
        type: string
    LiveRoomId:
      in: path
      name: live_room_id
      required: true
      schema:
        type: string
    TrackId:
      in: path
      name: track_id
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
    VerificationSessionId:
      in: path
      name: verification_session_id
      required: true
      schema:
        type: string
    FeedSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - best
          - top
          - new
    Locale:
      in: query
      name: locale
      description: |
        Optional locale override for localized read surfaces. When omitted, the server should resolve locale using the SSR precedence contract.
      schema:
        type: string
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
    TopWindow:
      in: query
      name: top_window
      schema:
        type: string
        enum:
          - now
          - today
          - this_week
          - this_month
          - all_time
    FlairId:
      in: query
      name: flair_id
      schema:
        type: string
        nullable: true
  responses:
    AuthError:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PaymentRequired:
      description: Payment is required before the resource can be accessed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MppChallenge"
    PaymentRequiredOrFailed:
      description: Payment is required or a payment attempt failed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MppChallenge"
              - $ref: "#/components/schemas/PaymentFailure"
    VerificationRequired:
      description: Verification is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MppExportForbidden:
      description: Export blocked by a guild gate or export-eligibility rule
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GateFailed:
      description: Guild gate or membership rule failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EligibilityFailed:
      description: Policy or eligibility requirement failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingTrustTierTooLow:
      description: The requested posting action is not available at the author's current guild trust level
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingQuotaExhausted:
      description: The requested posting action is temporarily unavailable until the relevant posting window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AnalysisBlocked:
      description: Content analysis blocked publication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Request rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - auth_error
            - payment_required
            - verification_required
            - eligibility_failed
            - gate_failed
            - posting_trust_tier_too_low
            - posting_quota_exhausted
            - analysis_blocked
            - analysis_review_required
            - flair_required
            - invalid_flair_selection
            - flair_required_but_none_applicable
            - conflict
            - not_found
            - rate_limited
            - payment_failed
            - settlement_pending
            - internal_error
        message:
          type: string
        retryable:
          type: boolean
          default: false
    SessionExchangeResponse:
      type: object
      required:
        - access_token
        - user
        - profile
        - onboarding
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        profile:
          $ref: "#/components/schemas/Profile"
        onboarding:
          $ref: "#/components/schemas/OnboardingStatus"
    User:
      type: object
      required:
        - user_id
        - verification_state
        - verification_capabilities
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
        primary_wallet_attachment_id:
          type: string
          nullable: true
        verification_state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - reverification_required
        verification_provider:
          type: string
          enum:
            - self
            - very
          nullable: true
        verification_capabilities:
          $ref: "#/components/schemas/VerificationCapabilities"
        verified_at:
          type: string
          format: date-time
          nullable: true
        nationality:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VerificationCapabilities:
      type: object
      required:
        - unique_human
        - age_over_18
        - nationality
      properties:
        unique_human:
          $ref: "#/components/schemas/VerificationCapabilityState"
        age_over_18:
          $ref: "#/components/schemas/VerifiedCapabilityState"
        nationality:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            value:
              type: string
              nullable: true
              description: ISO country code when verified
    VerificationCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for unique_human, which may be pending during an active verification session.
      properties:
        state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - expired
        assurance_level:
          type: string
          enum:
            - basic
            - strong
          nullable: true
        provider:
          type: string
          enum:
            - self
            - very
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    VerifiedCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for age_over_18 and nationality, which have no pending state — they are either unverified, verified from an accepted record, or expired after a re-verification requirement.
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
        provider:
          type: string
          enum:
            - self
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    Profile:
      type: object
      required:
        - user_id
        - global_handle
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_ref:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        preferred_locale:
          type: string
          nullable: true
        global_handle:
          $ref: "#/components/schemas/GlobalHandle"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GlobalHandle:
      type: object
      required:
        - global_handle_id
        - label
        - tier
        - status
        - issuance_source
        - issued_at
      properties:
        global_handle_id:
          type: string
        label:
          type: string
        tier:
          type: string
          enum:
            - generated
            - standard
            - premium
        status:
          type: string
          enum:
            - active
            - redirect
            - retired
        issuance_source:
          type: string
          enum:
            - generated_signup
            - free_cleanup_rename
            - reddit_verified_claim
            - paid_upgrade
            - admin_grant
        redirect_target_global_handle_id:
          type: string
          nullable: true
        price_paid_usd:
          type: number
          nullable: true
        free_rename_consumed:
          type: boolean
        issued_at:
          type: string
          format: date-time
        replaced_at:
          type: string
          format: date-time
          nullable: true
    HandleUpgradeQuote:
      type: object
      required:
        - desired_label
        - tier
        - price_usd
        - eligible
      properties:
        desired_label:
          type: string
        tier:
          type: string
          enum:
            - standard
            - premium
        price_usd:
          type: number
        eligible:
          type: boolean
        reason:
          type: string
          nullable: true
    VerificationSession:
      type: object
      required:
        - verification_session_id
        - user_id
        - provider
        - status
        - created_at
        - expires_at
      properties:
        verification_session_id:
          type: string
        user_id:
          type: string
        provider:
          type: string
          enum:
            - self
            - very
        wallet_attachment_id:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - expired
        nationality:
          type: string
          nullable: true
        age_at_verification:
          type: integer
          nullable: true
        attestation_id:
          type: string
          nullable: true
        proof_hash:
          type: string
          nullable: true
        evidence_ref:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        failure_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    RedditVerification:
      type: object
      required:
        - reddit_username
        - status
      properties:
        reddit_username:
          type: string
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
        verification_hint:
          type: string
          nullable: true
    OnboardingStatus:
      type: object
      required:
        - generated_handle_assigned
        - cleanup_rename_available
        - reddit_verification_status
        - reddit_import_status
      properties:
        generated_handle_assigned:
          type: boolean
        cleanup_rename_available:
          type: boolean
        reddit_verification_status:
          type: string
          enum:
            - not_started
            - pending
            - verified
            - failed
        reddit_import_status:
          type: string
          enum:
            - not_started
            - queued
            - running
            - succeeded
            - failed
        suggested_guild_ids:
          type: array
          items:
            type: string
    CreateGuildRequestBase:
      type: object
      required:
        - display_name
        - membership_mode
        - allow_anonymous_identity
        - namespace
        - handle_policy
      properties:
        display_name:
          type: string
        description:
          type: string
          nullable: true
        artist_identity_id:
          type: string
          nullable: true
        membership_mode:
          type: string
          enum:
            - open
            - request
            - gated
        allow_anonymous_identity:
          type: boolean
        anonymous_identity_scope:
          type: string
          enum:
            - guild_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        allowed_disclosed_qualifiers:
          type: array
          items:
            type: string
          nullable: true
