        "401":
          $ref: "#/components/responses/AuthError"
  /jobs/{job_id}:
    get:
      tags:
        - Jobs
      summary: Inspect a pollable async job
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    paymentAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Payment credential sent as `Authorization: Payment ...` on retry after an MPP `402 Payment Required` challenge.
  parameters:
    CommunityId:
      in: path
      name: community_id
      required: true
      schema:
        type: string
    NamespaceId:
      in: path
      name: namespace_id
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    PostId:
      in: path
      name: post_id
      required: true
      schema:
        type: string
    LiveRoomId:
      in: path
      name: live_room_id
      required: true
      schema:
        type: string
    TrackId:
      in: path
      name: track_id
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
    VerificationSessionId:
      in: path
      name: verification_session_id
      required: true
      schema:
        type: string
    NamespaceVerificationSessionId:
      in: path
      name: namespace_verification_session_id
      required: true
      schema:
        type: string
    NamespaceVerificationId:
      in: path
      name: namespace_verification_id
      required: true
      schema:
        type: string
    CommunityReferenceLinkId:
      in: path
      name: community_reference_link_id
      required: true
      schema:
        type: string
    CommunityReferenceLinkProofId:
      in: path
      name: proof_id
      required: true
      schema:
        type: string
    FeedSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - best
          - top
          - new
    Locale:
      in: query
      name: locale
      description: |
        Optional locale override for localized read surfaces. When omitted, the server should resolve locale using the SSR precedence contract.
      schema:
        type: string
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
    TopWindow:
      in: query
      name: top_window
      schema:
        type: string
        enum:
          - now
          - today
          - this_week
          - this_month
          - all_time
    FlairId:
      in: query
      name: flair_id
      schema:
        type: string
        nullable: true
  responses:
    AuthError:
      description: Authentication failed
      content:
        application/json:
          examples:
            default:
              summary: Standard auth failure
              value:
                code: auth_error
                message: Authentication failed
                retryable: false
          schema:
            $ref: "#/components/schemas/Error"
    PaymentRequired:
      description: Payment is required before the resource can be accessed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MppChallenge"
    PaymentRequiredOrFailed:
      description: Payment is required or a payment attempt failed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MppChallenge"
              - $ref: "#/components/schemas/PaymentFailure"
    VerificationRequired:
      description: Verification is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MppExportForbidden:
      description: Export blocked by a community gate or export-eligibility rule
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GateFailed:
      description: Community gate or membership rule failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EligibilityFailed:
      description: Policy or eligibility requirement failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingTrustTierTooLow:
      description: The requested posting action is not available at the author's current community trust level
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingQuotaExhausted:
      description: The requested posting action is temporarily unavailable until the relevant posting window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AnalysisBlocked:
      description: Content analysis blocked publication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Request rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - auth_error
            - payment_required
            - verification_required
            - eligibility_failed
            - gate_failed
            - posting_trust_tier_too_low
            - posting_quota_exhausted
            - analysis_blocked
            - analysis_review_required
            - flair_required
            - invalid_flair_selection
            - flair_required_but_none_applicable
            - conflict
            - not_found
            - rate_limited
            - payment_failed
            - settlement_pending
            - internal_error
        message:
          type: string
        retryable:
          type: boolean
          default: false
    SessionExchangeResponse:
      type: object
      required:
        - access_token
        - user
        - profile
        - onboarding
        - wallet_attachments
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        profile:
          $ref: "#/components/schemas/Profile"
        onboarding:
          $ref: "#/components/schemas/OnboardingStatus"
        wallet_attachments:
          type: array
          description: |
            Wallet attachments available to the authenticated Pirate user at session bootstrap time.
            This lets clients render the active execution wallet without relying on provider SDK
            side channels or an immediate follow-up fetch. This field is always present. In the first
            executable `jwt_based_auth` slice, newly created JWT-path users return `[]` because that
            request variant does not create wallet attachments.
          items:
            $ref: "#/WalletAttachmentSummary"
    User:
      type: object
      description: |
        Public user read model. Sensitive verified-identity fields that may exist on the canonical user row, such as `date_of_birth`, `age_at_verification`, `identity_nullifier_hash`, and `verification_session_id`, are intentionally omitted from this schema in v0.
      required:
        - user_id
        - verification_state
        - verification_capabilities
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
        primary_wallet_attachment_id:
          type: string
          nullable: true
        verification_state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - reverification_required
        capability_provider:
          type: string
          enum:
            - self
            - very
          nullable: true
          description: |
            Convenience summary for the provider that produced the most recent accepted core capability set. Per-capability `provider` fields inside `verification_capabilities` remain authoritative.
        verification_capabilities:
          $ref: "#/components/schemas/VerificationCapabilities"
        verified_at:
          type: string
          format: date-time
          nullable: true
        nationality:
          type: string
          nullable: true
          description: ISO country code when the current accepted identity includes nationality
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VerificationCapabilities:
      type: object
      required:
        - unique_human
        - age_over_18
        - nationality
        - gender
        - wallet_score
      properties:
        unique_human:
          $ref: "#/components/schemas/VerificationCapabilityState"
        age_over_18:
          $ref: "#/components/schemas/VerifiedCapabilityState"
        nationality:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            value:
              type: string
              nullable: true
              description: ISO country code when verified
        gender:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            value:
              type: string
              enum:
                - M
                - F
              nullable: true
              description: Verified gender value when disclosed by an eligible flow
        wallet_score:
          $ref: "#/components/schemas/WalletScoreCapabilityState"
    VerificationCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for unique_human, which may be pending during an active verification session.
      properties:
        state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - expired
        provider:
          type: string
          enum:
            - self
            - very
            - passport
          nullable: true
        proof_type:
          type: string
          enum:
            - unique_human
            - biometric_liveness
            - wallet_score
            - gov_id
            - age_over_18
            - nationality
            - sanctions_clear
            - gender
            - phone
          nullable: true
        mechanism:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    VerifiedCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for age_over_18 and nationality, which have no pending state — they are either unverified, verified from an accepted record, or expired after a re-verification requirement.
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
        provider:
          type: string
          enum:
            - self
            - passport
          nullable: true
        proof_type:
          type: string
          enum:
            - age_over_18
            - nationality
            - gender
            - gov_id
            - sanctions_clear
            - phone
          nullable: true
        mechanism:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    Profile:
      type: object
      required:
        - user_id
        - global_handle
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_ref:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        preferred_locale:
          type: string
          nullable: true
        global_handle:
          $ref: "#/components/schemas/GlobalHandle"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GlobalHandle:
      type: object
      required:
        - global_handle_id
        - label
        - tier
        - status
        - issuance_source
        - issued_at
      properties:
        global_handle_id:
          type: string
        label:
          type: string
        tier:
          type: string
          enum:
            - generated
            - standard
            - premium
        status:
          type: string
          enum:
            - active
            - redirect
            - retired
        issuance_source:
          type: string
          enum:
            - generated_signup
            - free_cleanup_rename
            - reddit_verified_claim
            - paid_upgrade
            - admin_grant
        redirect_target_global_handle_id:
          type: string
          nullable: true
        price_paid_usd:
          type: number
          nullable: true
        free_rename_consumed:
          type: boolean
        issued_at:
          type: string
          format: date-time
        replaced_at:
          type: string
          format: date-time
          nullable: true
    HandleUpgradeQuote:
      type: object
      required:
        - desired_label
        - tier
        - price_usd
        - eligible
      properties:
        desired_label:
          type: string
        tier:
          type: string
          enum:
            - standard
            - premium
        price_usd:
          type: number
        eligible:
          type: boolean
        reason:
          type: string
          nullable: true
    VerificationSession:
      type: object
      required:
        - verification_session_id
        - user_id
        - provider
        - status
        - created_at
        - expires_at
      properties:
        verification_session_id:
          type: string
        user_id:
          type: string
        provider:
          type: string
          enum:
            - self
            - very
            - passport
        wallet_attachment_id:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - expired
        nationality:
          type: string
          nullable: true
        age_at_verification:
          type: integer
          nullable: true
        attestation_id:
          type: string
          nullable: true
        proof_hash:
          type: string
          nullable: true
        evidence_ref:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        failure_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    StartNamespaceVerificationSessionRequest:
      type: object
      required:
        - family
        - root_label
      properties:
        family:
          type: string
          enum:
            - hns
          description: |
            Public v0 supports HNS only. Future namespace families may extend this surface without changing the session model.
        root_label:
          type: string
          description: Root label as entered by the creator before server normalization.
    CompleteNamespaceVerificationSessionRequest:
      type: object
      description: |
        Trigger a refresh of TXT challenge observations and assertion derivation after the creator has published the required record. The body is optional because many implementations can treat this as an idempotent recheck.
      properties:
        restart_challenge:
          type: boolean
          nullable: true
          description: |
            Optional hint to invalidate the current TXT challenge and issue a new one if the creator wants to restart the proof flow.
    NamespaceVerificationAssertions:
      type: object
      description: |
        Accepted or in-flight namespace assertions derived from the current evidence bundle. These facts remain distinct so attach capability, routing capability, and Pirate-managed subdomain capability are not collapsed into one flag.
      properties:
        root_exists:
          type: boolean
          nullable: true
        root_control_verified:
          type: boolean
          nullable: true
        expiry_horizon_sufficient:
          type: boolean
          nullable: true
        routing_enabled:
          type: boolean
          nullable: true
        pirate_dns_authority_verified:
          type: boolean
          nullable: true
    NamespaceVerificationCapabilities:
      type: object
      description: |
        Derived capabilities from the current accepted assertions. These are technical capability outputs, not automatic product permission for namespace commerce.
      properties:
        club_attach_allowed:
          type: boolean
          nullable: true
        pirate_web_routing_allowed:
          type: boolean
          nullable: true
        pirate_subdomain_issuance_allowed:
          type: boolean
          nullable: true
    NamespaceVerificationSession:
      type: object
      required:
        - namespace_verification_session_id
        - user_id
        - family
        - submitted_root_label
        - status
        - created_at
        - expires_at
      properties:
        namespace_verification_session_id:
          type: string
        namespace_verification_id:
          type: string
          nullable: true
          description: |
            Populated only when the session reaches `verified` and Pirate has issued an accepted verification reference.
        user_id:
          type: string
        family:
          type: string
          enum:
            - hns
        submitted_root_label:
          type: string
        normalized_root_label:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - inspecting
            - challenge_required
            - challenge_pending
            - verifying
            - verified
            - failed
            - expired
            - disputed
        challenge_host:
          type: string
          nullable: true
          description: Exact host where the TXT challenge must be published when required.
        challenge_txt_value:
          type: string
          nullable: true
          description: TXT value Pirate expects to observe for root-control proof.
        challenge_expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration time for the currently issued TXT challenge, distinct from the overall namespace verification session expiry.
        assertions:
          allOf:
            - $ref: "#/components/schemas/NamespaceVerificationAssertions"
          nullable: true
        capabilities:
          allOf:
            - $ref: "#/components/schemas/NamespaceVerificationCapabilities"
          nullable: true
        control_class:
          type: string
          enum:
            - single_holder_root
            - multisig_controlled_root
            - dao_controlled_root
            - burned_or_immutable_root
          nullable: true
        operation_class:
          type: string
          enum:
            - owner_managed_namespace
            - routing_only_namespace
            - pirate_delegated_namespace
          nullable: true
        observation_provider:
          type: string
          nullable: true
          description: |
            Trusted HNS-aware provider used for the most recent accepted observation in public v0, such as Fire HSD.
        evidence_bundle_ref:
          type: string
          nullable: true
        failure_reason:
          type: string
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    NamespaceVerification:
      type: object
      required:
        - namespace_verification_id
        - user_id
        - family
        - normalized_root_label
        - status
        - assertions
        - capabilities
        - accepted_at
        - expires_at
        - created_at
        - updated_at
      properties:
        namespace_verification_id:
          type: string
        user_id:
          type: string
        family:
          type: string
          enum:
            - hns
        normalized_root_label:
          type: string
        status:
          type: string
          enum:
            - verified
            - stale
            - expired
            - disputed
        assertions:
          $ref: "#/components/schemas/NamespaceVerificationAssertions"
        capabilities:
          $ref: "#/components/schemas/NamespaceVerificationCapabilities"
        control_class:
          type: string
          enum:
            - single_holder_root
            - multisig_controlled_root
            - dao_controlled_root
            - burned_or_immutable_root
          nullable: true
        operation_class:
          type: string
          enum:
            - owner_managed_namespace
            - routing_only_namespace
            - pirate_delegated_namespace
          nullable: true
        observation_provider:
          type: string
          nullable: true
        evidence_bundle_ref:
          type: string
          nullable: true
        accepted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    RedditVerification:
      type: object
      required:
        - reddit_username
        - status
      properties:
        reddit_username:
          type: string
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
        verification_hint:
          type: string
          nullable: true
    OnboardingStatus:
      type: object
      required:
        - generated_handle_assigned
        - cleanup_rename_available
        - reddit_verification_status
        - reddit_import_status
      properties:
        generated_handle_assigned:
          type: boolean
        cleanup_rename_available:
          type: boolean
        reddit_verification_status:
          type: string
          enum:
            - not_started
            - pending
            - verified
            - failed
        reddit_import_status:
          type: string
          enum:
            - not_started
            - queued
            - running
            - succeeded
            - failed
        suggested_community_ids:
          type: array
          items:
            type: string
    CreateCommunityRequestBase:
      type: object
      description: |
        Authoritative community-create write model. For namespace-backed communities in public v0, the server must resolve `namespace.namespace_verification_id` to the accepted namespace-verification object at create time and re-check creator binding, freshness, and `community_attach_allowed` before any community state is written.
      required:
        - display_name
        - membership_mode
        - allow_anonymous_identity
        - namespace
        - handle_policy
      properties:
        display_name:
          type: string
        description:
          type: string
          nullable: true
        artist_identity_id:
          type: string
          nullable: true
        membership_mode:
          type: string
          enum:
            - open
            - request
            - gated
          description: |
            Public v0 community creation should submit only `open` or `gated`. `request` remains in the model for deferred, internal, or later use and should not be exposed by the public create client.
        allow_anonymous_identity:
          type: boolean
        anonymous_identity_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
          description: |
            Required when `allow_anonymous_identity = true`. Public v0 should default to `community_stable`. `post_ephemeral` must not be submitted in the public v0 create flow unless all prerequisites from the domain spec (active content safety classification, at least one active moderator) can be verified at create time.
        allowed_disclosed_qualifiers:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Array of platform-defined `qualifier_template_id` values. Public v0 create may set this when `allow_anonymous_identity = true`. Qualifier suppression of entries already implied by community gates is a read/composer behavior concern, not a create-time configuration concern.
        allow_qualifiers_on_anonymous_posts:
          type: boolean
          nullable: true
          description: |
            Enables anonymous posts in the community to attach disclosed qualifiers from `allowed_disclosed_qualifiers`. Public v0 create may set this only when `allow_anonymous_identity = true`. If `false` or `null`, anonymous posts must not expose optional qualifiers.
        root_post_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        reply_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        anonymous_posting_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        root_post_quota_by_trust_tier:
          $ref: "#/components/schemas/RootPostQuotaByTrustTier"
          nullable: true
        reply_quota_by_trust_tier:
          $ref: "#/components/schemas/ReplyQuotaByTrustTier"
          nullable: true
        probation_window_days:
          type: integer
          nullable: true
        link_post_policy:
          type: string
          enum:
            - allow
            - require_established
          nullable: true
        default_age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
          default: none
          description: |
            Community-wide default viewer age gate. Setting this to `18_plus` requires the acting creator or updating owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
        namespace:
          allOf:
            - $ref: "#/components/schemas/NamespaceAttachmentInput"
          description: |
            Namespace attachment input for community creation. In public v0 this must reference an accepted namespace-verification object via `namespace_verification_id`; the server must consume that accepted verification, not treat the field as a blind string.
        handle_policy:
          allOf:
            - $ref: "#/components/schemas/HandlePolicyInput"
          description: |
            Public v0 new communities should normally start with the `standard` handle-policy template. This creates the namespace policy record at community creation time without implying that public community-local handle claims or namespace commerce are already enabled; those remain disabled until server-derived capability flags unlock them.
        donation_policy:
          allOf:
            - $ref: "#/components/schemas/CreateCommunityDonationPolicyInput"
          type: object
          nullable: true
          description: |
            Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
        content_authenticity_policy:
          allOf:
            - $ref: "#/components/schemas/CreateCommunityContentAuthenticityPolicyInput"
          type: object
          nullable: true
          description: |
            Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. Platform-minimum synthetic-likeness bans still override any submitted value.
        source_policy:
          allOf:
            - $ref: "#/components/schemas/CreateCommunitySourcePolicyInput"
          type: object
          nullable: true
          description: |
            Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. This policy governs repost and fan-work handling rather than AI authenticity.
        content_authenticity_detection_policy:
          allOf:
            - $ref: "#/components/schemas/CreateCommunityContentAuthenticityDetectionPolicyInput"
          type: object
          nullable: true
          description: |
            Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must use the platform-default authenticity-detection profile from the first post onward. Platform-required safety and age-gating analysis remain platform-managed and unaffected.
        community_bootstrap:
          $ref: "#/components/schemas/CreateCommunityBootstrapInput"
          nullable: true
          description: |
            Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
        gate_rules:
          type: array
          items:
            $ref: "#/components/schemas/GateRuleInput"
          nullable: true
          description: |
            Public v0 create is limited to `membership`-scope `identity_proof` gate rules only. Each submitted gate rule must include explicit `proof_requirements`. Token-holding gate rules, `viewer`-scope gates, and `posting`-scope gates are deferred until post-create settings. The server should reject create requests containing gate rules that fall outside the public v0 scope.
    GateRuleInput:
      type: object
      required:
        - scope
        - gate_family
        - gate_type
      properties:
        scope:
          type: string
          enum:
            - membership
            - viewer
            - posting
        gate_family:
          type: string
          enum:
            - token_holding
            - identity_proof
        gate_type:
          type: string
          enum:
            - erc721_holding
            - erc1155_holding
            - erc20_balance
            - solana_nft_holding
            - unique_human
            - age_over_18
            - nationality
            - wallet_score
        proof_requirements:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ProofRequirement"
        chain_namespace:
          type: string
          nullable: true
        gate_config:
          type: object
          nullable: true
          additionalProperties: true
    GateRule:
      type: object
      required:
        - gate_rule_id
        - community_id
        - scope
        - gate_family
        - gate_type
        - status
        - created_at
        - updated_at
      properties:
        gate_rule_id:
          type: string
        community_id:
          type: string
        scope:
          type: string
          enum:
            - membership
            - viewer
            - posting
        gate_family:
          type: string
          enum:
            - token_holding
            - identity_proof
        gate_type:
          type: string
          enum:
            - erc721_holding
            - erc1155_holding
            - erc20_balance
            - solana_nft_holding
            - unique_human
            - age_over_18
            - nationality
            - wallet_score
        proof_requirements:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ProofRequirement"
        chain_namespace:
          type: string
          nullable: true
        gate_config:
          type: object
          nullable: true
