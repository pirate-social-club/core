    CreateCommunityRequest:
      oneOf:
        - $ref: "#/components/schemas/CreateCentralizedCommunityRequest"
        - $ref: "#/components/schemas/CreateMultisigCommunityRequest"
        - $ref: "#/components/schemas/CreateMajeurCommunityRequest"
      discriminator:
        propertyName: governance_mode
        mapping:
          centralized: "#/components/schemas/CreateCentralizedCommunityRequest"
          multisig: "#/components/schemas/CreateMultisigCommunityRequest"
          majeur: "#/components/schemas/CreateMajeurCommunityRequest"
      description: |
        Public v0 clients must submit only `CreateCentralizedCommunityRequest` (governance_mode = centralized). `CreateMultisigCommunityRequest` and `CreateMajeurCommunityRequest` remain valid in the API for internal, allowlisted, or feature-flagged use only. The public client must not submit them.

        For namespace-backed public v0 create, the server must resolve `namespace.namespace_verification_id` to the accepted `NamespaceVerification` resource, confirm it belongs to the requesting creator, and reject the create if the accepted verification is stale, disputed, expired, or no longer satisfies `community_attach_allowed`.
    CommunityCreateAcceptedResponse:
      type: object
      required:
        - community
        - job
      properties:
        community:
          $ref: "#/components/schemas/Community"
        job:
          $ref: "#/components/schemas/Job"
      description: |
        Async acceptance response for community creation. Returns both the community row and
        its provisioning job so CLI and SDK clients can continue without secondary lookup.
    UpdateCommunityRequest:
      type: object
      properties:
        display_name:
          type: string
        description:
          type: string
          nullable: true
        membership_mode:
          type: string
          enum:
            - open
            - request
            - gated
        allow_anonymous_identity:
          type: boolean
        anonymous_identity_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        allowed_disclosed_qualifiers:
          type: array
          items:
            type: string
          nullable: true
        allow_qualifiers_on_anonymous_posts:
          type: boolean
          nullable: true
          description: |
            Enables anonymous posts in the club to attach disclosed qualifiers from `allowed_disclosed_qualifiers`. If `false` or `null`, anonymous posts must not expose optional qualifiers.
        root_post_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
        reply_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
        anonymous_posting_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
        root_post_quota_by_trust_tier:
          $ref: "#/components/schemas/RootPostQuotaByTrustTier"
        reply_quota_by_trust_tier:
          $ref: "#/components/schemas/ReplyQuotaByTrustTier"
        probation_window_days:
          type: integer
          nullable: true
        link_post_policy:
          type: string
          enum:
            - allow
            - require_established
        default_age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
          description: |
            Community-wide default viewer age gate. Updating this field from `none` to `18_plus` requires the acting owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
    CreateCentralizedCommunityRequest:
      allOf:
        - $ref: "#/components/schemas/CreateCommunityRequestBase"
        - type: object
          required:
            - governance_mode
          properties:
            governance_mode:
              type: string
              enum:
                - centralized
              default: centralized
      description: |
        The only create variant accepted from the public v0 client. All public community creation submits this request type.
    CreateMultisigCommunityRequest:
      allOf:
        - $ref: "#/components/schemas/CreateCommunityRequestBase"
        - type: object
          required:
            - governance_mode
            - governance_backend
          properties:
            governance_mode:
              type: string
              enum:
                - multisig
            governance_backend:
              $ref: "#/components/schemas/MultisigGovernanceAttachmentInput"
      description: |
        Internal, allowlisted, or feature-flagged only. The public v0 client must not submit this request type. Public multisig attachment happens after creation via POST /communities/{community_id}/attach-governance.
    CreateMajeurCommunityRequest:
      allOf:
