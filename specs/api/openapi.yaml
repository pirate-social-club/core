                $ref: "#/components/schemas/QuestionAnswer"
        "401":
          $ref: "#/components/responses/AuthError"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /namespaces/{namespace_id}/handles/availability:
