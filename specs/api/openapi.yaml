openapi: 3.0.3
info:
  title: Pirate API
  version: 0.1.0
  description: |
    First-pass happy-path API for Pirate v2.
    This OpenAPI file is intentionally narrow. It encodes the core v0 flows that are already stable in the domain specs: auth bootstrap, verification, onboarding, global profile identity, communities, namespace handles, posts, daily questions, tracks, scrobbles, feeds, and async jobs.
servers:
  - url: https://api.pirate.example
    description: Placeholder production server
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Verification
  - name: Onboarding
  - name: Users
  - name: Profiles
  - name: Communities
  - name: Handles
  - name: Posts
  - name: Livestreams
  - name: Questions
  - name: Feeds
  - name: Tracks
  - name: Scrobbles
  - name: MPP
  - name: Jobs
paths:
  /auth/session/exchange:
    post:
      tags:
        - Auth
      summary: Exchange an upstream auth proof for a Pirate app session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - proof
              properties:
                proof:
                  description: |
                    Upstream auth proof presented to Pirate. The first executable backend slice
                    runs through `jwt_based_auth` so Bruno and local development can exercise
                    account creation without a browser. `privy_access_token` remains part of the
                    broader v0 product direction, and this request shape stays forward-compatible
                    with multiple upstream providers. This JWT-first path is not the intended
                    long-term human CLI login UX. A future Pirate CLI flow should use a browser
                    handoff or device-code-style session and then terminate at the same Pirate app
                    session model returned by this exchange endpoint.
                  oneOf:
                    - type: object
                      required:
                        - type
                        - privy_access_token
                      properties:
                        type:
                          type: string
                          enum:
                            - privy_access_token
                        privy_access_token:
                          type: string
                        wallet_address:
                          type: string
                          nullable: true
                          description: |
                            Optional wallet-selection hint for the authenticated Privy subject.
                            When present, Pirate must resolve it against the wallet set linked to
                            the authenticated upstream identity and use that wallet attachment for
                            session bootstrap rather than discovering the default wallet implicitly.
                    - type: object
                      required:
                        - type
                        - jwt
                      properties:
                        type:
                          type: string
                          enum:
                            - jwt_based_auth
                        jwt:
                          type: string
                          description: |
                            Signed JWT presented to Pirate for server-side verification. The server
                            must validate the JWT signature, issuer, expiration, and any configured
                            audience requirements, then treat validated `iss` + `sub` as the
                            upstream provider identity. In the first executable JWT slice, this
                            request variant does not create wallet attachments and does not accept a
                            wallet-selection hint. Newly created JWT-path users therefore return an
                            empty `wallet_attachments` array in `SessionExchangeResponse`.
                  discriminator:
                    propertyName: type
      responses:
        "200":
          description: Session created or resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExchangeResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /verification/sessions:
    post:
      tags:
        - Verification
      summary: Start a verification session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
              properties:
                provider:
                  type: string
                  enum:
                    - self
                    - very
                wallet_attachment_id:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Verification session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /verification/sessions/{verification_session_id}:
    get:
      tags:
        - Verification
      summary: Inspect a verification session
      parameters:
        - $ref: "#/components/parameters/VerificationSessionId"
      responses:
        "200":
          description: Verification session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /verification/sessions/{verification_session_id}/complete:
    post:
      tags:
        - Verification
      summary: Complete or refresh a verification session
      parameters:
        - $ref: "#/components/parameters/VerificationSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                attestation_id:
                  type: string
                  nullable: true
                proof_hash:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Verification session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /verification/namespace-sessions:
    post:
      tags:
        - Verification
      summary: Start a namespace verification session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartNamespaceVerificationSessionRequest"
      responses:
        "201":
          description: Namespace verification session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceVerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /verification/namespace-sessions/{namespace_verification_session_id}:
    get:
      tags:
        - Verification
      summary: Inspect a namespace verification session
      parameters:
        - $ref: "#/components/parameters/NamespaceVerificationSessionId"
      responses:
        "200":
          description: Namespace verification session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceVerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /verification/namespace-sessions/{namespace_verification_session_id}/complete:
    post:
      tags:
        - Verification
      summary: Complete or refresh a namespace verification session
      parameters:
        - $ref: "#/components/parameters/NamespaceVerificationSessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteNamespaceVerificationSessionRequest"
      responses:
        "200":
          description: Namespace verification session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceVerificationSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /verification/namespaces/{namespace_verification_id}:
    get:
      tags:
        - Verification
      summary: Inspect an accepted namespace verification
      parameters:
        - $ref: "#/components/parameters/NamespaceVerificationId"
      responses:
        "200":
          description: Accepted namespace verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceVerification"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /onboarding/status:
    get:
      tags:
        - Onboarding
      summary: Fetch onboarding status for the current user
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"
        "401":
          $ref: "#/components/responses/AuthError"
  /onboarding/reddit-verification:
    post:
      tags:
        - Onboarding
      summary: Start or refresh Reddit ownership verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reddit_username
              properties:
                reddit_username:
                  type: string
      responses:
        "200":
          description: Reddit verification state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedditVerification"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /onboarding/reddit-imports:
    post:
      tags:
        - Onboarding
      summary: Trigger a Reddit snapshot import job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reddit_username
              properties:
                reddit_username:
                  type: string
      responses:
        "202":
          description: Import job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAcceptedResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /users/me:
    get:
      tags:
        - Users
      summary: Get the current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/AuthError"
  /profiles/me:
    get:
      tags:
        - Profiles
      summary: Get the current user's public/editable profile
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
    patch:
      tags:
        - Profiles
      summary: Update editable profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                avatar_ref:
                  type: string
                  nullable: true
                bio:
                  type: string
                  nullable: true
                preferred_locale:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
  /profiles/me/global-handle/rename:
    post:
      tags:
        - Profiles
      summary: Rename the current active global .pirate handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - desired_label
              properties:
                desired_label:
                  type: string
      responses:
        "200":
          description: Global handle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalHandle"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /profiles/me/global-handle/upgrade-quote:
    post:
      tags:
        - Profiles
      summary: Quote a paid upgrade into a cleaner .pirate handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - desired_label
              properties:
                desired_label:
                  type: string
      responses:
        "200":
          description: Upgrade quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandleUpgradeQuote"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
  /profiles/{user_id}:
    get:
      tags:
        - Profiles
      summary: Get a public profile
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /communities:
    post:
      tags:
        - Communities
      summary: Create a community
      description: |
        Creates a community once all create-time prerequisites are already satisfied.

        For namespace-backed public v0 create, the server must consume the accepted namespace-verification resource referenced by `namespace.namespace_verification_id`, not just the raw identifier string. Before writing any community state, the server must re-check:

        - the accepted namespace verification exists
        - it belongs to the requesting creator
        - it is still accepted and not stale, disputed, or expired
        - its current capabilities still satisfy `community_attach_allowed`

        Public v0 create must fail closed when those checks do not pass.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityRequest"
      responses:
        "202":
          description: Community creation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCreateAcceptedResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      tags:
        - Communities
      summary: List communities
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: artist_identity_id
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Communities
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Community"
                  next_cursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
  /communities/{community_id}:
    get:
      tags:
        - Communities
      summary: Get a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Communities
      summary: Update mutable community settings
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommunityRequest"
      responses:
        "200":
          description: Community updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/attach-governance:
    post:
      tags:
        - Communities
      summary: Attach or replace an external governance backend for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachGovernanceRequest"
      responses:
        "202":
          description: Governance attachment action accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAction"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/flairs:
    get:
      tags:
        - Communities
      summary: List flair definitions for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Community flair policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityFlairPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Communities
      summary: Replace or update flair definitions for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommunityFlairPolicyRequest"
      responses:
        "200":
          description: Community flair policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityFlairPolicy"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/community-profile:
    get:
      tags:
        - Communities
      summary: Get the community profile for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Community profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityProfile"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Communities
      summary: Update the community profile for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommunityProfileRequest"
      responses:
        "200":
          description: Community profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityProfile"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /communities/{community_id}/reference-links:
    get:
      tags:
        - Communities
      summary: List reference links for a community
      description: |
        Public callers receive public-safe link rows. Authorized community owners/admins receive the admin variant with verification workflow fields.
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      responses:
        "200":
          description: Community reference links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkListResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Communities
      summary: Add a reference link to a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityReferenceLinkRequest"
      responses:
        "201":
          description: Reference link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkAdmin"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/reference-links/{community_reference_link_id}:
    get:
      tags:
        - Communities
      summary: Get a reference link for a community
      description: |
        Public callers receive the public-safe link shape. Authorized community owners/admins receive the admin variant with verification workflow fields.
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      responses:
        "200":
          description: Community reference link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkReadResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Communities
      summary: Update a reference link for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommunityReferenceLinkRequest"
      responses:
        "200":
          description: Community reference link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkAdmin"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/reference-links/{community_reference_link_id}/archive:
    post:
      tags:
        - Communities
      summary: Archive a reference link for a community
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      responses:
        "200":
          description: Community reference link archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkAdmin"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /communities/{community_id}/reference-links/{community_reference_link_id}/verify:
    post:
      tags:
        - Communities
      summary: Start or refresh verification for a reference link
      description: |
        This starts an async verification attempt for an eligible reference link. The server creates a proof attempt, generates any required challenge code, and updates the link to `pending`. Clients poll the link read surface for status updates.
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCommunityReferenceLinkRequest"
      responses:
        "202":
          description: Reference-link verification accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkAdmin"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /communities/{community_id}/reference-links/{community_reference_link_id}/revoke:
    post:
      tags:
        - Communities
      summary: Revoke the current verified proof for a reference link
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeCommunityReferenceLinkRequest"
      responses:
        "200":
          description: Reference-link verification revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkAdmin"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /communities/{community_id}/reference-links/{community_reference_link_id}/proofs:
    get:
      tags:
        - Communities
      summary: List proof attempts for a reference link
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
      responses:
        "200":
          description: Reference-link proof attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityReferenceLinkProofListResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /communities/{community_id}/reference-links/{community_reference_link_id}/proofs/{proof_id}/review:
    post:
      tags:
        - Communities
      summary: Review a proof attempt for a reference link
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/CommunityReferenceLinkId"
        - $ref: "#/components/parameters/CommunityReferenceLinkProofId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCommunityReferenceLinkProofRequest"
