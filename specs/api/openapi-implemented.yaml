          nullable: true
        pirate_dns_authority_verified:
          type: boolean
          nullable: true
        root_key_proof_verified:
          type: boolean
          nullable: true
        live_signature_verified:
          type: boolean
          nullable: true
        anchor_fresh_enough:
          type: boolean
          nullable: true
        owner_signed_updates_verified:
          type: boolean
          nullable: true
    NamespaceVerificationCapabilities:
      type: object
      description: |
        Derived capabilities from the current accepted assertions. These are technical capability outputs, not automatic product permission for namespace commerce.
      properties:
        club_attach_allowed:
          type: boolean
          nullable: true
        pirate_web_routing_allowed:
          type: boolean
          nullable: true
        pirate_subdomain_issuance_allowed:
          type: boolean
          nullable: true
        owner_signed_record_updates_allowed:
          type: boolean
          nullable: true
        pirate_subspace_issuance_allowed:
          type: boolean
          nullable: true
    NamespaceVerificationSession:
      type: object
      required:
        - namespace_verification_session_id
        - user_id
        - family
        - submitted_root_label
        - status
        - created_at
        - expires_at
      properties:
        namespace_verification_session_id:
          type: string
        namespace_verification_id:
          type: string
          nullable: true
          description: |
            Populated only when the session reaches `verified` and Pirate has issued an accepted verification reference.
        user_id:
          type: string
        family:
          type: string
          enum:
            - hns
            - spaces
        submitted_root_label:
          type: string
        normalized_root_label:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - inspecting
            - dns_setup_required
            - challenge_required
            - challenge_pending
            - verifying
            - verified
            - failed
            - expired
            - disputed
          description: |
            Shared namespace-verification session status.
            `dns_setup_required` is HNS-only and should not be used for Spaces sessions.
        challenge_kind:
          type: string
          enum:
            - dns_txt
            - schnorr_sign
          nullable: true
          description: |
            Family-specific challenge type for the current session.
            `dns_txt` is used by HNS-style TXT proof flows.
            `schnorr_sign` is used by Spaces root-signature proof flows.
        challenge_host:
          type: string
          nullable: true
          description: |
            Explicit record host for DNS TXT flows such as `_pirate.<root>`.
        challenge_txt_value:
          type: string
          nullable: true
          description: |
            Exact TXT content Pirate expects for DNS TXT verification flows.
        challenge_payload:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Family-specific challenge payload.
            Example HNS payload fields may include `host` and `txt_value`.
            Example Spaces payload fields may include `message`, `digest`, and signer metadata.
        challenge_expires_at:
          type: string
          format: date-time
          nullable: true
          description: Expiration time for the currently issued challenge, distinct from the overall namespace verification session expiry.
        setup_nameservers:
          type: array
          nullable: true
          items:
            type: string
          description: |
            Nameservers the user should publish for the Pirate-managed HNS path before TXT verification can continue.
        assertions:
          allOf:
            - $ref: "#/components/schemas/NamespaceVerificationAssertions"
          nullable: true
        capabilities:
          allOf:
            - $ref: "#/components/schemas/NamespaceVerificationCapabilities"
          nullable: true
        control_class:
          type: string
          enum:
            - single_holder_root
            - multisig_controlled_root
            - dao_controlled_root
            - burned_or_immutable_root
          nullable: true
        operation_class:
          type: string
          enum:
            - owner_managed_namespace
            - routing_only_namespace
            - pirate_delegated_namespace
            - owner_signed_updates_namespace
          nullable: true
        observation_provider:
          type: string
          nullable: true
          description: |
            Trusted provider used for the most recent accepted namespace-verification observation in public v0.
        evidence_bundle_ref:
          type: string
          nullable: true
        failure_reason:
          type: string
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    NamespaceVerification:
