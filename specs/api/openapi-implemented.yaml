      operationId: notifications_dismiss_task
      tags:
        - Notifications
      summary: Dismiss a user task
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissTaskRequest"
      responses:
        "200":
          description: Task dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTask"
  /jobs/{job_id}:
    get:
      tags:
        - Jobs
      summary: Inspect a pollable async job
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    paymentAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Payment credential sent as `Authorization: Payment ...` on retry after an MPP `402 Payment Required` challenge.
  parameters:
    CommunityId:
      in: path
      name: community_id
      required: true
      schema:
        type: string
    NamespaceId:
      in: path
      name: namespace_id
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    PostId:
      in: path
      name: post_id
      required: true
      schema:
        type: string
    SongArtifactBundleId:
      in: path
      name: song_artifact_bundle_id
      required: true
      schema:
        type: string
    SongArtifactUploadId:
      in: path
      name: song_artifact_upload_id
      required: true
      schema:
        type: string
    LiveRoomId:
      in: path
      name: live_room_id
      required: true
      schema:
        type: string
    TrackId:
      in: path
      name: track_id
      required: true
      schema:
        type: string
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
    ModerationCaseId:
      in: path
      name: moderation_case_id
      required: true
      schema:
        type: string
    VerificationSessionId:
      in: path
      name: verification_session_id
      required: true
      schema:
        type: string
    AgentOwnershipSessionId:
      in: path
      name: agent_ownership_session_id
      required: true
      schema:
        type: string
    AgentId:
      in: path
      name: agent_id
      required: true
      schema:
        type: string
    NamespaceVerificationSessionId:
      in: path
      name: namespace_verification_session_id
      required: true
      schema:
        type: string
    NamespaceVerificationId:
      in: path
      name: namespace_verification_id
      required: true
      schema:
        type: string
    CommunityReferenceLinkId:
      in: path
      name: community_reference_link_id
      required: true
      schema:
        type: string
    CommunityReferenceLinkProofId:
      in: path
      name: proof_id
      required: true
      schema:
        type: string
    FeedSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - best
          - top
          - new
    Locale:
      in: query
      name: locale
      description: |
        Optional locale override for localized read surfaces. When omitted, the server should resolve locale using the SSR precedence contract.
      schema:
        type: string
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
    TopWindow:
      in: query
      name: top_window
      schema:
        type: string
        enum:
          - now
          - today
          - this_week
          - this_month
          - all_time
    LabelId:
      in: query
      name: label_id
      schema:
        type: string
        nullable: true
  responses:
    AuthError:
      description: Authentication failed
      content:
        application/json:
          examples:
            default:
              summary: Standard auth failure
              value:
                code: auth_error
                message: Authentication failed
                retryable: false
          schema:
            $ref: "#/components/schemas/Error"
    PaymentRequired:
      description: Payment is required before the resource can be accessed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MppChallenge"
    PaymentRequiredOrFailed:
      description: Payment is required or a payment attempt failed
      headers:
        WWW-Authenticate:
          description: MPP payment challenge header
          schema:
            type: string
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MppChallenge"
              - $ref: "#/components/schemas/PaymentFailure"
    VerificationRequired:
      description: Verification is required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MppExportForbidden:
      description: Export blocked by a community gate or export-eligibility rule
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GateFailed:
      description: Community gate or membership rule failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EligibilityFailed:
      description: Policy or eligibility requirement failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingTrustTierTooLow:
      description: The requested posting action is not available at the author's current community trust level
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PostingQuotaExhausted:
      description: The requested posting action is temporarily unavailable until the relevant posting window resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AnalysisBlocked:
      description: Content analysis blocked publication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Request rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - bad_request
            - auth_error
            - payment_required
            - verification_required
            - eligibility_failed
            - gate_failed
            - posting_trust_tier_too_low
            - posting_quota_exhausted
            - analysis_blocked
            - analysis_review_required
            - label_required
            - invalid_label_selection
            - label_required_but_none_applicable
            - conflict
            - not_found
            - rate_limited
            - payment_failed
            - settlement_pending
            - provider_unavailable
            - internal_error
        message:
          type: string
        retryable:
          type: boolean
          default: false
        details:
          type: object
          nullable: true
          additionalProperties: true
    SessionExchangeResponse:
      type: object
      required:
        - access_token
        - user
        - profile
        - onboarding
        - wallet_attachments
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        profile:
          $ref: "#/components/schemas/Profile"
        onboarding:
          $ref: "#/components/schemas/OnboardingStatus"
        wallet_attachments:
          type: array
          description: |
            Wallet attachments available to the authenticated Pirate user at session bootstrap time.
            This lets clients render the active execution wallet without relying on provider SDK
            side channels or an immediate follow-up fetch. This field is always present. In the first
            executable `jwt_based_auth` slice, newly created JWT-path users return `[]` because that
            request variant does not create wallet attachments.
          items:
            $ref: "#/components/schemas/WalletAttachmentSummary"
    User:
      type: object
      description: |
        Public user read model. Sensitive verified-identity fields that may exist on the canonical user row, such as `date_of_birth`, `age_at_verification`, `identity_nullifier_hash`, and `verification_session_id`, are intentionally omitted from this schema in v0.
      required:
        - user_id
        - verification_state
        - verification_capabilities
        - created_at
        - updated_at
      properties:
        user_id:
          type: string
        community_posting_state:
          type: object
          nullable: true
          properties:
            community_ref:
              type: string
            community_id:
              type: string
            has_created_text_post:
              type: boolean
        primary_wallet_attachment_id:
          type: string
          nullable: true
        verification_state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - reverification_required
        capability_provider:
          type: string
          enum:
            - self
            - very
          nullable: true
          description: |
            Convenience summary for the provider that produced the most recent accepted core capability set. Per-capability `provider` fields inside `verification_capabilities` remain authoritative.
        verification_capabilities:
          $ref: "#/components/schemas/VerificationCapabilities"
        verified_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VerificationCapabilities:
      type: object
      required:
        - unique_human
        - age_over_18
        - nationality
        - gender
        - sanctions_clear
        - wallet_score
      properties:
        unique_human:
          $ref: "#/components/schemas/VerificationCapabilityState"
        age_over_18:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            proof_type:
              type: string
              enum:
                - age_over_18
              nullable: true
        nationality:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            proof_type:
              type: string
              enum:
                - nationality
              nullable: true
            value:
              type: string
              nullable: true
              description: ISO country code when verified
        gender:
          allOf:
            - $ref: "#/components/schemas/VerifiedCapabilityState"
          type: object
          properties:
            value:
              type: string
              enum:
                - M
                - F
              nullable: true
              description: Verified document marker value when disclosed by an eligible Self flow; currently limited to `M` or `F`
            proof_type:
              type: string
              enum:
                - gender
              nullable: true
        sanctions_clear:
          $ref: "#/components/schemas/SanctionsClearCapabilityState"
        wallet_score:
          $ref: "#/components/schemas/WalletScoreCapabilityState"
      description: |
        Current resolved account-level verification capability state. Public-v0 product policy should
        treat these capabilities as reusable until they expire, are revoked, or are replaced by a
        fresher accepted proof. For interactive identity capabilities, Pirate should use reactive
        refresh at gate time rather than background renewal. `gender` remains a high-sensitivity
        document-marker disclosure even when enabled as a supported gate capability.
    RequestedVerificationCapability:
      type: string
      enum:
        - unique_human
        - age_over_18
        - nationality
        - gender
      description: |
        Canonical capability requested from an interactive verification flow. Public v0 should treat
        `unique_human`, `age_over_18`, `nationality`, and a document-derived `gender` marker as the
        actively supported Self-backed capability set.
    VerificationIntent:
      type: string
      enum:
        - profile_verification
        - community_creation
        - community_join
        - post_access_18_plus
        - commerce_pricing
        - qualifier_disclosure
    VerificationCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for unique_human, which may be pending during an active verification session.
        Public-v0 product policy should treat `expired` as requiring a fresh verification before the
        next gated action that depends on this capability.
      properties:
        state:
          type: string
          enum:
            - unverified
            - pending
            - verified
            - expired
        provider:
          type: string
          enum:
            - self
            - very
          nullable: true
        proof_type:
          type: string
          enum:
            - unique_human
          nullable: true
        mechanism:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    VerifiedCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for Self-backed disclosure capabilities in v0. These capabilities have no
        pending state — they are either unverified, verified from an accepted record, or expired after
        a re-verification requirement. Public-v0 refresh should be reactive at gate time rather than
        background or silent.
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
        provider:
          type: string
          enum:
            - self
          nullable: true
        proof_type:
          type: string
          enum:
            - age_over_18
            - nationality
            - gender
          nullable: true
        mechanism:
          type: string
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    SanctionsClearCapabilityState:
      type: object
      required:
        - state
      description: |
        Capability state for Human Passport-backed sanctions screening in v0.
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
        provider:
          type: string
          enum:
            - passport
          nullable: true
        proof_type:
          type: string
          enum:
            - sanctions_clear
          nullable: true
        mechanism:
          type: string
          enum:
            - CleanHands
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
    WalletScoreCapabilityState:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - unverified
            - verified
            - expired
        provider:
          type: string
          enum:
            - passport
          nullable: true
        proof_type:
          type: string
          enum:
            - wallet_score
          nullable: true
        mechanism:
          type: string
          enum:
            - stamps-api-v2
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        score:
          type: number
          nullable: true
        score_threshold:
          type: number
          nullable: true
        passing_score:
          type: boolean
          nullable: true
        last_score_timestamp:
          type: string
          format: date-time
          nullable: true
        expiration_timestamp:
          type: string
          format: date-time
          nullable: true
        stamps:
          type: array
          nullable: true
          items:
            type: object
            properties:
              stamp_name:
                type: string
              stamp_score:
                type: number
    StartVerificationSessionRequest:
      type: object
      required:
        - provider
      description: |
        Start an interactive verification session for a provider that requires a frontend launch flow.
        This surface is intentionally limited to interactive providers such as `self` and `very`.
        Human Passport wallet-score refresh is not modeled as a verification session because it is
        a server-side score lookup by address rather than a QR, widget, or redirect ceremony.

        The server should treat this request as capability-driven. Clients should not ask the user to
        manually choose raw Self disclosures such as `minimum_age` or `nationality`; the backend should
        compile the provider-specific launch payload from the missing canonical capabilities and the
        current product intent.
      properties:
        provider:
          type: string
          enum:
            - self
            - very
        provider_mode:
          type: string
          enum:
            - qr_deeplink
            - widget
          nullable: true
          description: |
            Optional requested launch mode. `self` sessions resolve to `qr_deeplink`.
            `very` sessions resolve to `widget` in public v0.
        requested_capabilities:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RequestedVerificationCapability"
          description: |
            Capability set the session is intended to satisfy. The server owns the provider-specific
            verifier configuration and maps this request to an approved launch payload.

            Public-v0 intent:
            - `very`: `unique_human` only
            - `self`: `unique_human`, `age_over_18`, `nationality`, and `gender` (document marker)

            When a Self session requests `age_over_18`, `nationality`, or `gender`, the server should
            also treat `unique_human` as part of the effective capability set.
        wallet_attachment_id:
          type: string
          nullable: true
        verification_intent:
          $ref: "#/components/schemas/VerificationIntent"
          nullable: true
          description: |
            Product-flow identifier such as `profile_verification`, `community_creation`,
            `commerce_pricing`, or `qualifier_disclosure`.
        policy_id:
          type: string
          nullable: true
          description: |
            Optional server-defined verification policy identifier. When supplied, the server should
            use this policy as the source of truth for provider-specific verifier settings rather than
            trusting client-authored disclosure or widget configuration.
    CompleteVerificationSessionRequest:
      type: object
      description: |
        Provider-agnostic completion or refresh payload for an interactive verification session.
        Fields are optional because some providers complete asynchronously while others return proof
        material to the frontend first.
      properties:
        attestation_id:
          type: string
          nullable: true
        proof:
          type: string
          nullable: true
          description: |
            Provider proof material returned to the browser and forwarded to Pirate for final
            verification. This is currently required for the working Very bridge flow.
        proof_hash:
          type: string
          nullable: true
        provider_payload_ref:
          type: string
          nullable: true
          description: |
            Opaque server-side reference to provider callback payload or proof material already stored
            by the backend.
    ProviderVerificationCallbackRequest:
      type: object
      description: |
        Generic callback envelope used by server-owned verification callback handlers.
        Providers may send raw proof material, redirect parameters, or opaque event data.
      properties:
        provider:
          type: string
          enum:
            - self
            - very
        event_type:
          type: string
          nullable: true
        attestation_id:
          type: string
          nullable: true
        proof_hash:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Opaque provider callback body as received or normalized by Pirate. Clients should not
            infer a shared schema across providers.
            Examples:
            - `self`: relayer payloads may include fields such as `attestationId`, `proof`,
              `publicSignals`, and `userContextData`
            - `very`: widget success payloads may include proof or result fields returned from the
              provider-managed widget flow
    SelfVerificationDisclosures:
      type: object
      description: |
        Server-resolved disclosure and policy config for a Self launch payload.
        This is backend-authored provider wiring, not a public community-settings surface.
        Public-v0 community and join flows should primarily rely on:
        - `minimum_age`
        - `nationality`
        - `gender` (document marker)

        Other Self disclosure knobs remain modeled for future or operator-controlled use, but public-v0
        product flows should not expose raw Self `ofac` or `excluded_countries` settings as first-class
        community toggles until Pirate locks their canonical capability and moderation semantics.
      properties:
        issuing_state:
          type: boolean
          nullable: true
        name:
          type: boolean
          nullable: true
        passport_number:
          type: boolean
          nullable: true
        nationality:
          type: boolean
          nullable: true
        date_of_birth:
          type: boolean
          nullable: true
        gender:
          type: boolean
          nullable: true
        expiry_date:
          type: boolean
          nullable: true
        ofac:
          type: boolean
          nullable: true
        excluded_countries:
          type: array
          nullable: true
          items:
            type: string
        minimum_age:
          type: integer
          nullable: true
    SelfVerificationLaunch:
      type: object
      description: |
        Pirate's server-resolved Self launch payload. This is not a direct one-to-one mapping of the
        Self SDK constructor; clients must map these fields to the SDK's expected parameters rather
        than spreading this object directly into `SelfAppBuilder`.
      required:
        - app_name
        - endpoint
        - endpoint_type
        - scope
        - session_id
        - user_id
        - user_id_type
        - disclosures
      properties:
