  /onboarding/reddit-verification:
    post:
      tags:
        - Onboarding
      summary: Start or refresh Reddit ownership verification
      description: |
        Idempotent Reddit ownership verification entrypoint.

        Repeated `POST` requests are the intended polling/check mechanism in v0.

        Server behavior:

        - when no active verification session exists, create a new pending session, issue a verification code, and return `status = pending`
        - when an unexpired pending session exists, re-check the user's Reddit profile/about surface for the issued code and return the updated verification state
        - when the prior session expired, create a fresh pending session with a new code
        - when verification already succeeded for the same user and username, return the verified state

        Recommended v0 policy:

        - pending verification sessions expire after `15 minutes`
        - the server should track repeated checks and may surface `failure_code = rate_limited` when the caller exceeds the per-session check budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reddit_username
              properties:
                reddit_username:
                  type: string
      responses:
        "200":
          description: Reddit verification state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedditVerification"
        "401":
          $ref: "#/components/responses/AuthError"
        "429":
          $ref: "#/components/responses/RateLimited"
