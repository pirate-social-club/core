      summary: Create a community
      description: |
        Creates a community once all create-time prerequisites are already satisfied.

        When `namespace` is provided, the server must consume the accepted namespace-verification resource referenced by `namespace.namespace_verification_id`, not just the raw identifier string. Before writing any community state, the server must re-check:

        - the accepted namespace verification exists
        - it belongs to the requesting creator
        - it is still accepted and not stale, disputed, or expired
        - its current capabilities still satisfy `club_attach_allowed`

        When `namespace` is omitted, the community is created without a namespace. A namespace can be attached later via the namespace-attachment endpoint.

        Public v0 create must fail closed when namespace is provided but those checks do not pass.
