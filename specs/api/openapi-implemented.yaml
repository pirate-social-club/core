          type: string
          description: Root label as entered by the creator before server normalization.
    CompleteNamespaceVerificationSessionRequest:
      type: object
      description: |
        Trigger a refresh of challenge observations and assertion derivation after the creator has completed the required proof step. The body is optional because many implementations can treat this as an idempotent recheck.
      properties:
        restart_challenge:
          type: boolean
          nullable: true
          description: |
            Optional hint to invalidate the current challenge and issue a new one if the creator wants to restart the proof flow.
        signature_payload:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Optional family-specific completion payload supplied by the client.
            Spaces flows may use this to submit a Schnorr signature plus related signer metadata.
            HNS flows normally leave this unset because completion is resolver-driven rather than signature-submission driven.
