  /communities/{community_id}/song-artifacts:
    post:
      tags:
        - Posts
      summary: Register a mainline song artifact bundle for a community
      description: |
        Registers song artifact upload references into a bundle for later post creation. This endpoint does not upload binaries and does not publish a post.

        All artifact inputs must reference previously created upload intents whose `status` is `uploaded`. The server resolves each `song_artifact_upload_id` into the corresponding storage ref and metadata. Callers must not submit freeform `storage_ref` descriptors directly.

        After registration, the bundle transitions through validation (`draft` -> `validating` -> `ready` or `failed`). Only a bundle in `ready` state may be used for song post creation. The server validates mime types, required fields, and package completeness during the `validating` transition.

        Public v0 mainline rules for this first slice:

        - caller must be an authenticated community member
        - caller must satisfy `verification_capabilities.unique_human.state = verified`
        - `primary_audio` upload reference and non-empty `lyrics` are required
        - optional `cover_art`, `preview_audio`, `canvas_video`, `instrumental_audio`, and `vocal_audio` are accepted as upload references only
        - no cover-art or canvas geometry enforcement is performed in this first implemented slice
      parameters:
        - $ref: "#/components/parameters/CommunityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongArtifactBundleRequest"
      responses:
        "201":
          description: Song artifact bundle registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongArtifactBundle"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/VerificationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/PostingQuotaExhausted"
  /communities/{community_id}/song-artifacts/{song_artifact_bundle_id}:
    get:
      tags:
        - Posts
      summary: Read a registered song artifact bundle
      description: |
        Returns a previously registered mainline song artifact bundle. In the current implemented slice, direct reads are limited to the bundle creator.
      parameters:
        - $ref: "#/components/parameters/CommunityId"
        - $ref: "#/components/parameters/SongArtifactBundleId"
      responses:
        "200":
          "401":
            $ref: "#/components/responses/AuthError"
          "404":
            $ref: "#/components/responses/NotFound"
          description: Song artifact bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongArtifactBundle"
    communities_by_community_id_provenance_policy:
      get:
        tags:
          - Communities
        summary: Get the active provenance policy for a community
        description: |
          Returns the resolved effective provenance policy. When the community has not explicitly configured a provenance policy yet, the server must return the restrictive default policy with `policy_origin = default`.
        parameters:
          - $ref: "#/components/parameters/CommunityId"
        responses:
          "200":
            description: Community provenance policy
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CommunityProvenancePolicy"
          "401":
            $ref: "#/components/responses/AuthError"
          "404":
            $ref: "#/components/responses/NotFound"
      patch:
        tags:
          - Communities
        summary: Configure or update the provenance policy for a community
        description: |
          Stores an explicit community provenance policy for creator-relation claims and false-claim-of-ownership enforcement. Changes apply prospectively to future posts and moderation decisions, but does not retroactively reclassify existing posts.
        parameters:
          - $ref: "#/components/parameters/CommunityId"
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCommunityProvenancePolicyRequest"
        responses:
          "200":
            description: Community provenance policy updated
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CommunityProvenancePolicy"
          "401":
            $ref: "#/components/responses/AuthError"
          "403":
            $ref: "#/components/responses/EligibilityFailed"
          "404":
            $ref: "#/components/responses/NotFound"
          "409":
            $ref: "#/components/responses/Conflict"
          "429":
            $ref: "#/components/responses/RateLimited"
    communities_by_community_id_promotion_policy:
      get:
        tags:
          - Communities
        summary: Get the active promotion policy for a community
        description: |
          Returns the resolved effective promotion policy. When the community has not explicitly configured a promotion policy yet, the server must return the default policy with `policy_origin = default`.
        parameters:
          - $ref: "#/components/parameters/CommunityId"
        responses:
          "200":
            description: Community promotion policy
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CommunityPromotionPolicy"
          "401":
            $ref: "#/components/responses/AuthError"
          "404":
            $ref: "#/components/responses/NotFound"
      patch:
        tags:
          - Communities
        summary: Configure or update the promotion policy for a community
        description: |
          Stores an explicit community promotion policy for self-promotion, affiliation disclosure, and participation-ratio enforcement. Changes apply prospectively to future posts and moderation decisions, but does not retroactively reclassify existing posts.
        parameters:
          - $ref: "#/components/parameters/CommunityId"
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCommunityPromotionPolicyRequest"
        responses:
          "200":
            description: Community promotion policy updated
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CommunityPromotionPolicy"
          "401":
            $ref: "#/components/responses/AuthError"
          "403":
            $ref: "#/components/responses/EligibilityFailed"
          "404":
            $ref: "#/components/responses/NotFound"
          "409":
            $ref: "#/components/responses/Conflict"
          "429":
            $ref: "#/components/responses/RateLimited"
  /posts/{post_id}:
    get:
      tags:
        - Posts
      summary: Get a post
      description: |
        Returns a localized canonical post read.

        Published posts are readable to callers with community access. Non-published posts such as review-held drafts are only readable to the post author or the community owner in the current v0 implemented surface.
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/Locale"
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalizedPostResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /posts/{post_id}/vote:
    post:
      tags:
        - Posts
      summary: Cast or update a vote on a post
      description: |
        Public v0 voting requires community membership plus `verification_capabilities.unique_human.state = verified`
        from an accepted human-verification provider such as `self` or `very`.
        User-owned agents must not cast votes through this surface in v0.
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  type: integer
                  enum:
                    - -1
                    - 1
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostVoteResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/VerificationRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
  /comments/{comment_id}:
    delete:
      tags:
        - Comments
      summary: Tombstone a comment
      parameters:
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200":
          description: Comment tombstoned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/EligibilityFailed"
        "404":
          $ref: "#/components/responses/NotFound"
  /comments/{comment_id}/replies:
    get:
      tags:
        - Comments
      summary: List direct replies for a comment
      parameters:
        - $ref: "#/components/parameters/CommentId"
        - $ref: "#/components/parameters/FeedSort"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Direct replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Comments
      summary: Create a reply beneath a comment
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/VerificationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
  /comments/{comment_id}/context:
    get:
      tags:
        - Comments
      summary: Load permalink context for a comment
      parameters:
        - $ref: "#/components/parameters/CommentId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Comment context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentContext"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"
  /comments/{comment_id}/vote:
    post:
      tags:
        - Comments
      summary: Cast or update a vote on a comment
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - value
              properties:
                value:
                  type: integer
                  enum:
                    - -1
                    - 1
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentVoteResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/VerificationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
  /notifications/summary:
    get:
      operationId: notifications_summary
      tags:
        - Notifications
      summary: Get notification summary for badge state
      responses:
        "200":
          description: Notification summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
  /notifications/tasks:
    get:
      operationId: notifications_tasks
      tags:
        - Notifications
      summary: List open tasks for the current user
      responses:
        "200":
          description: User tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationTasksResponse"
  /notifications/feed:
    get:
      operationId: notifications_feed
      tags:
        - Notifications
      summary: List activity feed items for the current user
      parameters:
        - name: cursor
