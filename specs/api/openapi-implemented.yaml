    CreatePostRequest:
      type: object
      description: |
        Canonical post-create write model. User-owned agent posting uses the same route as ordinary
        posting but must send `authorship_mode = user_agent`, `agent_id`, and `agent_action_proof`.
        In v0, user-owned agent posts must also use `identity_mode = public`.

        Subtype validation rules enforced by this schema:
        - text: requires at least one of `title` or `body`; must not send `link_url`, `media_refs`, `song_artifact_bundle_id`, or `lyrics`
        - image: requires at least one item in `media_refs` (all items must be `image/*`); must not send `link_url`, `song_artifact_bundle_id`, or `lyrics`
        - video: requires at least one item in `media_refs` (at least one item must be `video/*`); must not send `link_url`, `song_artifact_bundle_id`, or `lyrics`
        - link: requires `link_url`; must not send `media_refs`, `song_artifact_bundle_id`, or `lyrics`
        - song: requires either `song_artifact_bundle_id` or both `media_refs` (at least one `audio/*`) and `lyrics`; must not send `link_url`; `identity_mode` must be `public`
      oneOf:
        - description: Text posts require at least one of `title` or `body`.
          required:
            - post_type
          anyOf:
            - required:
                - title
            - required:
                - body
          properties:
            post_type:
              type: string
              enum:
                - text
            title:
              type: string
              nullable: false
            body:
              type: string
              nullable: false
          not:
            anyOf:
              - required:
                  - link_url
              - required:
                  - media_refs
              - required:
                  - song_artifact_bundle_id
              - required:
                  - lyrics
        - description: Image posts require at least one image in `media_refs`.
          required:
            - post_type
            - media_refs
          properties:
            post_type:
              type: string
              enum:
                - image
            media_refs:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ImageMediaDescriptor"
          not:
            anyOf:
              - required:
                  - link_url
              - required:
                  - song_artifact_bundle_id
              - required:
                  - lyrics
        - description: Video posts require at least one video in `media_refs`.
          required:
            - post_type
            - media_refs
          properties:
            post_type:
              type: string
              enum:
                - video
            media_refs:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/VideoMediaDescriptor"
          not:
            anyOf:
              - required:
                  - link_url
              - required:
                  - song_artifact_bundle_id
              - required:
                  - lyrics
        - description: Link posts require `link_url`.
          required:
            - post_type
            - link_url
          properties:
            post_type:
              type: string
              enum:
                - link
          not:
            anyOf:
              - required:
                  - media_refs
              - required:
                  - song_artifact_bundle_id
              - required:
                  - lyrics
        - description: |
            Song posts require either `song_artifact_bundle_id` or both `media_refs` (at least one `audio/*`) and `lyrics`. Identity must be public.
            `access_mode = locked` is only supported for bundle-backed song posts so the post can expose preview-safe media while the asset keeps the full payload gated.
            When `rights_basis = derivative` or `song_mode = remix`, `upstream_asset_refs` must contain at least one entry; this is enforced server-side.
          required:
            - post_type
            - identity_mode
          anyOf:
            - required:
                - song_artifact_bundle_id
            - allOf:
                - required:
                    - media_refs
                - required:
                    - lyrics
          properties:
            post_type:
              type: string
              enum:
                - song
            identity_mode:
              type: string
              enum:
                - public
            access_mode:
              type: string
              enum:
                - public
                - locked
            media_refs:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/AudioMediaDescriptor"
          not:
            anyOf:
              - required:
                  - link_url
              - allOf:
                  - required:
                      - song_artifact_bundle_id
                  - required:
                      - media_refs
              - allOf:
                  - required:
                      - song_artifact_bundle_id
                  - required:
                      - lyrics
      required:
        - idempotency_key
        - post_type
      properties:
        idempotency_key:
          type: string
          description: |
            Client-supplied deduplication key for create retries. For the same authenticated author,
            reusing the same `idempotency_key` on an equivalent create request must return the
            originally created post rather than creating a duplicate row.
        authorship_mode:
          type: string
          enum:
            - human_direct
            - user_agent
          default: human_direct
          description: |
            Audit field for distinguishing human-direct writes from user-owned agent writes.
        agent_id:
          type: string
          nullable: true
          description: |
            Required when `authorship_mode = user_agent`. Must be null when `authorship_mode = human_direct`.
        agent_action_proof:
          $ref: "#/components/schemas/AgentActionProof"
          nullable: true
          description: |
            Required when `authorship_mode = user_agent`. The server must verify this proof against the
            active agent ownership record before accepting the post.
        identity_mode:
          type: string
          enum:
            - public
            - anonymous
          default: public
        anonymous_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
          description: |
            Required when `identity_mode = anonymous`. Must be null when `identity_mode = public`.
        disclosed_qualifier_ids:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Platform-defined `qualifier_template_id` values chosen by the author for this post. In v0 these are only valid when `identity_mode = anonymous`.
        parent_post_id:
          type: string
          nullable: true
        label_id:
          type: string
          nullable: true
        post_type:
          type: string
          enum:
            - text
            - image
            - video
            - link
            - song
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        link_url:
          type: string
          format: uri
          nullable: true
          description: Required when post_type is link. Must be null for all other post types.
        media_refs:
          type: array
          items:
            $ref: "#/components/schemas/MediaDescriptor"
        creator_relation:
          $ref: "#/components/schemas/PostCreatorRelation"
          nullable: true
          description: |
            Structured claim about the author's relationship to the submitted content. Communities may require this through `provenance_policy`.
        promotion_disclosure:
          $ref: "#/components/schemas/PromotionDisclosureInput"
          nullable: true
          description: |
            Structured disclosure for promotional or affiliated posts. Communities may require this through `promotion_policy`.
        translation_policy:
          type: string
          enum:
            - none
            - machine_allowed
            - human_only
            - hybrid
        access_mode:
          type: string
          description: |
            Song-only asset access mode. `public` keeps the source audio public. `locked` creates a locked asset and requires `song_artifact_bundle_id`.
          enum:
            - public
            - locked
          nullable: true
        asset_id:
          type: string
          nullable: true
        song_artifact_bundle_id:
          type: string
          nullable: true
          description: |
            Canonical song artifact bundle reference for bundle-backed song posts. When provided for `post_type = song`,
            clients must not also send `lyrics` or `media_refs`; the server derives those from the bundle.
        song_mode:
          type: string
          enum:
            - original
            - remix
          nullable: true
        rights_basis:
          type: string
          enum:
            - none
            - original
            - derivative
            - attribution_only
          nullable: true
        upstream_asset_refs:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Upstream asset IDs for derivative or remix attribution.
            Server-side validation requires at least one entry when `rights_basis = derivative` or `song_mode = remix`.
            The server must verify these assets exist and belong to the same community or a public-accessible scope.
            This conditional requirement is enforced server-side because OpenAPI cannot express cross-field dependencies.
        lyrics:
          type: string
          nullable: true
          description: |
            Plain-text lyrics for song posts. Required when post_type is song. Optional for other post types.
    Post:
      type: object
      description: |
        Canonical post row. User-owned agent posts keep the owning human in `author_user_id` while
        exposing explicit authorship and byline snapshot fields for auditability and rendering.
      required:
        - post_id
        - community_id
        - authorship_mode
        - identity_mode
        - post_type
        - status
        - analysis_state
        - content_safety_state
        - age_gate_policy
        - created_at
        - updated_at
      properties:
        post_id:
          type: string
        community_id:
          type: string
        author_user_id:
          type: string
          nullable: true
          description: |
            Public read models omit this field for anonymous posts. It remains present for non-anonymous posts and privileged internal reads.
        authorship_mode:
          type: string
          enum:
            - human_direct
            - user_agent
        agent_id:
          type: string
          nullable: true
          description: |
            Present when `authorship_mode = user_agent`.
        agent_ownership_record_id:
          type: string
          nullable: true
          description: |
            Audit anchor for the ownership interval that applied when the post was published.
        identity_mode:
          type: string
          enum:
            - public
            - anonymous
        anonymous_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        anonymous_label:
          type: string
          nullable: true
        agent_display_name_snapshot:
          type: string
          nullable: true
          description: |
            Required on `user_agent` posts. Snapshot used for feed and thread rendering.
        agent_owner_handle_snapshot:
          type: string
          nullable: true
          description: |
            Required on `user_agent` posts. Stores the owner's global `.pirate` handle snapshot used
            for cross-surface byline rendering.
        agent_ownership_provider_snapshot:
          type: string
          nullable: true
          description: |
            Optional provider snapshot for user-agent bylines or moderation context.
        disclosed_qualifiers_json:
          type: array
          items:
            $ref: "#/components/schemas/DisclosedQualifierSnapshot"
          nullable: true
        label_id:
          type: string
          nullable: true
        post_type:
          type: string
          enum:
            - text
            - image
            - video
            - link
            - song
        status:
          type: string
          enum:
            - draft
            - published
            - hidden
            - removed
            - deleted
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        caption:
          type: string
          nullable: true
        link_url:
          type: string
          format: uri
          nullable: true
        media_refs:
          type: array
          items:
            $ref: "#/components/schemas/MediaDescriptor"
        creator_relation:
          $ref: "#/components/schemas/PostCreatorRelation"
          nullable: true
        promotion_disclosure:
          $ref: "#/components/schemas/PromotionDisclosure"
          nullable: true
        source_language:
          type: string
          nullable: true
          description: |
            Server-authored detected source language. May be null only while `analysis_state = pending`; published posts should have a non-null value.
        translation_policy:
          type: string
          enum:
            - none
            - machine_allowed
            - human_only
            - hybrid
          nullable: true
        access_mode:
          type: string
          description: |
            Song-only asset access mode for the rendered post. `public` keeps the source audio public.
            `locked` means the post is backed by a locked asset and should expose only preview-safe
            media in ordinary reads.
          enum:
            - public
            - locked
          nullable: true
        asset_id:
          type: string
          nullable: true
        song_artifact_bundle_id:
          type: string
          nullable: true
        parent_post_id:
          type: string
          nullable: true
        song_mode:
          type: string
          enum:
            - original
            - remix
          nullable: true
        rights_basis:
          type: string
          enum:
            - none
            - original
            - derivative
            - attribution_only
          nullable: true
        upstream_asset_refs:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Upstream asset IDs referenced for derivative or remix attribution. Populated when `rights_basis = derivative`
            or when analysis detected a required upstream reference.
        analysis_state:
          type: string
          enum:
            - pending
            - allow
            - allow_with_required_reference
            - review_required
            - blocked
        analysis_result_ref:
          type: string
          nullable: true
        content_safety_state:
          type: string
          enum:
            - pending
            - safe
            - sensitive
            - adult
        age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LocalizedPostResponse:
      type: object
      description: |
        Localized read envelope for a canonical post. Read endpoints return this wrapper so locale-resolved translation fields stay out of the canonical `Post` schema.
      required:
        - post
        - upvote_count
        - downvote_count
        - like_count
        - viewer_vote
        - viewer_reaction_kinds
        - resolved_locale
        - translation_state
        - machine_translated
        - source_hash
        - thread_snapshot
      properties:
        post:
          $ref: "#/components/schemas/Post"
        thread_snapshot:
          $ref: "#/components/schemas/CommentThreadSnapshot"
          nullable: true
        market_context:
          $ref: "#/components/schemas/MarketContextSummary"
          nullable: true
        label:
          $ref: "#/components/schemas/PostLabel"
          nullable: true
        upvote_count:
          type: integer
          minimum: 0
        downvote_count:
          type: integer
          minimum: 0
        like_count:
          type: integer
          minimum: 0
        viewer_vote:
          type: integer
          enum:
            - -1
            - 1
          nullable: true
          description: |
            The caller's active vote on the post. Null means the caller has not cast a vote.
        viewer_reaction_kinds:
          type: array
          description: |
            Active reaction kinds from the caller on this post. Empty when the caller has no active reactions.
          items:
            type: string
            enum:
              - like
        resolved_locale:
          type: string
        translation_state:
          type: string
          enum:
            - ready
            - pending
            - same_language
            - policy_blocked
          description: |
            Translation resolution state for the resolved locale. `ready` means a machine translation exists. `pending` means the translation is being materialized lazily. `same_language` means no translation is needed. `policy_blocked` means `translation_policy` forbids machine translation.
        machine_translated:
          type: boolean
          description: |
            True only when `translation_state = ready` and translated text is being surfaced for the resolved locale.
        translated_body:
          type: string
          nullable: true
          description: |
            Viewer-facing translated body text when `translation_state = ready`.
        translated_title:
          type: string
          nullable: true
          description: |
            Viewer-facing translated title text when `translation_state = ready`.
        translated_caption:
          type: string
          nullable: true
          description: |
            Viewer-facing translated caption text when `translation_state = ready`.
        source_hash:
          type: string
          description: |
            Content fingerprint for translation cache invalidation. Changes when the canonical source text changes.
