          nullable: true
        listing_id:
          type: string
          nullable: true
        replay_listing_id:
          type: string
          nullable: true
        anchor_post_id:
          type: string
          nullable: true
        initial_setlist:
          $ref: "#/components/schemas/InitialLiveSetlistInput"
    InitialLiveSetlistInput:
      type: object
      description: |
        Initial setlist payload required when creating a live room. The setlist may begin in `draft` state, but it must exist from creation time onward.
      required:
        - status
        - items
      properties:
        status:
          type: string
          enum:
            - draft
            - active
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LiveSetlistItemInput"
    LiveSetlistItemInput:
      type: object
      description: |
        Setlist items should resolve against Pirate's canonical track catalog by default. `title_text` and `artist_text` are display snapshots populated from the selected canonical track when available, with manual text entry used only as fallback when canonical resolution is not yet available.
      anyOf:
        - required:
            - declared_track_id
        - required:
            - title_text
      required:
        - sequence_index
      properties:
        sequence_index:
          type: integer
          minimum: 0
        title_text:
          type: string
          nullable: true
        artist_text:
          type: string
          nullable: true
        declared_track_id:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    LiveRoomPerformerAllocationInput:
      type: object
      description: |
        Explicit performer-side revenue allocation for the room. In v0, solo rooms should provide one host allocation at 100, and duet rooms should provide two allocations whose shares sum to 100.
      required:
        - user_id
        - role
        - share_pct
      properties:
        user_id:
          type: string
        role:
          type: string
          enum:
