          type: string
          format: date-time
          nullable: true
        access_mode:
          type: string
          enum:
            - free
            - gated
            - paid
        room_kind:
          type: string
          enum:
            - solo
            - duet
        visibility:
          type: string
          enum:
            - public
            - unlisted
