    NamespaceAttachmentInput:
      type: object
      required:
        - namespace_verification_id
      properties:
        namespace_verification_id:
          type: string
          description: |
            Opaque server-issued identifier for the previously accepted namespace verification session. The server resolves this to the underlying root-control evidence and assertions at create time. Creation must be rejected if the referenced verification is stale, disputed, or does not satisfy `club_attach_allowed` for the relevant protocol family. This field is required for public v0 create. Label and route fields below are derived from the verification session and are used for display and routing, not as proof of root control.
        display_label:
          type: string
          description: |
            Optional derived display label for the verified namespace root. Clients may omit this on create and let the server derive it from `namespace_verification_id`. If submitted, it must match the verified namespace session.
        normalized_label:
          type: string
          description: |
            Optional derived normalized root label. Clients may omit this on create and let the server derive it from `namespace_verification_id`. If submitted, it must match the verified namespace session.
        resolver_label:
          type: string
          nullable: true
          description: |
            Optional derived resolver-facing label for routing or downstream namespace operations. Clients may omit this on create and let the server derive it from `namespace_verification_id`.
        route_family:
          type: string
          nullable: true
          description: |
            Optional derived route family such as bare-label or `@`-style routing. Clients may omit this on create and let the server derive it from `namespace_verification_id`. If submitted, it must match the verified namespace session.
    HandlePolicyInput:
      type: object
      required:
        - policy_template
      properties:
        policy_template:
          type: string
          enum:
            - standard
            - premium
            - membership_gated
            - custom
          description: |
            Namespace handle-policy template. This describes how community-local handles should behave once claims are enabled. Public v0 new communities should normally start with `standard`, while claim and sale availability remain disabled until server-derived capability flags enable them.
        pricing_model:
          type: string
          enum:
            - free
            - flat_by_length
            - custom_curve
            - gated_then_flat
          nullable: true
          description: |
            Optional pricing model for commerce-enabled templates. This does not by itself enable public claims or sales; launch availability is controlled separately by server-derived capability flags.
        membership_required_for_claim:
          type: boolean
          default: true
    Community:
      type: object
      required:
        - community_id
        - display_name
        - status
        - provisioning_state
        - membership_mode
        - allow_anonymous_identity
        - human_verification_lane
        - agent_posting_policy
        - agent_posting_scope
        - accepted_agent_ownership_providers
        - governance_mode
        - donation_policy_mode
        - donation_partner_status
        - content_authenticity_policy
        - content_authenticity_detection_policy
        - market_context_policy
        - source_policy
        - capture_edit_policy
        - adult_content_policy
        - graphic_content_policy
        - motion_media_policy
        - language_policy
        - civility_policy
        - provenance_policy
        - promotion_policy
        - created_by_user_id
        - created_at
        - updated_at
      properties:
        community_id:
          type: string
        display_name:
          type: string
        description:
          type: string
          nullable: true
        avatar_ref:
          type: string
          nullable: true
        banner_ref:
          type: string
          nullable: true
        namespace_verification_id:
          type: string
          nullable: true
          description: |
            Attached accepted namespace-verification resource when the community is namespace-backed.
        route_slug:
          type: string
          nullable: true
        pending_namespace_verification_session_id:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - active
            - frozen
            - archived
            - deleted
        provisioning_state:
          type: string
          enum:
            - requested
            - provisioning
            - active
            - rotation_required
            - error
          description: |
            Community infrastructure lifecycle state. This is distinct from domain `status`.
            A community may be domain-active while infrastructure provisioning is still in progress.
        artist_identity_id:
          type: string
          nullable: true
        community_agent_user_id:
          type: string
          nullable: true
          description: |
            App-level system actor for platform-managed community content such as daily questions. In v0, this actor is exempt from ordinary member trust-tier minima and posting quotas when publishing system-tagged content.
        membership_mode:
          type: string
          enum:
            - open
            - request
            - gated
        allow_anonymous_identity:
          type: boolean
        anonymous_identity_scope:
          type: string
          enum:
            - community_stable
            - thread_stable
            - post_ephemeral
          nullable: true
        human_verification_lane:
          $ref: "#/components/schemas/HumanVerificationLane"
          description: |
            Resolved effective public-v0 human-verification lane for this community.
        allowed_disclosed_qualifiers:
          type: array
          items:
            type: string
          nullable: true
        allow_qualifiers_on_anonymous_posts:
          type: boolean
          nullable: true
          description: |
            Whether anonymous posts in the community may attach disclosed qualifiers from `allowed_disclosed_qualifiers`.
        root_post_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        reply_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        anonymous_posting_min_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
        root_post_quota_by_trust_tier:
          $ref: "#/components/schemas/RootPostQuotaByTrustTier"
          nullable: true
        reply_quota_by_trust_tier:
          $ref: "#/components/schemas/ReplyQuotaByTrustTier"
          nullable: true
        probation_window_days:
          type: integer
          nullable: true
        link_post_policy:
          type: string
          enum:
            - allow
            - require_established
          nullable: true
        default_age_gate_policy:
          type: string
          enum:
            - none
            - 18_plus
          description: |
            Community-wide default viewer age gate.
        agent_posting_policy:
          type: string
          enum:
            - disallow
            - review
            - allow_with_disclosure
            - allow
          description: |
            Resolved effective user-agent posting policy for this community.
        agent_posting_scope:
          type: string
          enum:
            - replies_only
            - top_level_and_replies
          description: |
            Resolved effective user-agent posting scope for this community.
        agent_daily_post_cap:
          type: integer
          nullable: true
          description: |
            Effective rolling 24-hour cap for user-agent top-level posts.
        agent_daily_reply_cap:
          type: integer
          nullable: true
          description: |
            Effective rolling 24-hour cap for user-agent replies.
        agent_min_owner_trust_tier:
          type: string
          enum:
            - new
            - established
            - trusted
            - high_trust
          nullable: true
          description: |
            Effective minimum trust tier the owning human must satisfy before their user-owned agent may post.
        agent_owner_active_limit:
          type: integer
          nullable: true
          description: |
            Effective community-local cap on active user-owned agents per human owner.
        accepted_agent_ownership_providers:
          type: array
          description: |
            Resolved effective accepted agent-ownership providers for this community. The server must
            always return the concrete effective provider set on reads, whether it came from an
            explicit override or from derivation based on `human_verification_lane` and the
            underlying trust floor.
          items:
            $ref: "#/components/schemas/AgentOwnershipProvider"
        civic_scale_tier:
          type: string
          enum:
            - club
            - village
            - town
            - city
            - state
          description: |
            Derived scale label for a community. This is a presentation and progression classification, not a different base entity type.
        donation_policy_mode:
          type: string
          enum:
            - none
            - optional_creator_sidecar
        donation_partner_status:
          type: string
          enum:
            - unconfigured
            - active
            - paused
        donation_partner_id:
          type: string
          nullable: true
        donation_partner:
          $ref: "#/components/schemas/DonationPartnerSummary"
          nullable: true
        content_authenticity_policy:
          $ref: "#/components/schemas/CommunityContentAuthenticityPolicy"
          description: |
            Resolved effective authenticity policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
        content_authenticity_detection_policy:
          $ref: "#/components/schemas/CommunityContentAuthenticityDetectionPolicy"
          description: |
            Resolved effective authenticity-detection policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default profile from an explicit community selection.
        market_context_policy:
          $ref: "#/components/schemas/CommunityMarketContextPolicy"
          description: |
            Resolved effective market-context policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default policy from an explicit community configuration.
        source_policy:
          $ref: "#/components/schemas/CommunitySourcePolicy"
          description: |
            Resolved effective source policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
        capture_edit_policy:
          $ref: "#/components/schemas/CommunityCaptureEditPolicy"
          description: |
            Resolved effective capture-edit policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        adult_content_policy:
          $ref: "#/components/schemas/CommunityAdultContentPolicy"
          description: |
            Resolved effective adult-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        graphic_content_policy:
          $ref: "#/components/schemas/CommunityGraphicContentPolicy"
          description: |
            Resolved effective graphic-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        motion_media_policy:
          $ref: "#/components/schemas/CommunityMotionMediaPolicy"
          description: |
            Resolved effective motion-media policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        language_policy:
          $ref: "#/components/schemas/CommunityLanguagePolicy"
          description: |
            Resolved effective language policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        civility_policy:
          $ref: "#/components/schemas/CommunityCivilityPolicy"
          description: |
            Resolved effective civility policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        openai_moderation_settings:
          type: object
          nullable: true
          additionalProperties: false
          properties:
            scan_titles:
              type: boolean
            scan_post_bodies:
              type: boolean
            scan_captions:
              type: boolean
            scan_link_preview_text:
              type: boolean
            scan_images:
              type: boolean
          description: |
            Optional moderation-scan toggles persisted in community settings for text and image
            surfaces. Null means the community is using the platform default moderation scan profile.
        provenance_policy:
          $ref: "#/components/schemas/CommunityProvenancePolicy"
          description: |
            Resolved effective provenance policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        promotion_policy:
          $ref: "#/components/schemas/CommunityPromotionPolicy"
          description: |
            Resolved effective promotion policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
        label_policy:
          $ref: "#/components/schemas/CommunityLabelPolicy"
          nullable: true
        community_profile:
          $ref: "#/components/schemas/CommunityProfile"
          nullable: true
        reference_links:
          type: array
          items:
            $ref: "#/components/schemas/CommunityReferenceLinkPublic"
          nullable: true
        community_stage:
          type: string
          enum:
            - initial
          description: |
            Derived server-side community maturity state. This is never a create input. `initial` is the only guaranteed cross-implementation value for public v0. Servers may define additional stage values. New communities start at the initial stage, and later stage progression depends on platform-defined `qualified_member_count` thresholds.
        member_count:
          type: integer
          nullable: true
          description: |
            Total community membership count used for read surfaces. Raw membership alone should not unlock namespace commerce capabilities.
        qualified_member_count:
          type: integer
          nullable: true
          description: |
            Derived count used for community-stage progression and namespace-commerce unlocks. This count is platform-defined and should exclude members that do not satisfy the platform's qualification rules for economic unlocks.
        stage_entered_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp when the community most recently entered its current derived `community_stage`.
        governance_mode:
          type: string
          enum:
            - centralized
            - multisig
            - majeur
        governance_backend:
          $ref: "#/components/schemas/CommunityGovernanceBackend"
          nullable: true
        gate_rules:
          type: array
          items:
            $ref: "#/components/schemas/GateRule"
          nullable: true
        created_by_user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateLiveRoomRequest:
      type: object
      required:
        - title
        - access_mode
