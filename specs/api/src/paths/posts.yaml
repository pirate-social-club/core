posts_by_post_id:
  get:
    tags:
      - Posts
    x-implemented: true
    summary: Get a post
    description: |
      Returns a localized canonical post read.

      Published posts are readable to callers with community access. Non-published posts such as review-held drafts are only readable to the post author or the community owner in the current v0 implemented surface.
    parameters:
      - $ref: ../components/parameters.yaml#/PostId
      - $ref: ../components/parameters.yaml#/Locale
    responses:
      "200":
        description: Post
        content:
          application/json:
            schema:
              $ref: ../components/schemas/posts.yaml#/LocalizedPostResponse
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
posts_by_post_id_vote:
  post:
    tags:
      - Posts
    summary: Cast or update a vote on a post
    description: |
      Public v0 voting requires community membership plus `verification_capabilities.unique_human.state = verified`
      from an accepted human-verification provider such as `self` or `very`.
      User-owned agents must not cast votes through this surface in v0.
    parameters:
      - $ref: ../components/parameters.yaml#/PostId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - value
            properties:
              value:
                type: integer
                enum:
                  - -1
                  - 1
    responses:
      "200":
        description: Vote recorded
        content:
          application/json:
            schema:
              type: object
              required:
                - post_id
                - value
              properties:
                post_id:
                  type: string
                value:
                  type: integer
                  enum:
                    - -1
                    - 1
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/VerificationRequired
      "429":
        $ref: ../components/responses.yaml#/RateLimited
posts_by_post_id_reactions:
  post:
    tags:
      - Posts
    summary: Add or remove a reaction on a post
    parameters:
      - $ref: ../components/parameters.yaml#/PostId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - reaction_kind
              - active
            properties:
              reaction_kind:
                type: string
                enum:
                  - like
              active:
                type: boolean
                description: |
                  When true, ensure the reaction exists. When false, remove the caller's active reaction of that kind.
    responses:
      "200":
        description: Reaction state recorded
        content:
          application/json:
            schema:
              type: object
              required:
                - post_id
                - reaction_kind
                - active
              properties:
                post_id:
                  type: string
                reaction_kind:
                  type: string
                  enum:
                    - like
                active:
                  type: boolean
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/VerificationRequired
      "429":
        $ref: ../components/responses.yaml#/RateLimited
