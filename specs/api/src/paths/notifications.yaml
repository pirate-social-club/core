notifications_summary:
  get:
    x-implemented: true
    operationId: notifications_summary
    tags: [Notifications]
    summary: Get notification summary for badge state
    responses:
      "200":
        description: Notification summary
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notifications.yaml#/NotificationSummary

notifications_tasks:
  get:
    x-implemented: true
    operationId: notifications_tasks
    tags: [Notifications]
    summary: List open tasks for the current user
    responses:
      "200":
        description: User tasks
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notifications.yaml#/NotificationTasksResponse

notifications_feed:
  get:
    x-implemented: true
    operationId: notifications_feed
    tags: [Notifications]
    summary: List activity feed items for the current user
    parameters:
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
    responses:
      "200":
        description: Activity feed
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notifications.yaml#/NotificationFeedResponse

notifications_mark_read:
  post:
    x-implemented: true
    operationId: notifications_mark_read
    tags: [Notifications]
    summary: Mark activity items as read
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/schemas/notifications.yaml#/MarkNotificationsReadRequest
    responses:
      "204":
        description: Marked as read

notifications_dismiss_task:
  post:
    x-implemented: true
    operationId: notifications_dismiss_task
    tags: [Notifications]
    summary: Dismiss a user task
    requestBody:
      content:
        application/json:
          schema:
            $ref: ../components/schemas/notifications.yaml#/DismissTaskRequest
    responses:
      "200":
        description: Task dismissed
        content:
          application/json:
            schema:
              $ref: ../components/schemas/notifications.yaml#/UserTask
