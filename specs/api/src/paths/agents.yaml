agents_by_agent_id_credential:
  post:
    x-implemented: true
    tags:
      - Agents
    summary: Issue a delegated credential for a user-owned agent
    description: |
      Issues an agent-scoped delegated API credential for the authenticated owner after re-checking
      owner standing, active ownership, and the applicable KYA baseline. Public v0 should prefer
      opaque bearer access tokens plus a refresh contract. Issuance must fail when the referenced
      agent is not currently backed by an active verified ownership interval for the caller.
    parameters:
      - $ref: ../components/parameters.yaml#/AgentId
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/AgentDelegatedCredentialIssueRequest
    responses:
      "200":
        description: Delegated credential issued
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentDelegatedCredential
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
agents_by_agent_id_credential_refresh:
  post:
    x-implemented: true
    tags:
      - Agents
    summary: Refresh a delegated credential for a user-owned agent
    description: |
      Refreshes an existing delegated agent credential. The runtime must re-check owner standing,
      active ownership, and KYA validity before minting a new access token. Refresh denial is the
      main revocation chokepoint for suspended owners, expired ownership intervals, or revoked
      agents.
    parameters:
      - $ref: ../components/parameters.yaml#/AgentId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/AgentDelegatedCredentialRefreshRequest
    responses:
      "200":
        description: Delegated credential refreshed
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentDelegatedCredential
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "404":
        $ref: ../components/responses.yaml#/NotFound
