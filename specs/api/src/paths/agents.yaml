agent_ownership_pairing:
  post:
    x-implemented: true
    tags:
      - Agents
    summary: Create a short-lived OpenClaw pairing code
    description: |
      Creates a short-lived pairing code that lets an OpenClaw plugin bootstrap an agent ownership
      session without the user's Pirate bearer token. The caller must already satisfy Pirate's
      human-verification baseline for agent ownership before a code will be issued.
    responses:
      "201":
        description: Pairing code created
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipPairing
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/Forbidden
      "409":
        $ref: ../components/responses.yaml#/Conflict
agent_ownership_pairing_claim:
  post:
    x-implemented: true
    tags:
      - Agents
    security: []
    summary: Claim a pairing code and start a ClawKey ownership session
    description: |
      Claims a short-lived pairing code with an agent-signed challenge. The server validates the
      pairing code and challenge, internally starts the ordinary ClawKey ownership-session flow,
      and returns the ClawKey registration URL plus a scoped connection token for completion
      polling.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/AgentOwnershipPairingClaimRequest
    responses:
      "200":
        description: Pairing code claimed and registration started
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipPairingClaimResult
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
agent_ownership_sessions:
  post:
    x-implemented: true
    tags:
      - Agents
    summary: Start an agent ownership session
    description: |
      Starts a KYA-backed session for agent registration, refresh, transfer, or deregistration.
      The request must include an agent-signed challenge proving control of the agent key or
      runtime identity before the human completes the provider verification flow. Servers may fail
      fast from `pending` when the challenge or session preconditions are invalid. `policy_id`
      selects server-side ownership-session policy and verifier configuration; it does not weaken
      platform or community trust requirements. The mainline public provider flow is `clawkey`,
      which starts with `register/init` and returns a `registrationUrl` for the human owner to
      open manually.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/StartAgentOwnershipSessionRequest
    responses:
      "201":
        description: Agent ownership session started
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipSession
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "429":
        $ref: ../components/responses.yaml#/RateLimited
agent_ownership_sessions_by_agent_ownership_session_id:
  get:
    x-implemented: true
    tags:
      - Agents
    summary: Inspect an agent ownership session
    parameters:
      - $ref: ../components/parameters.yaml#/AgentOwnershipSessionId
    responses:
      "200":
        description: Agent ownership session
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipSession
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
agent_ownership_sessions_by_agent_ownership_session_id_complete:
  post:
    x-implemented: true
    tags:
      - Agents
    summary: Complete or refresh an agent ownership session
    description: |
      Completes a provider flow when the provider requires an explicit finish step instead of, or
      in addition to, callback delivery. Providers may surface attestation or proof references
      here. Calling this endpoint on an already terminal session should be treated idempotently by
      the runtime. Mainline `clawkey` ownership is polling-first: the server should resolve the
      stored provider session ID, poll ClawKey registration status, and finalize only once the
      provider reports completion. OpenClaw plugin polling may use a scoped connection token
      header instead of the user's Pirate bearer auth.
    parameters:
      - $ref: ../components/parameters.yaml#/AgentOwnershipSessionId
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/CompleteAgentOwnershipSessionRequest
    responses:
      "200":
        description: Agent ownership session updated
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipSession
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
agent_ownership_sessions_by_agent_ownership_session_id_callback:
  post:
    x-implemented: true
    tags:
      - Agents
    security: []
    summary: Receive an asynchronous provider callback for an agent ownership session
    description: |
      Publicly reachable callback endpoint for provider-driven completion. The absence of transport-
      level auth here does not imply trust: the runtime must authenticate the caller against the
      stored session's expected provider and reject provider/session mismatches. Duplicate callback
      deliveries must be idempotent and must not create duplicate ownership records. Mainline
      `clawkey` ownership should be treated as polling-first; this callback surface is optional
      and should only be enabled if a provider exposes a real callback contract.
    parameters:
      - $ref: ../components/parameters.yaml#/AgentOwnershipSessionId
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: ../components/schemas/agents.yaml#/ProviderAgentOwnershipCallbackRequest
    responses:
      "200":
        description: Agent ownership session updated from callback data
        content:
          application/json:
            schema:
              $ref: ../components/schemas/agents.yaml#/AgentOwnershipSession
      "404":
        $ref: ../components/responses.yaml#/NotFound
