  post:
    tags:
      - Communities
    x-implemented: true
    summary: Join a community
    description: |
      The server must always evaluate the platform baseline join gate before considering the community's membership mode.

      Public v0 baseline join eligibility requires at least one approved platform trust credential:

      - `unique_human` verified through an accepted provider such as `self` or `very`
      - `wallet_score` verified through `passport` with a passing score
      - operator-approved token-gated exceptions may exist later, but are not configurable through public v0 community creation or public community settings

      `open` means no extra community-specific gate beyond that platform baseline. `gated` communities must satisfy the platform baseline and then all active membership-scope community gate rules.
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    responses:
      "200":
        description: Membership created or request recorded
        content:
          application/json:
            schema:
              $ref: ../components/schemas/communities-core.yaml#/MembershipResult
      "401":
        $ref: ../components/responses.yaml#/AuthError
