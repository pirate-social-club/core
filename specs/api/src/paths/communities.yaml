communities:
  post:
    tags:
      - Communities
    x-implemented: true
    summary: Create a community
    description: |
      Creates a community once all create-time prerequisites are already satisfied.

      When `namespace` is provided, the server must consume the accepted namespace-verification resource referenced by `namespace.namespace_verification`, not just the raw identifier string. Before writing any community state, the server must re-check:

      - the accepted namespace verification exists
      - it belongs to the requesting creator
      - it is still accepted and not stale, disputed, or expired
      - its current capabilities still satisfy `club_attach_allowed`

      When `namespace` is omitted, the community is created without a namespace. A namespace can be attached later via the namespace-attachment endpoint.

      Public v0 create must fail closed when namespace is provided but those checks do not pass.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/communities-core.yaml#/CreateCommunityRequest
    responses:
      "202":
        description: Community creation accepted
        content:
          application/json:
            schema:
              $ref: ../components/schemas/communities-core.yaml#/CommunityCreateAcceptedResponse
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/EligibilityFailed
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "429":
        $ref: ../components/responses.yaml#/RateLimited
  get:
    tags:
      - Communities
    summary: List communities
    parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: artist_identity_id
        schema:
          type: string
      - $ref: ../components/parameters.yaml#/Cursor
      - $ref: ../components/parameters.yaml#/Limit
    responses:
      "200":
        description: Communities
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas/communities-core.yaml#/Community
                next_cursor:
                  type: string
                  nullable: true
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
