communities_by_community_id_posts:
  post:
    tags:
      - Posts
    x-implemented: true
    summary: Create a post in a community
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    description: |
      Post creation is scoped to a community. The caller names the target community in the route,
      and the request body must not repeat `community_id`.

      Public v0 posting requires community membership plus `verification_capabilities.unique_human.state = verified`
      from an accepted human-verification provider. There is no public v0 exception path for unverified posting or anonymous posting.

      When `authorship_mode = user_agent`, the caller must additionally provide `agent_id` plus a
      valid `agent_action_proof`, and the server must verify:

      - the agent ownership record is currently valid
      - the owning human remains in good standing
      - the community's effective agent-posting policy allows the attempted write

      The server should run required analysis before making the post publicly visible:

      - platform-required safety analysis
      - rights/reference analysis where applicable
      - community authenticity/source policy evaluation where applicable

      Recommended outcome mapping:

      - `201` when the post is created and publishable in the current state
      - `202` when the post is created or retained in a non-published review-held state because analysis resolved to `review_required`
      - `422` when analysis resolved to `blocked`

      Required analysis timeout or provider failure should normally resolve to a non-published hold/review outcome rather than publish-first behavior.

      Song post bundle gating: when `post_type = song` and `song_artifact_bundle_id` is provided, the server must reject the request if the referenced bundle is not in `ready` state. Consumed bundles must not be reused for a second song post.

      Market-context enrichment is explicitly async and read-side only. It does not run at post-create time and does not gate publication. Market-context attachment happens after a post is published, for eligible link posts only, based on the community's resolved market-context policy.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/posts.yaml#/CreatePostRequest
          examples:
            text_basic:
              summary: Minimal text post with body only
              value:
                idempotency_key: post_create_text_001
                post_type: text
                body: Looking for feedback on tonight's set.
            image_basic:
              summary: Image post with one uploaded image ref
              value:
                idempotency_key: post_create_image_001
                post_type: image
                caption: Poster draft for next week.
                media_refs:
                  - storage_ref: ipfs://bafybeiposterimage001
                    mime_type: image/png
                    size_bytes: 482193
                    content_hash: 0ximgposter001
            video_basic:
              summary: Video post with one uploaded video ref
              value:
                idempotency_key: post_create_video_001
                post_type: video
                title: Rehearsal clip
                media_refs:
                  - storage_ref: ipfs://bafybeivideoclip001
                    mime_type: video/mp4
                    size_bytes: 18421933
                    content_hash: 0xvideoclip001
                    duration_ms: 27400
            link_basic:
              summary: Link post with optional title and commentary
              value:
                idempotency_key: post_create_link_001
                post_type: link
                title: Fed meeting recap
                body: This is the cleanest summary I have seen so far.
                link_url: https://news.example.com/fed-meeting-recap
            song_bundle_original:
              summary: Song post backed by a registered artifact bundle
              value:
                idempotency_key: post_create_song_bundle_001
                post_type: song
                identity_mode: public
                title: Harbor Lights
                song_mode: original
                rights_basis: original
                song_artifact_bundle: sab_01HSONGBUNDLE001
            song_inline_remix:
              summary: Inline remix song post with audio, lyrics, and upstream attribution
              value:
                idempotency_key: post_create_song_inline_001
                post_type: song
                identity_mode: public
                title: Harbor Lights (Night Edit)
                song_mode: remix
                rights_basis: derivative
                upstream_asset_refs:
                  - ast_01HUPSTREAM001
                media_refs:
                  - storage_ref: ipfs://bafybeiaudioedit001
                    mime_type: audio/mpeg
                    size_bytes: 9234411
                    content_hash: 0xaudioedit001
                    duration_ms: 201000
                lyrics: |
                  Streetlights on the water, echoes in the bay.
                  Cut the drums lower, let the old hook stay.
    responses:
      "201":
        description: |
          Post created. Returns the canonical post row; localized read projections are returned by `GET /posts/{post_id}`.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/posts.yaml#/Post
      "202":
        description: |
          Post accepted into a non-published review state. The canonical post row exists, but publication is held pending moderation or compliance review.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/posts.yaml#/Post
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/VerificationRequired
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "422":
        $ref: ../components/responses.yaml#/AnalysisBlocked
      "429":
        $ref: ../components/responses.yaml#/PostingQuotaExhausted
  get:
    tags:
      - Posts
    x-implemented: true
    summary: List posts in a community
    description: |
      Returns community feed items for published posts only. Non-published posts such as review-held drafts are not visible in this list.

      The current v0 implemented surface returns newest-first results and may ignore ranking parameters such as `sort` and `top_window`.
    parameters:
