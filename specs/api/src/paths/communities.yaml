communities_by_community_id_join_eligibility:
  get:
    tags:
      - Communities
    x-implemented: true
    summary: Check join eligibility for a community
    description: |
      Returns a machine-readable join eligibility assessment for the authenticated user.
      The client should use this to determine whether to show a Join button, a Verify to Join
      CTA, or a blocking message before the user attempts to join.

      The `status` field distinguishes:
      - `joinable`: user can join immediately
      - `verification_required`: user is missing a remediable proof (e.g. nationality from self)
      - `gate_failed`: user's existing proof does not satisfy the gate (e.g. nationality mismatch)
      - `already_joined`: user is already a member
      - `banned`: user is banned from the community
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    responses:
      "200":
        description: Join eligibility
        content:
          application/json:
            schema:
              $ref: ../components/schemas/communities-core.yaml#/JoinEligibility
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
