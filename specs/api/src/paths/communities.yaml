    summary: Get the active pricing policy for a community
    description: |
      Returns the resolved effective community pricing policy. When the community has not explicitly configured a pricing policy yet, the server must return the default non-tiered policy with `policy_origin = default`. This policy controls buyer-visible quote adjustments and is separate from the community money policy used for routing and settlement constraints.
