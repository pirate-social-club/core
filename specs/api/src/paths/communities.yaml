      "404":
        $ref: ../components/responses.yaml#/NotFound
  patch:
    tags:
      - Communities
    summary: Configure or update the content authenticity policy for a community
    description: |
      Stores an explicit community authenticity policy. This replaces the resolved default policy for future posts and moderation decisions, but does not retroactively reclassify existing posts.
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/communities-community.yaml#/UpdateCommunityContentAuthenticityPolicyRequest
