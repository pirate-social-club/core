    x-implemented: true
    summary: Configure or update the pricing policy for a community
    description: |
      Stores an explicit community pricing policy. Changes apply prospectively to future quote generation only; existing purchases remain pinned to the pricing tier and pricing-policy version captured in their quote and settlement snapshots. This policy does not control funding-lane eligibility or settlement routing.
