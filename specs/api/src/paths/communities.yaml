  post:
    tags:
      - Communities
    x-implemented: true
    summary: Configure or update the money policy for a community
    description: |
      Stores an explicit community funding policy. Changes apply prospectively to future quote generation and routed funding eligibility only; existing purchases remain pinned to their already-issued quote and settlement snapshots.
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    requestBody:
      required: true
      content:
