communities_by_community_id_content_authenticity_policy:
  get:
    tags:
      - Communities
    summary: Get the active content authenticity policy for a community
    description: |
      Returns the resolved effective policy. When the community has not explicitly configured an authenticity policy yet, the server must return the restrictive default policy with `policy_origin = default`.
    parameters:
      - $ref: ../components/parameters.yaml#/CommunityId
    responses:
      "200":
        description: Community content authenticity policy
        content:
          application/json:
