verification_sessions:
  post:
    tags:
      - Verification
    x-implemented: true
    summary: Start an interactive verification session
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/verification.yaml#/StartVerificationSessionRequest
    responses:
      "201":
        description: Verification session started
        content:
          application/json:
            schema:
              $ref: ../components/schemas/verification.yaml#/VerificationSession
            examples:
              self_qr_launch:
                summary: Self verification session launch
                value:
                  id: ver_sess_01HSELFQREXAMPLE
                  object: verification_session
                  user: usr_01HUSEREXAMPLE
                  provider: self
                  provider_mode: qr_deeplink
                  requested_capabilities:
                    - unique_human
                  status: pending
                  launch:
                    mode: qr_deeplink
                    self_app:
                      app_name: Pirate
                      endpoint: https://api.pirate.example/verification-sessions/ver_sess_01HSELFQREXAMPLE/receive-self-proof
                      endpoint_type: https
                      scope: pirate-verification-v0
                      session_id: ver_sess_01HSELFQREXAMPLE
                      user_id: "0x5a20f59b8d4df2e3c68d94e2fa4e3f9c3a0dc5cde8e0c614f8b4bc2d53a9e8b1"
                      user_id_type: hex
                      disclosures:
                        nationality: false
                        minimum_age: null
                        gender: false
                  callback_path: /verification-sessions/ver_sess_01HSELFQREXAMPLE/receive-self-proof
                  created: 1775822400
                  expires_at: 1775823300
              very_widget_launch:
                summary: Very widget verification session launch
                value:
                  id: ver_sess_01HVERYWIDGETEXAMPLE
                  object: verification_session
                  user: usr_01HUSEREXAMPLE
                  provider: very
                  provider_mode: widget
                  requested_capabilities:
                    - unique_human
                  status: pending
                  launch:
                    mode: widget
                    very_widget:
                      app_id: ""
                      context: VeryAI - Palm Verification Timestamp
                      type_id: "3"
                      query:
                        conditions:
                          - identifier: val
                            operation: IN
                            value:
                              from: "1743436800"
                              to: "2043436800"
                        options:
                          expiredAtLowerBound: "1743436800"
                          externalNullifier: pirate-unique-human-v0
                          equalCheckId: "0"
                          pseudonym: ver_sess_01HVERYWIDGETEXAMPLE.7f9f0e6b
                      verify_url: https://verify.very.org/api/v1/verify
                      session_binding:
                        uniqueness_domain: pirate-unique-human-v0
                        binding_value: ver_sess_01HVERYWIDGETEXAMPLE.7f9f0e6b
                        binding_field: pseudonym
                        challenge_expires_at: 1775823300
                  callback_path: /verification-sessions/ver_sess_01HVERYWIDGETEXAMPLE/complete
                  created: 1775822400
                  expires_at: 1775823300
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
verification_wallet_score:
  get:
    tags:
      - Verification
    x-implemented: true
    summary: Get the current wallet score capability
    description: |
      Read the current Human Passport-derived wallet-score capability for the authenticated user.
      This is a server-owned score read, not an interactive verification session.
    responses:
      "200":
        description: Current wallet score capability
        content:
          application/json:
            schema:
              $ref: ../components/schemas/verification.yaml#/WalletScoreCapabilityState
            example:
              state: verified
              provider: passport
              proof_type: wallet_score
              mechanism: stamps-api-v2
              verified_at: 1775822400
              score_decimal: "28.4"
              score_threshold_decimal: "20"
              passing_score: true
              last_scored_at: 1775822370
              expires_at: 1778414400
              stamps:
                - stamp_name: Gitcoin Passport
                  stamp_score_decimal: "18.4"
                - stamp_name: ENS
                  stamp_score_decimal: "10"
      "401":
        $ref: ../components/responses.yaml#/AuthError
