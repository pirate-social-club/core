guilds:
  post:
    tags:
      - Guilds
    summary: Create a guild
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/guilds-core.yaml#/CreateGuildRequest
    responses:
      "201":
        description: Guild created
        content:
          application/json:
            schema:
              $ref: ../components/schemas/guilds-core.yaml#/Guild
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
  get:
    tags:
      - Guilds
    summary: List guilds
    parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: artist_identity_id
        schema:
          type: string
      - $ref: ../components/parameters.yaml#/Cursor
      - $ref: ../components/parameters.yaml#/Limit
    responses:
      "200":
        description: Guilds
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas/guilds-core.yaml#/Guild
                next_cursor:
                  type: string
                  nullable: true
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
guilds_by_guild_id:
  get:
    tags:
      - Guilds
    summary: Get a guild
    parameters:
      - $ref: ../components/parameters.yaml#/GuildId
    responses:
      "200":
        description: Guild
        content:
          application/json:
            schema:
              $ref: ../components/schemas/guilds-core.yaml#/Guild
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
  patch:
    tags:
      - Guilds
    summary: Update mutable guild settings
    parameters:
      - $ref: ../components/parameters.yaml#/GuildId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/guilds-core.yaml#/UpdateGuildRequest
    responses:
      "200":
        description: Guild updated
        content:
          application/json:
            schema:
              $ref: ../components/schemas/guilds-core.yaml#/Guild
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/EligibilityFailed
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
guilds_by_guild_id_attach_governance:
  post:
    tags:
      - Guilds
    summary: Attach or replace an external governance backend for a guild
