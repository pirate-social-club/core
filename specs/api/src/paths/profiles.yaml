profiles_me:
  get:
    tags:
      - Profiles
    x-implemented: true
    summary: Get the current user's public/editable profile
    responses:
      "200":
        description: Current profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "401":
        $ref: ../components/responses.yaml#/AuthError
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Update editable profile fields
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              display_name:
                type: string
              avatar_ref:
                type: string
                nullable: true
              cover_ref:
                type: string
                nullable: true
              bio:
                type: string
                nullable: true
              preferred_locale:
                type: string
                nullable: true
    responses:
      "200":
        description: Updated profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "401":
        $ref: ../components/responses.yaml#/AuthError
profiles_me_xmtp_inbox:
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Publish or rotate the current profile's XMTP inbox ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - xmtp_inbox
            properties:
              xmtp_inbox:
                type: string
                nullable: true
                description: Current XMTP inbox ID for this browser-local chat identity, or null to clear a stale value.
    responses:
      "200":
        description: Updated profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "401":
        $ref: ../components/responses.yaml#/AuthError
profiles_me_global_handle_rename:
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Rename the current active global .pirate handle
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - desired_label
            properties:
              desired_label:
                type: string
    responses:
      "200":
        description: Global handle updated
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/GlobalHandle
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/EligibilityFailed
      "409":
        $ref: ../components/responses.yaml#/Conflict
      "429":
        $ref: ../components/responses.yaml#/RateLimited
profiles_me_global_handle_upgrade_quote:
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Quote a paid upgrade into a cleaner .pirate handle
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - desired_label
            properties:
              desired_label:
                type: string
    responses:
      "200":
        description: Upgrade quote
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/HandleUpgradeQuote
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/EligibilityFailed
      "429":
        $ref: ../components/responses.yaml#/RateLimited
profiles_me_linked_handles_sync:
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Refresh wallet-derived linked handles for the current profile
    responses:
      "200":
        description: Updated profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "401":
        $ref: ../components/responses.yaml#/AuthError
profiles_me_primary_public_handle:
  post:
    tags:
      - Profiles
    x-implemented: true
    summary: Select the current profile's primary public handle
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              linked_handle:
                type: string
                nullable: true
    responses:
      "200":
        description: Updated profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
profiles_by_user_id:
  get:
    tags:
      - Profiles
    x-implemented: true
    summary: Get a public profile
    parameters:
      - $ref: ../components/parameters.yaml#/UserId
    responses:
      "200":
        description: Public profile
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/Profile
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
public_profiles_by_wallet_address:
  get:
    tags:
      - Profiles
    x-implemented: true
    summary: Resolve a public profile by active wallet address
    parameters:
      - name: wallet_address
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Public profile resolution
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/PublicProfileResolution
      "404":
        $ref: ../components/responses.yaml#/NotFound
wallet_identities_by_chain_ref_wallet_address:
  get:
    tags:
      - Profiles
    x-implemented: true
    security: []
    summary: Resolve a public wallet identity
    description: |
      Returns a query-time wallet identity projection for wallets that have wallet-owned Pirate names.
      If the wallet is attached to an account-backed profile, callers receive a redirect payload to the profile surface instead.
    parameters:
      - name: chain_ref
        in: path
        required: true
        schema:
          type: string
        description: EIP-155 chain reference, either `eip155` or `eip155:{chain_id}`.
      - name: wallet_address
        in: path
        required: true
        schema:
          type: string
        description: EVM wallet address.
    responses:
      "200":
        description: Wallet identity projection or profile redirect
        headers:
          Cache-Control:
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/WalletIdentityResponse
      "400":
        $ref: ../components/responses.yaml#/BadRequest
      "404":
        $ref: ../components/responses.yaml#/NotFound
public_profiles_by_handle_label:
  get:
    tags:
      - Profiles
    x-implemented: true
    summary: Resolve a public profile by Pirate or primary linked handle
    parameters:
      - name: handle_label
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Public profile resolution
        content:
          application/json:
            schema:
              $ref: ../components/schemas/profiles.yaml#/PublicProfileResolution
      "404":
        $ref: ../components/responses.yaml#/NotFound
