clubs:
  post:
    tags:
      - Clubs
    summary: Create a club
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/clubs-core.yaml#/CreateClubRequest
    responses:
      "201":
        description: Club created
        content:
          application/json:
            schema:
              $ref: ../components/schemas/clubs-core.yaml#/Club
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
  get:
    tags:
      - Clubs
    summary: List clubs
    parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: artist_identity_id
        schema:
          type: string
      - $ref: ../components/parameters.yaml#/Cursor
      - $ref: ../components/parameters.yaml#/Limit
    responses:
      "200":
        description: Clubs
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas/clubs-core.yaml#/Club
                next_cursor:
                  type: string
                  nullable: true
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "429":
        $ref: ../components/responses.yaml#/RateLimited
clubs_by_club_id:
  get:
    tags:
      - Clubs
    summary: Get a club
    parameters:
      - $ref: ../components/parameters.yaml#/ClubId
    responses:
      "200":
        description: Club
        content:
          application/json:
            schema:
              $ref: ../components/schemas/clubs-core.yaml#/Club
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "404":
        $ref: ../components/responses.yaml#/NotFound
  patch:
    tags:
      - Clubs
    summary: Update mutable club settings
    parameters:
      - $ref: ../components/parameters.yaml#/ClubId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/clubs-core.yaml#/UpdateClubRequest
    responses:
      "200":
        description: Club updated
        content:
          application/json:
            schema:
              $ref: ../components/schemas/clubs-core.yaml#/Club
      "401":
        $ref: ../components/responses.yaml#/AuthError
      "403":
        $ref: ../components/responses.yaml#/EligibilityFailed
      "404":
        $ref: ../components/responses.yaml#/NotFound
      "409":
        $ref: ../components/responses.yaml#/Conflict
clubs_by_club_id_attach_governance:
  post:
    tags:
      - Clubs
    summary: Attach or replace an external governance backend for a club
    parameters:
