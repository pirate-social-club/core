robots_txt:
  get:
    tags:
      - Agent Discovery
    x-implemented: false
    security: []
    summary: Discover crawl and sitemap hints
    description: |
      Public robots document. Robots and content signals are hints; server authorization remains authoritative.
    responses:
      "200":
        description: Robots document
        headers:
          Cache-Control:
            schema:
              type: string
        content:
          text/plain:
            schema:
              type: string
      "429":
        $ref: ../components/responses.yaml#/RateLimited
sitemap_xml:
  get:
    tags:
      - Agent Discovery
    x-implemented: false
    security: []
    summary: Discover public human-visible pages
    description: |
      Public sitemap index for human-visible public pages. Sitemap inclusion does not imply structured API inclusion if a community opts out of a surface.
    responses:
      "200":
        description: Public sitemap
        headers:
          Cache-Control:
            schema:
              type: string
        content:
          application/xml:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      "429":
        $ref: ../components/responses.yaml#/RateLimited
