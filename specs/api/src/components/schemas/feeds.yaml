FeedResponse:
  type: object
  required:
    - items
    - top_communities
  properties:
    items:
      type: array
      items:
        $ref: ./feeds.yaml#/FeedItem
    top_communities:
      type: array
      items:
        $ref: ./feeds.yaml#/HomeFeedCommunitySummary
    next_cursor:
      type: string
      nullable: true
FeedItem:
  type: object
  required:
    - community
    - post
  properties:
    community:
      $ref: ./feeds.yaml#/HomeFeedCommunitySummary
    post:
      $ref: ./posts.yaml#/LocalizedPostResponse
HomeFeedCommunitySummary:
  type: object
  additionalProperties: false
  required:
    - id
    - object
    - display_name
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - home_feed_community_summary
    display_name:
      type: string
    route_slug:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    member_count:
      type: integer
      nullable: true
    follower_count:
      type: integer
      nullable: true
    view_count:
      type: integer
      nullable: true
