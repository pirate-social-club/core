FeedResponse:
  type: object
  required:
    - items
    - top_communities
  properties:
    items:
      type: array
      items:
        $ref: ./feeds.yaml#/FeedItem
    top_communities:
      type: array
      items:
        $ref: ./feeds.yaml#/HomeFeedCommunitySummary
    next_cursor:
      type: string
      nullable: true
FeedItem:
  type: object
  required:
    - community
    - post
  properties:
    community:
      $ref: ./feeds.yaml#/HomeFeedCommunitySummary
    post:
      $ref: ./posts.yaml#/LocalizedPostResponse

HomeFeedCommunitySummary:
  type: object
  additionalProperties: false
  required:
    - community_id
    - display_name
    - updated_at
  properties:
    community_id:
      type: string
    display_name:
      type: string
    route_slug:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    member_count:
      type: integer
      nullable: true
    updated_at:
      type: string
      format: date-time
