Community:
  type: object
  required:
    - id
    - object
    - display_name
    - status
    - provisioning_state
    - membership_mode
    - allow_anonymous_identity
    - human_verification_lane
    - human_verification_lane_origin
    - agent_posting_policy
    - guest_comment_policy
    - agent_posting_scope
    - accepted_agent_ownership_providers_origin
    - accepted_agent_ownership_providers
    - governance_mode
    - donation_policy_mode
    - donation_partner_status
    - money_policy
    - content_authenticity_policy
    - content_authenticity_detection_policy
    - market_context_policy
    - source_policy
    - capture_edit_policy
    - adult_content_policy
    - graphic_content_policy
    - motion_media_policy
    - language_policy
    - civility_policy
    - visual_policy_settings
    - provenance_policy
    - promotion_policy
    - created_by_user
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - community
    display_name:
      type: string
    description:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    namespace_verification:
      type: string
      nullable: true
      description: |
        Attached accepted namespace-verification resource when the community is namespace-backed.
    route_slug:
      type: string
      nullable: true
    pending_namespace_verification_session:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - active
        - frozen
        - archived
        - deleted
    provisioning_state:
      type: string
      enum:
        - requested
        - provisioning
        - active
        - rotation_required
        - error
      description: |
        Community infrastructure lifecycle state. This is distinct from domain `status`.
        A community may be domain-active while infrastructure provisioning is still in progress.
    artist_identity:
      type: string
      nullable: true
    community_agent_user:
      type: string
      nullable: true
      description: |
        App-level system actor for platform-managed community content such as daily questions. In v0, this actor is exempt from ordinary member trust-tier minima and posting quotas when publishing system-tagged content.
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
      description: |
        Resolved effective public-v0 human-verification lane for this community.
    human_verification_lane_origin:
      $ref: ./communities-core.yaml#/CommunityAgentResolutionOrigin
      description: |
        Whether `human_verification_lane` came from an explicit community override or was derived
        from the effective gate set or platform default.
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
      description: |
        Whether anonymous posts in the community may attach disclosed qualifiers from `allowed_disclosed_qualifiers`.
    guest_comment_policy:
      type: string
      enum:
        - disallow
        - altcha_required
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      description: |
        Community-wide default viewer age gate.
    gate_policy:
      $ref: ./communities-core.yaml#/GatePolicy
      nullable: true
    agent_posting_policy:
      type: string
      enum:
        - disallow
        - review
        - allow_with_disclosure
        - allow
      description: |
        Resolved effective user-agent posting policy for this community.
    agent_posting_scope:
      type: string
      enum:
        - replies_only
        - top_level_and_replies
      description: |
        Resolved effective user-agent posting scope for this community.
    agent_daily_post_cap:
      type: integer
      nullable: true
      description: |
        Effective rolling 24-hour cap for user-agent top-level posts.
    agent_daily_reply_cap:
      type: integer
      nullable: true
      description: |
        Effective rolling 24-hour cap for user-agent replies.
    agent_min_owner_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
      description: |
        Effective minimum trust tier the owning human must satisfy before their user-owned agent may post.
    agent_owner_active_limit:
      type: integer
      nullable: true
      description: |
        Effective community-local cap on active user-owned agents per human owner.
    accepted_agent_ownership_providers:
      type: array
      description: |
        Resolved effective accepted agent-ownership providers for this community. The server must
        always return the concrete effective provider set on reads, whether it came from an
        explicit override or from derivation based on `human_verification_lane` and the
        underlying trust floor.
      items:
        $ref: ./agents.yaml#/AgentOwnershipProvider
    accepted_agent_ownership_providers_origin:
      $ref: ./communities-core.yaml#/CommunityAgentResolutionOrigin
      description: |
        Whether `accepted_agent_ownership_providers` came from an explicit community override or
        from server-side derivation.
    civic_scale_tier:
      type: string
      enum:
        - club
        - village
        - town
        - city
        - state
      description: |
        Derived scale label for a community. This is a presentation and progression classification, not a different base entity type.
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
    donation_partner:
      $ref: ./communities-community.yaml#/DonationPartnerSummary
      nullable: true
    money_policy:
      $ref: ./communities-community.yaml#/CommunityMoneyPolicy
      description: |
        Resolved effective community funding policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default policy from an explicit community configuration.
    content_authenticity_policy:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityPolicy
      description: |
        Resolved effective authenticity policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
    content_authenticity_detection_policy:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityDetectionPolicy
      description: |
        Resolved effective authenticity-detection policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default profile from an explicit community selection.
    market_context_policy:
      $ref: ./market-context.yaml#/CommunityMarketContextPolicy
      description: |
        Resolved effective market-context policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default policy from an explicit community configuration.
    source_policy:
      $ref: ./communities-community.yaml#/CommunitySourcePolicy
      description: |
        Resolved effective source policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
    capture_edit_policy:
      $ref: ./communities-community.yaml#/CommunityCaptureEditPolicy
      description: |
        Resolved effective capture-edit policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    adult_content_policy:
      $ref: ./communities-community.yaml#/CommunityAdultContentPolicy
      description: |
        Resolved effective adult-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    graphic_content_policy:
      $ref: ./communities-community.yaml#/CommunityGraphicContentPolicy
      description: |
        Resolved effective graphic-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    motion_media_policy:
      $ref: ./communities-community.yaml#/CommunityMotionMediaPolicy
      description: |
        Resolved effective motion-media policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    language_policy:
      $ref: ./communities-community.yaml#/CommunityLanguagePolicy
      description: |
        Resolved effective language policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    civility_policy:
      $ref: ./communities-community.yaml#/CommunityCivilityPolicy
      description: |
        Resolved effective civility policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    visual_policy_settings:
      $ref: ./communities-core.yaml#/CommunityVisualPolicySettings
    openai_moderation_settings:
      type: object
      nullable: true
      additionalProperties: false
      properties:
        scan_titles:
          type: boolean
        scan_post_bodies:
          type: boolean
        scan_captions:
          type: boolean
        scan_link_preview_text:
          type: boolean
        scan_images:
          type: boolean
      description: |
        Optional moderation-scan toggles persisted in community settings for text and image
        surfaces. Null means the community is using the platform default moderation scan profile.
    provenance_policy:
      $ref: ./communities-community.yaml#/CommunityProvenancePolicy
      description: |
        Resolved effective provenance policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    promotion_policy:
      $ref: ./communities-community.yaml#/CommunityPromotionPolicy
      description: |
        Resolved effective promotion policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    label_policy:
      $ref: ./communities-community.yaml#/CommunityLabelPolicy
      nullable: true
    community_profile:
      $ref: ./communities-community.yaml#/CommunityProfile
      nullable: true
    reference_links:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityReferenceLinkPublic
      nullable: true
    community_stage:
      type: string
      enum:
        - initial
      description: |
        Derived server-side community maturity state. This is never a create input. `initial` is the only guaranteed cross-implementation value for public v0. Servers may define additional stage values. New communities start at the initial stage, and later stage progression depends on platform-defined `qualified_member_count` thresholds.
    member_count:
      type: integer
      nullable: true
      description: |
        Total community membership count used for read surfaces. Raw membership alone should not unlock namespace commerce capabilities.
    qualified_member_count:
      type: integer
      nullable: true
      description: |
        Derived count used for community-stage progression and namespace-commerce unlocks. This count is platform-defined and should exclude members that do not satisfy the platform's qualification rules for economic unlocks.
    stage_entered_at:
      type: integer
      format: int64
      nullable: true
      description: |
        Timestamp when the community most recently entered its current derived `community_stage`.
    governance_mode:
      type: string
      enum:
        - centralized
        - multisig
        - majeur
    governance_backend:
      $ref: ./communities-governance.yaml#/CommunityGovernanceBackend
      nullable: true
    gate_rules:
      type: array
      items:
        $ref: ./communities-core.yaml#/GateRule
      nullable: true
    created_by_user:
      type: string
    created:
      type: integer
      format: int64
