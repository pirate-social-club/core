CreateCommunityRequestBase:
  type: object
  description: |
    Authoritative community-create write model. When `namespace` is provided for namespace-backed communities in public v0, the server must resolve `namespace.namespace_verification_id` to the accepted namespace-verification object at create time and re-check creator binding, freshness, and `club_attach_allowed` before any community state is written. When `namespace` is omitted, the community is created without a namespace and can attach one later.
  required:
    - display_name
    - membership_mode
    - allow_anonymous_identity
    - handle_policy
  properties:
    display_name:
      type: string
    description:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    artist_identity_id:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
      description: |
        Public v0 community creation should submit only `open` or `gated`. `request` remains in the model for deferred, internal, or later use and should not be exposed by the public create client.
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
      description: |
        Required when `allow_anonymous_identity = true`. Public v0 should default to `community_stable`. `post_ephemeral` must not be submitted in the public v0 create flow unless all prerequisites from the domain spec (active content safety classification, at least one active moderator) can be verified at create time.
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
      description: |
        Array of platform-defined `qualifier_template_id` values. Public v0 create may set this when `allow_anonymous_identity = true`. Qualifier suppression of entries already implied by community gates is a read/composer behavior concern, not a create-time configuration concern.
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
      description: |
        Enables anonymous posts in the community to attach disclosed qualifiers from `allowed_disclosed_qualifiers`. Public v0 create may set this only when `allow_anonymous_identity = true`. If `false` or `null`, anonymous posts must not expose optional qualifiers.
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      default: none
      description: |
        Community-wide default viewer age gate. Setting this to `18_plus` requires the acting creator or updating owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
    agent_posting_policy:
      type: string
      enum:
        - disallow
        - review
        - allow_with_disclosure
        - allow
      nullable: true
      description: |
        Optional create-time user-agent posting policy. When omitted, reads must resolve the
        restrictive default `disallow`.
    agent_posting_scope:
      type: string
      enum:
        - replies_only
        - top_level_and_replies
      nullable: true
      description: |
        Optional create-time scope for user-owned agent posting. When omitted in a context where
        user-owned agents are enabled, reads should resolve `replies_only`.
    agent_daily_post_cap:
      type: integer
      nullable: true
      description: |
        Optional rolling 24-hour cap for user-agent top-level posts in this community.
    agent_daily_reply_cap:
      type: integer
      nullable: true
      description: |
        Optional rolling 24-hour cap for user-agent replies in this community.
    agent_min_owner_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
      description: |
        Optional minimum trust tier the owning human must satisfy before their user-owned agent may post.
    agent_owner_active_limit:
      type: integer
      nullable: true
      description: |
        Optional community-local cap on active user-owned agents per human owner. Must not exceed
        the platform-wide maximum.
    human_verification_lane:
      type: string
      enum:
        - very
        - self
      nullable: true
      description: |
        Primary public-v0 human-verification lane for this community. This is the UX-facing trust
        lane that tells users which verification path to complete first. `very` is the lighter
        baseline `unique_human` lane. `self` is the higher-friction lane for communities that also
        need richer identity-derived capabilities or stronger agent-native trust semantics. When
        omitted on create, the server may resolve a platform default lane. The server must reject
        or normalize lane selections that are inconsistent with the effective gate set. For
        example, a community whose resolved gates require Self-only capabilities such as
        `nationality` or `age_over_18` must not resolve to `human_verification_lane = very`.
    accepted_agent_ownership_providers:
      type: array
      nullable: true
      description: |
        Optional stricter override for agent KYA acceptance. When omitted, reads should derive the
        effective accepted agent-ownership providers from `human_verification_lane` and the
        community trust floor: any platform-approved KYA provider is acceptable so long as the
        bound human clears the required lane. Set this only when the community wants a narrower
        agent-auth posture, such as Self-only agent ownership.
      items:
        $ref: ./agents.yaml#/AgentOwnershipProvider
    namespace:
      allOf:
        - $ref: ./handles.yaml#/NamespaceAttachmentInput
      nullable: true
      description: |
        Namespace attachment input for community creation. When provided, this must reference an accepted namespace-verification object via `namespace_verification_id`; the server must consume that accepted verification, not treat the field as a blind string. When omitted, the community is created without a namespace and can attach one later.
    handle_policy:
      allOf:
        - $ref: ./handles.yaml#/HandlePolicyInput
      description: |
        Public v0 new communities should normally start with the `standard` handle-policy template. This creates the namespace policy record at community creation time without implying that public community-local handle claims or namespace commerce are already enabled; those remain disabled until server-derived capability flags unlock them.
    donation_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityDonationPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
    content_authenticity_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityContentAuthenticityPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. Platform-minimum synthetic-likeness bans still override any submitted value.
    source_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunitySourcePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. This policy governs repost and fan-work handling rather than AI authenticity.
    capture_edit_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityCaptureEditPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default non-generative edit policy from the first post onward.
    adult_content_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityAdultContentPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default adult-content subcategory policy from the first post onward.
    graphic_content_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityGraphicContentPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default graphic-content subcategory policy from the first post onward.
    motion_media_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityMotionMediaPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the effective default motion-media policy from the first post onward.
    language_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityLanguagePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default language policy from the first post onward.
    civility_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityCivilityPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default civility policy from the first post onward.
    provenance_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityProvenancePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default provenance policy from the first post onward.
    promotion_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityPromotionPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default promotion policy from the first post onward.
    content_authenticity_detection_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityContentAuthenticityDetectionPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must use the platform-default authenticity-detection profile from the first post onward. Platform-required safety and age-gating analysis remain platform-managed and unaffected.
    market_context_policy:
      allOf:
        - $ref: ./market-context.yaml#/CreateCommunityMarketContextPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the platform-default market-context policy from the first eligible post onward.
    money_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityMoneyPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the effective default community money policy. This attached policy defines purchase funding lanes and route constraints without turning the community object into a chain or route object.
    community_bootstrap:
      $ref: ./communities-community.yaml#/CreateCommunityBootstrapInput
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
    gate_rules:
      type: array
      items:
        $ref: ./communities-core.yaml#/GateRuleInput
      nullable: true
      description: |
        Public v0 create is limited to `membership`-scope `identity_proof` gate rules only. Each submitted gate rule must include explicit `proof_requirements`. Token-holding gate rules, `viewer`-scope gates, and `posting`-scope gates are deferred until post-create settings. The server should reject create requests containing gate rules that fall outside the public v0 scope.
        Public v0 self-serve creation should still reject `sanctions_clear` identity gates; those remain deferred or operator-controlled until their end-to-end request and policy semantics are fully locked.
        Token-holding gate rules are operator-controlled exceptions when enabled later; they are not public-v0 self-serve configuration.
GateRuleInput:
  type: object
  required:
    - scope
    - gate_family
    - gate_type
  properties:
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - erc721_holding
        - erc1155_holding
        - erc20_balance
        - solana_nft_holding
        - unique_human
        - age_over_18
        - nationality
        - gender
        - sanctions_clear
        - wallet_score
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./communities-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Provider-neutral rule config for the selected gate. For identity-proof gates, public v0
        should normalize on a small shared shape rather than arbitrary provider knobs:
        - `nationality`: `required_value` (single ISO code) or `excluded_values` (array of ISO codes)
        - `gender`: `required_value` for the Self document marker (`M` or `F`)
        - `wallet_score`: `minimum_score` (number)
        Deferred/admin-only gates may additionally use:
        - `sanctions_clear`: no extra config required

        Token-holding gate configs are reserved for operator-approved exceptions and are not accepted through public v0 community creation.
        They should still use typed, provider-neutral shapes keyed by `gate_type` rather than arbitrary adapter JSON.
        EVM token gates should require CAIP-2 `chain_namespace` values such as `eip155:1` or `eip155:8453`.
        For `erc721_holding`, the normalized rule shape should support:
        - `standard = erc721`
        - `mode = contract_any | token_id_allowlist | metadata_match`
        - `contract_address`
        - `token_ids` for `token_id_allowlist`
        - `text_terms` and/or `attributes` for `metadata_match`
GateRule:
  type: object
  required:
    - gate_rule_id
    - community_id
    - scope
    - gate_family
    - gate_type
    - status
    - created_at
    - updated_at
  properties:
    gate_rule_id:
      type: string
    community_id:
      type: string
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - erc721_holding
        - erc1155_holding
        - erc20_balance
        - solana_nft_holding
        - unique_human
        - age_over_18
        - nationality
        - gender
        - sanctions_clear
        - wallet_score
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./communities-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Stored provider-neutral rule config. For identity-proof gates, public v0 should normalize
        on:
        - `nationality`: `required_value` or `excluded_values`
        - `gender`: `required_value` for the Self document marker
        - `wallet_score`: `minimum_score`
        Deferred/admin-only gates may additionally use:
        - `sanctions_clear`: no extra config
        Token-holding configs should be typed by `gate_type` and use CAIP-2 `chain_namespace`.
        `erc721_holding` should support `contract_any`, `token_id_allowlist`, and `metadata_match`
        modes so the same gate model can handle generic collection gates and item-level NFT gates.
    status:
      type: string
      enum:
        - active
        - disabled
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
ProofRequirement:
  type: object
  required:
    - proof_type
  x-valid-providers-by-proof-type:
    unique_human:
      - self
      - very
    age_over_18:
      - self
    nationality:
      - self
    gender:
      - self
    wallet_score:
      - passport
    sanctions_clear:
      - passport
  x-unvalidated-proof-types:
    - biometric_liveness
    - gov_id
    - phone
  properties:
    proof_type:
      type: string
      enum:
        - unique_human
        - biometric_liveness
        - wallet_score
        - gov_id
        - age_over_18
        - nationality
        - gender
        - sanctions_clear
        - phone
    accepted_providers:
      type: array
      nullable: true
      description: |
        Optional provider allowlist for the selected `proof_type`.
        Valid public-v0 combinations are:
        - `unique_human`: `self` or `very`
        - `age_over_18`: `self`
        - `nationality`: `self`
        - `gender`: `self` (document marker `M` / `F`)
        - `wallet_score`: `passport`
        Deferred/admin-only combinations:
        - `sanctions_clear`: `passport`
        Other modeled proof types such as `biometric_liveness`, `gov_id`, and `phone` remain
        intentionally unvalidated at the public-v0 provider-matrix layer until the product locks
        their accepted-provider rules.
      items:
        type: string
        enum:
          - self
          - very
          - passport
    accepted_mechanisms:
      type: array
      nullable: true
      items:
        type: string
    config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Optional proof-level constraints. For public v0, identity-proof community gates should
        prefer provider-neutral semantics here or in `gate_config`:
        - `required_value` for `nationality` or the Self document marker `gender`
        - `excluded_values` for `nationality`
        - `minimum_score` for `wallet_score`
HumanVerificationLane:
  type: string
  enum:
    - very
    - self
  description: |
    Primary public-v0 human-verification lane for a community. This is a simple UX-facing summary,
    not a replacement for the underlying capability model. The server must ensure this value is
    consistent with the community's effective gate requirements.
RootPostQuotaRule:
  type: object
  required:
    - window_hours
    - max_root_posts
    - max_song_posts
    - max_video_posts
  properties:
    window_hours:
      type: integer
    max_root_posts:
      type: integer
    max_song_posts:
      type: integer
    max_video_posts:
      type: integer
RootPostQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    established:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    trusted:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    high_trust:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
ReplyQuotaRule:
  type: object
  required:
    - window_hours
    - max_replies
    - burst_window_minutes
    - max_replies_per_burst
  properties:
    window_hours:
      type: integer
    max_replies:
      type: integer
    burst_window_minutes:
      type: integer
    max_replies_per_burst:
      type: integer
ReplyQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    established:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    trusted:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    high_trust:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
CreateCommunityRequest:
  oneOf:
    - $ref: ./communities-governance.yaml#/CreateCentralizedCommunityRequest
    - $ref: ./communities-governance.yaml#/CreateMultisigCommunityRequest
    - $ref: ./communities-governance.yaml#/CreateMajeurCommunityRequest
  discriminator:
    propertyName: governance_mode
    mapping:
      centralized: "#/components/schemas/CreateCentralizedCommunityRequest"
      multisig: "#/components/schemas/CreateMultisigCommunityRequest"
      majeur: "#/components/schemas/CreateMajeurCommunityRequest"
  description: |
    Public v0 clients must submit only `CreateCentralizedCommunityRequest` (governance_mode = centralized). `CreateMultisigCommunityRequest` and `CreateMajeurCommunityRequest` remain valid in the API for internal, allowlisted, or feature-flagged use only. The public client must not submit them.

    For namespace-backed public v0 create, when `namespace` is provided the server must resolve `namespace.namespace_verification_id` to the accepted `NamespaceVerification` resource, confirm it belongs to the requesting creator, and reject the create if the accepted verification is stale, disputed, expired, or no longer satisfies `club_attach_allowed`. When `namespace` is omitted, the community is created without a namespace and can attach one later.
CommunityCreateAcceptedResponse:
  type: object
  required:
    - community
    - job
  properties:
    community:
      $ref: ./communities-core.yaml#/Community
    job:
      $ref: ./jobs.yaml#/Job
      description: |
        The operational community-provisioning job returned by `POST /communities`.
  description: |
    Async acceptance response for community creation. Returns both the community row and
    its operational provisioning job so CLI and SDK clients can continue without secondary
    lookup.
UpdateCommunityRequest:
  type: object
  properties:
    display_name:
      type: string
    description:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
      description: |
        Enables anonymous posts in the club to attach disclosed qualifiers from `allowed_disclosed_qualifiers`. If `false` or `null`, anonymous posts must not expose optional qualifiers.
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    root_post_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/RootPostQuotaByTrustTier
    reply_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/ReplyQuotaByTrustTier
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      description: |
        Community-wide default viewer age gate. Updating this field from `none` to `18_plus` requires the acting owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
    agent_posting_policy:
      type: string
      enum:
        - disallow
        - review
        - allow_with_disclosure
        - allow
      nullable: true
    agent_posting_scope:
      type: string
      enum:
        - replies_only
        - top_level_and_replies
      nullable: true
    agent_daily_post_cap:
      type: integer
      nullable: true
      description: |
        Rolling 24-hour cap for user-agent top-level posts. Null clears the explicit setting.
    agent_daily_reply_cap:
      type: integer
      nullable: true
      description: |
        Rolling 24-hour cap for user-agent replies. Null clears the explicit setting.
    agent_min_owner_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    agent_owner_active_limit:
      type: integer
      nullable: true
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
      nullable: true
      description: |
        Optional update-time override for the community's primary human-verification lane. Null
        clears the explicit override so the server can re-derive the effective lane from the
        current gate set or platform default.
    accepted_agent_ownership_providers:
      type: array
      nullable: true
      description: |
        Optional update-time stricter override for accepted agent-ownership providers. Null clears
        the explicit override so reads can return the server-derived effective provider set.
      items:
        $ref: ./agents.yaml#/AgentOwnershipProvider
Community:
  type: object
  required:
    - community_id
    - display_name
    - status
    - provisioning_state
    - membership_mode
    - allow_anonymous_identity
    - human_verification_lane
    - agent_posting_policy
    - agent_posting_scope
    - accepted_agent_ownership_providers
    - governance_mode
    - donation_policy_mode
    - donation_partner_status
    - money_policy
    - content_authenticity_policy
    - content_authenticity_detection_policy
    - market_context_policy
    - source_policy
    - capture_edit_policy
    - adult_content_policy
    - graphic_content_policy
    - motion_media_policy
    - language_policy
    - civility_policy
    - provenance_policy
    - promotion_policy
    - created_by_user_id
    - created_at
    - updated_at
  properties:
    community_id:
      type: string
    display_name:
      type: string
    description:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    namespace_verification_id:
      type: string
      nullable: true
      description: |
        Attached accepted namespace-verification resource when the community is namespace-backed.
    route_slug:
      type: string
      nullable: true
    pending_namespace_verification_session_id:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - active
        - frozen
        - archived
        - deleted
    provisioning_state:
      type: string
      enum:
        - requested
        - provisioning
        - active
        - rotation_required
        - error
      description: |
        Community infrastructure lifecycle state. This is distinct from domain `status`.
        A community may be domain-active while infrastructure provisioning is still in progress.
    artist_identity_id:
      type: string
      nullable: true
    community_agent_user_id:
      type: string
      nullable: true
      description: |
        App-level system actor for platform-managed community content such as daily questions. In v0, this actor is exempt from ordinary member trust-tier minima and posting quotas when publishing system-tagged content.
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
      description: |
        Resolved effective public-v0 human-verification lane for this community.
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
      description: |
        Whether anonymous posts in the community may attach disclosed qualifiers from `allowed_disclosed_qualifiers`.
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      description: |
        Community-wide default viewer age gate.
    agent_posting_policy:
      type: string
      enum:
        - disallow
        - review
        - allow_with_disclosure
        - allow
      description: |
        Resolved effective user-agent posting policy for this community.
    agent_posting_scope:
      type: string
      enum:
        - replies_only
        - top_level_and_replies
      description: |
        Resolved effective user-agent posting scope for this community.
    agent_daily_post_cap:
      type: integer
      nullable: true
      description: |
        Effective rolling 24-hour cap for user-agent top-level posts.
    agent_daily_reply_cap:
      type: integer
      nullable: true
      description: |
        Effective rolling 24-hour cap for user-agent replies.
    agent_min_owner_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
      description: |
        Effective minimum trust tier the owning human must satisfy before their user-owned agent may post.
    agent_owner_active_limit:
      type: integer
      nullable: true
      description: |
        Effective community-local cap on active user-owned agents per human owner.
    accepted_agent_ownership_providers:
      type: array
      description: |
        Resolved effective accepted agent-ownership providers for this community. The server must
        always return the concrete effective provider set on reads, whether it came from an
        explicit override or from derivation based on `human_verification_lane` and the
        underlying trust floor.
      items:
        $ref: ./agents.yaml#/AgentOwnershipProvider
    civic_scale_tier:
      type: string
      enum:
        - club
        - village
        - town
        - city
        - state
      description: |
        Derived scale label for a community. This is a presentation and progression classification, not a different base entity type.
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
    donation_partner_id:
      type: string
      nullable: true
    donation_partner:
      $ref: ./communities-community.yaml#/DonationPartnerSummary
      nullable: true
    money_policy:
      $ref: ./communities-community.yaml#/CommunityMoneyPolicy
      description: |
        Resolved effective community funding policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default policy from an explicit community configuration.
    content_authenticity_policy:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityPolicy
      description: |
        Resolved effective authenticity policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
    content_authenticity_detection_policy:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityDetectionPolicy
      description: |
        Resolved effective authenticity-detection policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default profile from an explicit community selection.
    market_context_policy:
      $ref: ./market-context.yaml#/CommunityMarketContextPolicy
      description: |
        Resolved effective market-context policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the platform-default policy from an explicit community configuration.
    source_policy:
      $ref: ./communities-community.yaml#/CommunitySourcePolicy
      description: |
        Resolved effective source policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the restrictive default from an explicit community configuration.
    capture_edit_policy:
      $ref: ./communities-community.yaml#/CommunityCaptureEditPolicy
      description: |
        Resolved effective capture-edit policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    adult_content_policy:
      $ref: ./communities-community.yaml#/CommunityAdultContentPolicy
      description: |
        Resolved effective adult-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    graphic_content_policy:
      $ref: ./communities-community.yaml#/CommunityGraphicContentPolicy
      description: |
        Resolved effective graphic-content policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    motion_media_policy:
      $ref: ./communities-community.yaml#/CommunityMotionMediaPolicy
      description: |
        Resolved effective motion-media policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    language_policy:
      $ref: ./communities-community.yaml#/CommunityLanguagePolicy
      description: |
        Resolved effective language policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    civility_policy:
      $ref: ./communities-community.yaml#/CommunityCivilityPolicy
      description: |
        Resolved effective civility policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    provenance_policy:
      $ref: ./communities-community.yaml#/CommunityProvenancePolicy
      description: |
        Resolved effective provenance policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    promotion_policy:
      $ref: ./communities-community.yaml#/CommunityPromotionPolicy
      description: |
        Resolved effective promotion policy returned on community reads. This object must be returned even when the stored policy is unset; use `policy_origin` to distinguish the default from an explicit community configuration.
    label_policy:
      $ref: ./communities-community.yaml#/CommunityLabelPolicy
      nullable: true
    community_profile:
      $ref: ./communities-community.yaml#/CommunityProfile
      nullable: true
    reference_links:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityReferenceLinkPublic
      nullable: true
    community_stage:
      type: string
      enum:
        - initial
      description: |
        Derived server-side community maturity state. This is never a create input. `initial` is the only guaranteed cross-implementation value for public v0. Servers may define additional stage values. New communities start at the initial stage, and later stage progression depends on platform-defined `qualified_member_count` thresholds.
    member_count:
      type: integer
      nullable: true
      description: |
        Total community membership count used for read surfaces. Raw membership alone should not unlock namespace commerce capabilities.
    qualified_member_count:
      type: integer
      nullable: true
      description: |
        Derived count used for community-stage progression and namespace-commerce unlocks. This count is platform-defined and should exclude members that do not satisfy the platform's qualification rules for economic unlocks.
    stage_entered_at:
      type: string
      format: date-time
      nullable: true
      description: |
        Timestamp when the community most recently entered its current derived `community_stage`.
    governance_mode:
      type: string
      enum:
        - centralized
        - multisig
        - majeur
    governance_backend:
      $ref: ./communities-governance.yaml#/CommunityGovernanceBackend
      nullable: true
    gate_rules:
      type: array
      items:
        $ref: ./communities-core.yaml#/GateRule
      nullable: true
    created_by_user_id:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
MembershipResult:
  type: object
  required:
    - community_id
    - status
  properties:
    community_id:
      type: string
    status:
      type: string
      enum:
        - joined
        - requested
        - left
MembershipGateSummary:
  type: object
  required:
    - gate_type
  properties:
    gate_type:
      type: string
      enum:
        - nationality
        - gender
        - unique_human
        - age_over_18
        - wallet_score
    accepted_providers:
      type: array
      nullable: true
      items:
        type: string
        enum:
          - self
          - very
          - passport
    required_value:
      type: string
      nullable: true
      description: ISO 3166-1 alpha-2 country code when gate_type is nationality
    excluded_values:
      type: array
      nullable: true
      items:
        type: string
      description: Array of excluded ISO country codes for nationality gates
CommunityPreview:
  type: object
  required:
    - community_id
    - display_name
    - membership_mode
    - human_verification_lane
    - membership_gate_summaries
    - created_at
  properties:
    community_id:
      type: string
    display_name:
      type: string
    description:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
    member_count:
      type: integer
      nullable: true
    membership_gate_summaries:
      type: array
      items:
        $ref: ./communities-core.yaml#/MembershipGateSummary
    viewer_membership_status:
      type: string
      enum:
        - member
        - not_member
        - banned
      nullable: true
    created_at:
      type: string
      format: date-time
JoinEligibility:
  type: object
  required:
    - community_id
    - membership_mode
    - human_verification_lane
    - joinable_now
    - status
    - membership_gate_summaries
    - missing_capabilities
  properties:
    community_id:
      type: string
    membership_mode:
      type: string
      enum:
        - open
        - gated
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
    joinable_now:
      type: boolean
    status:
      type: string
      enum:
        - joinable
        - requestable
        - verification_required
        - gate_failed
        - already_joined
        - banned
    membership_gate_summaries:
      type: array
      items:
        $ref: ./communities-core.yaml#/MembershipGateSummary
    missing_capabilities:
      type: array
      items:
        type: string
        enum:
          - unique_human
          - age_over_18
          - nationality
          - gender
      description: |
        Missing capability keys for the evaluated join path. Public-v0 community remediation should
        surface only capability keys Pirate can remediate end to end for the current lane, including
        `unique_human`, `age_over_18`, `nationality`, and `gender` for Self-backed flows.
    suggested_verification_provider:
      type: string
      enum:
        - self
        - very
      nullable: true
    suggested_verification_intent:
      type: string
      enum:
        - community_join
      nullable: true
GateFailureDetails:
  type: object
  properties:
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
    membership_gate_summaries:
      type: array
      nullable: true
      items:
        $ref: ./communities-core.yaml#/MembershipGateSummary
    missing_capabilities:
      type: array
      nullable: true
      items:
        type: string
    suggested_verification_provider:
      type: string
      enum:
        - self
        - very
      nullable: true
    suggested_verification_intent:
      type: string
      enum:
        - community_join
      nullable: true
    failure_reason:
      type: string
      enum:
        - missing_verification
        - provider_not_accepted
        - nationality_mismatch
        - gender_mismatch
        - unsupported
        - banned
      nullable: true
