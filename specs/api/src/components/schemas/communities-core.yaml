    suggested_verification_intent:
      type: string
      enum:
        - community_join
        - post_create
        - comment_create
      nullable: true
    failure_reason:
      type: string
      enum:
        - missing_verification
        - provider_not_accepted
        - nationality_mismatch
        - gender_mismatch
        - minimum_age_mismatch
        - erc721_holding_required
        - erc721_inventory_match_required
        - token_inventory_unavailable
        - wallet_score_too_low
        - unsupported
        - banned
      nullable: true
    wallet_score_status:
      type: object
      nullable: true
      description: |
        Current authenticated user's Human Passport score state when a wallet_score gate blocked
        a join attempt.
      properties:
        current_score_decimal:
          type: string
          pattern: ^\d+(\.\d+)?$
          nullable: true
        required_score_decimal:
