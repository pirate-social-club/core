    community:
      type: string
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    human_verification_lane:
      $ref: ./communities-core.yaml#/HumanVerificationLane
    joinable_now:
      type: boolean
    status:
      type: string
      enum:
        - joinable
        - requestable
        - pending_request
        - verification_required
        - gate_failed
        - already_joined
        - banned
    membership_gate_summaries:
      type: array
      items:
        $ref: ./communities-core.yaml#/MembershipGateSummary
    missing_capabilities:
      type: array
      items:
        type: string
        enum:
          - unique_human
          - age_over_18
          - minimum_age
          - nationality
          - gender
          - wallet_score
          - altcha_pow
      description: |
        Missing capability keys for the evaluated join path. Public-v0 community remediation should
        surface only capability keys Pirate can remediate end to end for the current lane, including
        `unique_human`, `age_over_18`, `nationality`, and `gender` for Self-backed flows and
        `wallet_score` for Human Passport checks and `altcha_pow` for per-action proof-of-work.
    suggested_verification_provider:
      type: string
      enum:
        - self
        - very
        - passport
      nullable: true
    suggested_verification_intent:
      type: string
      enum:
        - community_join
        - post_create
        - comment_create
      nullable: true
    failure_reason:
      type: string
      enum:
        - missing_verification
        - provider_not_accepted
        - nationality_mismatch
        - gender_mismatch
        - minimum_age_mismatch
        - erc721_holding_required
        - erc721_inventory_match_required
        - token_inventory_unavailable
        - wallet_score_too_low
        - unsupported
        - banned
      nullable: true
    wallet_score_status:
      type: object
      nullable: true
      description: |
        Current authenticated user's Human Passport score state when the evaluated community
        includes a wallet_score gate. Exposed only on user-specific eligibility/failure responses
        so clients can explain current-vs-required remediation without exposing stamp details.
      properties:
        current_score_decimal:
          type: string
          pattern: ^\d+(\.\d+)?$
          nullable: true
        required_score_decimal:
          type: string
          pattern: ^\d+(\.\d+)?$
          nullable: true
        passing_score:
          type: boolean
          nullable: true
        last_scored_at:
          type: integer
          nullable: true
    gate_evaluation:
      $ref: ./communities-core.yaml#/GatePolicyEvaluation
      nullable: true
MembershipRequestStatus:
  type: string
  enum:
    - pending
    - approved
    - rejected
    - expired
MembershipRequestSummary:
  type: object
  required:
    - id
    - object
    - community
    - applicant_user
    - status
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - membership_request_summary
    community:
      type: string
    applicant_user:
      type: string
    applicant_handle:
      type: string
      nullable: true
    applicant_avatar_ref:
      type: string
      nullable: true
    status:
      $ref: ./communities-core.yaml#/MembershipRequestStatus
    note:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
MembershipRequestListResponse:
