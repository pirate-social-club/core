  properties:
    type:
      type: string
      enum:
        - unique_human
        - minimum_age
        - nationality
        - gender
        - wallet_score
        - altcha_pow
        - erc721_holding
        - erc721_inventory_match
    provider:
      type: string
      enum:
        - self
        - very
        - passport
        - courtyard
        - altcha
      nullable: true
    minimum_age:
      type: integer
    allowed:
      type: array
      items:
        type: string
    minimum_score:
      type: number
    chain_namespace:
