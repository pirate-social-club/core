CreateCommunityRequestBase:
  type: object
  description: |
    Authoritative community-create write model. When `namespace` is provided for namespace-backed communities in public v0, the server must resolve `namespace.namespace_verification` to the accepted namespace-verification object at create time and re-check creator binding, freshness, and `club_attach_allowed` before any community state is written. When `namespace` is omitted, the community is created without a namespace and can attach one later.
  required:
    - display_name
    - membership_mode
    - allow_anonymous_identity
    - handle_policy
  properties:
    display_name:
      type: string
    description:
      type: string
      nullable: true
    database_region:
      type: string
      nullable: true
      enum:
        - auto
        - aws-us-east-1
        - aws-us-east-2
        - aws-us-west-2
        - aws-eu-west-1
        - aws-ap-south-1
        - aws-ap-northeast-1
      description: |
        Create-time primary Turso group location for the community database. `auto` or omission
        lets the server use its configured default. Explicit values must be present in the
        server-side allowed location list and should be treated as difficult to change after
        creation because the region choice defines the community's initial data-residency boundary.
    localized_text:
      $ref: ./communities-core.yaml#/CommunityTextLocalization
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    banner_ref:
      type: string
      nullable: true
    artist_identity:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
      description: |
        Public v0 community creation should submit only `open` or `gated`. `request` remains in the model for deferred, internal, or later use and should not be exposed by the public create client.
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
      description: |
        Required when `allow_anonymous_identity = true`. Public v0 should default to `community_stable`. `post_ephemeral` must not be submitted in the public v0 create flow unless all prerequisites from the domain spec (active content safety classification, at least one active moderator) can be verified at create time.
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
      description: |
        Array of platform-defined `qualifier_template_id` values. Public v0 create may set this when `allow_anonymous_identity = true`. Qualifier suppression of entries already implied by community gates is a read/composer behavior concern, not a create-time configuration concern.
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
      description: |
        Enables anonymous posts in the community to attach disclosed qualifiers from `allowed_disclosed_qualifiers`. Public v0 create may set this only when `allow_anonymous_identity = true`. If `false` or `null`, anonymous posts must not expose optional qualifiers.
    guest_comment_policy:
      type: string
      enum:
        - disallow
        - altcha_required
      nullable: true
      description: |
        Controls unauthenticated guest comment support. `altcha_required` permits guest comments only with a solved per-comment proof-of-work challenge.
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./communities-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      default: none
      description: |
        Community-wide default viewer age gate. Setting this to `18_plus` requires the acting creator or updating owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
    gate_policy:
      $ref: ./communities-core.yaml#/GatePolicy
      nullable: true
    agent_posting_policy:
      type: string
      enum:
        - disallow
        - review
        - allow_with_disclosure
        - allow
      nullable: true
      description: |
        Optional create-time user-agent posting policy. When omitted, reads must resolve the
        restrictive default `disallow`.
    agent_posting_scope:
      type: string
      enum:
        - replies_only
        - top_level_and_replies
      nullable: true
      description: |
        Optional create-time scope for user-owned agent posting. When omitted in a context where
        user-owned agents are enabled, reads should resolve `replies_only`.
    agent_daily_post_cap:
      type: integer
      nullable: true
      description: |
        Optional rolling 24-hour cap for user-agent top-level posts in this community.
    agent_daily_reply_cap:
      type: integer
      nullable: true
      description: |
        Optional rolling 24-hour cap for user-agent replies in this community.
    agent_min_owner_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
      description: |
        Optional minimum trust tier the owning human must satisfy before their user-owned agent may post.
    agent_owner_active_limit:
      type: integer
      nullable: true
      description: |
        Optional community-local cap on active user-owned agents per human owner. Must not exceed
        the platform-wide maximum.
    human_verification_lane:
      type: string
      enum:
        - very
        - self
      nullable: true
      description: |
        Primary public-v0 human-verification lane for this community. This is the UX-facing trust
        lane that tells users which verification path to complete first. `very` is the lighter
        baseline `unique_human` lane. `self` is the higher-friction lane for communities that also
        need richer identity-derived capabilities or stronger agent-native trust semantics. When
        omitted on create, the server may resolve a platform default lane. The server must reject
        or normalize lane selections that are inconsistent with the effective gate set. For
        example, a community whose resolved gates require Self-only capabilities such as
        `nationality` or `age_over_18` must not resolve to `human_verification_lane = very`.
    accepted_agent_ownership_providers:
      type: array
      nullable: true
      description: |
        Optional stricter override for agent KYA acceptance. When omitted, reads should derive the
        effective accepted agent-ownership providers from `human_verification_lane` and the
        community trust floor: any platform-approved KYA provider is acceptable so long as the
        bound human clears the required lane. The platform-approved provider set must come from an
        explicit server-side policy source such as a config-backed allowlist or policy table; mere
        presence in an enum is not sufficient. Set this only when the community wants a narrower
        agent-auth posture, such as Self-only agent ownership.
      items:
        $ref: ./agents.yaml#/AgentOwnershipProvider
    namespace:
      allOf:
        - $ref: ./handles.yaml#/NamespaceAttachmentInput
      nullable: true
      description: |
        Namespace attachment input for community creation. When provided, this must reference an accepted namespace-verification object via `namespace_verification`; the server must consume that accepted verification, not treat the field as a blind string. When omitted, the community is created without a namespace and can attach one later.
    handle_policy:
      allOf:
        - $ref: ./handles.yaml#/HandlePolicyInput
      description: |
        Public v0 new communities should normally start with the `standard` handle-policy template. This creates the namespace policy record at community creation time without implying that public community-local handle claims or namespace commerce are already enabled; those remain disabled until server-derived capability flags unlock them.
    donation_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityDonationPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
    content_authenticity_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityContentAuthenticityPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. Platform-minimum synthetic-likeness bans still override any submitted value.
    source_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunitySourcePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the restrictive default effective policy from the first post onward. This policy governs repost and fan-work handling rather than AI authenticity.
    capture_edit_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityCaptureEditPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default non-generative edit policy from the first post onward.
    adult_content_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityAdultContentPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default adult-content subcategory policy from the first post onward.
    graphic_content_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityGraphicContentPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default graphic-content subcategory policy from the first post onward.
    motion_media_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityMotionMediaPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the effective default motion-media policy from the first post onward.
    language_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityLanguagePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default language policy from the first post onward.
    civility_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityCivilityPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default civility policy from the first post onward.
    provenance_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityProvenancePolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default provenance policy from the first post onward.
    promotion_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityPromotionPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must enforce the effective default promotion policy from the first post onward.
    content_authenticity_detection_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityContentAuthenticityDetectionPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must use the platform-default authenticity-detection profile from the first post onward. Platform-required safety and age-gating analysis remain platform-managed and unaffected.
    market_context_policy:
      allOf:
        - $ref: ./market-context.yaml#/CreateCommunityMarketContextPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the platform-default market-context policy from the first eligible post onward.
    money_policy:
      allOf:
        - $ref: ./communities-community.yaml#/CreateCommunityMoneyPolicyInput
      type: object
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. If omitted, the server must resolve the effective default community money policy. This attached policy defines purchase funding lanes and route constraints without turning the community object into a chain or route object.
    community_bootstrap:
      $ref: ./communities-community.yaml#/CreateCommunityBootstrapInput
      nullable: true
      description: |
        Deferred from the public v0 create client. May be configured during post-create onboarding or through community settings. Remains valid in the API for internal and future use.
    gate_rules:
      type: array
      items:
        $ref: ./communities-core.yaml#/GateRuleInput
      nullable: true
      description: |
        Public v0 create is limited to `membership`-scope gate rules only. Each `identity_proof`
        submitted gate rule must include explicit `proof_requirements`. `viewer`-scope gates and
        `posting`-scope gates are not supported in v0. The server should reject create requests
        containing gate rules that fall outside the public v0 scope.
        Public v0 supports `sanctions_clear` through Human Passport-backed capability state. Self
        OFAC remains deferred until its verifier response polarity and fail-closed parser behavior
        are pinned by tests.
        Public v0 self-serve creation supports a narrow token-holding lane for Ethereum mainnet
        ERC-721 collection membership gates only. Other token-holding variants remain unsupported.
GateRuleInput:
  type: object
  required:
    - scope
    - gate_family
    - gate_type
  properties:
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - unique_human
        - age_over_18
        - minimum_age
        - nationality
        - gender
        - wallet_score
        - altcha_pow
        - erc721_holding
        - erc721_inventory_match
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./communities-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Provider-neutral rule config for the selected gate. For public-v0 gates, normalize on a
        small shared shape rather than arbitrary provider knobs:
        - `nationality`: `required_value` (single ISO code) or `excluded_values` (array of ISO codes)
        - `minimum_age`: `minimum_age` integer threshold from 18 to 125
        - `gender`: `required_value` for the Self document marker (`M` or `F`)
        - `wallet_score`: `minimum_score` (number)
        - `erc721_holding`: `contract_address` on Ethereum mainnet (`chain_namespace: eip155:1`)
        - `erc721_inventory_match`: `contract_address`, `inventory_provider`, `min_quantity`, and canonical `match`
          for an allowlisted ERC-721 inventory provider. The public v0 Courtyard lane currently resolves
          against Courtyard's Polygon inventory API (`chain_namespace: eip155:137`) after server-side
          provider validation. Existing stored gates may still read legacy `asset_filter`, but new
          authoring flows should write `match`.
        Deferred/admin-only gates may additionally use:
        - `sanctions_clear`: no extra config required
GateRule:
  type: object
  required:
    - id
    - object
    - community
    - scope
    - gate_family
    - gate_type
    - status
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - gate_rule
    community:
      type: string
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - unique_human
        - age_over_18
        - minimum_age
        - nationality
        - gender
        - wallet_score
        - erc721_holding
        - erc721_inventory_match
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./communities-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Stored provider-neutral rule config. For public-v0 gates, normalize on:
        - `nationality`: `required_value` or `excluded_values`
        - `minimum_age`: `minimum_age`
        - `gender`: `required_value` for the Self document marker
        - `wallet_score`: `minimum_score`
        - `erc721_holding`: `contract_address`
        - `erc721_inventory_match`: `contract_address`, `inventory_provider`, `min_quantity`, and canonical `match`
          (`asset_filter` is legacy read compatibility)
        Deferred/admin-only gates may additionally use:
        - `sanctions_clear`: no extra config
    status:
      type: string
      enum:
        - active
        - disabled
    created:
      type: integer
      format: int64
ProofRequirement:
  type: object
  required:
    - proof_type
  x-valid-providers-by-proof-type:
    unique_human:
      - self
      - very
    age_over_18:
      - self
    minimum_age:
      - self
    nationality:
      - self
    gender:
      - self
    wallet_score:
      - passport
    sanctions_clear:
      - passport
  x-unvalidated-proof-types:
    - biometric_liveness
    - gov_id
    - phone
  properties:
    proof_type:
      type: string
      enum:
        - unique_human
        - biometric_liveness
        - wallet_score
        - sanctions_clear
        - gov_id
        - age_over_18
        - minimum_age
        - nationality
        - gender
        - phone
    accepted_providers:
      type: array
      nullable: true
      description: |
        Optional provider allowlist for the selected `proof_type`.
        Valid public-v0 combinations are:
        - `unique_human`: `self` or `very`
        - `age_over_18`: `self`
        - `minimum_age`: `self`
        - `nationality`: `self`
        - `gender`: `self` (document marker `M` / `F`)
        - `wallet_score`: `passport`
        - `sanctions_clear`: `passport`
        Self OFAC-backed `sanctions_clear` is intentionally not public-v0 until launch config,
        backend verification config, response polarity, and parser tests are pinned.
        Other modeled proof types such as `biometric_liveness`, `gov_id`, and `phone` remain
        intentionally unvalidated at the public-v0 provider-matrix layer until the product locks
        their accepted-provider rules.
      items:
        type: string
        enum:
          - self
          - very
          - passport
    accepted_mechanisms:
      type: array
      nullable: true
      description: |
        Optional mechanism allowlist for provider-backed proofs. Public-v0 sanctions mechanisms are
        `passport_clean_hands` for Human Passport Clean Hands. `CleanHands` remains accepted as a
        legacy Passport mechanism value.
      items:
        type: string
    config:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Optional proof-level constraints. For public v0, identity-proof community gates should
        prefer provider-neutral semantics here or in `gate_config`:
        - `required_value` for `nationality` or the Self document marker `gender`
        - `excluded_values` for `nationality`
        - `minimum_score` for `wallet_score`
HumanVerificationLane:
  type: string
  enum:
    - very
    - self
  description: |
    Primary public-v0 human-verification lane for a community. This is a simple UX-facing summary,
    not a replacement for the underlying capability model. The server must ensure this value is
    consistent with the community's effective gate requirements.
CommunityAgentResolutionOrigin:
  type: string
  enum:
    - derived
    - explicit
RootPostQuotaRule:
  type: object
  required:
    - window_hours
    - max_root_posts
    - max_song_posts
    - max_video_posts
  properties:
    window_hours:
      type: integer
    max_root_posts:
      type: integer
    max_song_posts:
      type: integer
    max_video_posts:
      type: integer
RootPostQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    established:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    trusted:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
    high_trust:
      $ref: ./communities-core.yaml#/RootPostQuotaRule
ReplyQuotaRule:
  type: object
  required:
    - window_hours
    - max_replies
    - burst_window_minutes
    - max_replies_per_burst
  properties:
    window_hours:
      type: integer
    max_replies:
      type: integer
    burst_window_minutes:
      type: integer
    max_replies_per_burst:
      type: integer
ReplyQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    established:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    trusted:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
    high_trust:
      $ref: ./communities-core.yaml#/ReplyQuotaRule
CreateCommunityRequest:
  oneOf:
    - $ref: ./communities-governance.yaml#/CreateCentralizedCommunityRequest
    - $ref: ./communities-governance.yaml#/CreateMultisigCommunityRequest
    - $ref: ./communities-governance.yaml#/CreateMajeurCommunityRequest
  discriminator:
    propertyName: governance_mode
    mapping:
      centralized: "#/components/schemas/CreateCentralizedCommunityRequest"
      multisig: "#/components/schemas/CreateMultisigCommunityRequest"
      majeur: "#/components/schemas/CreateMajeurCommunityRequest"
  description: |
    Public v0 clients must submit only `CreateCentralizedCommunityRequest` (governance_mode = centralized). `CreateMultisigCommunityRequest` and `CreateMajeurCommunityRequest` remain valid in the API for internal, allowlisted, or feature-flagged use only. The public client must not submit them.

    For namespace-backed public v0 create, when `namespace` is provided the server must resolve `namespace.namespace_verification` to the accepted `NamespaceVerification` resource, confirm it belongs to the requesting creator, and reject the create if the accepted verification is stale, disputed, expired, or no longer satisfies `club_attach_allowed`. When `namespace` is omitted, the community is created without a namespace and can attach one later.
CommunityCreateAcceptedResponse:
  type: object
  required:
    - community
    - job
  properties:
    community:
      $ref: ./communities-core.yaml#/Community
    job:
      $ref: ./jobs.yaml#/Job
      description: |
        The operational community-provisioning job returned by `POST /communities`.
  description: |
    Async acceptance response for community creation. Returns both the community row and
    its operational provisioning job so CLI and SDK clients can continue without secondary
    lookup.
