ModerationSignalSeverity:
  type: string
  enum:
    - low
    - medium
    - high
ModerationCaseStatus:
  type: string
  enum:
    - open
    - resolved
ModerationQueueScope:
  type: string
  enum:
    - community
    - platform
ModerationCaseOpenedBy:
  type: string
  enum:
    - platform_analysis
    - user_report
    - mixed
UserReportReasonCode:
  type: string
  enum:
    - spam
    - harassment
    - hate
    - sexual_content
    - graphic_content
    - misleading
    - other
ModerationActionType:
  type: string
  enum:
    - dismiss
    - hide
    - remove
    - restore
    - age_gate
CreateUserReportRequest:
  type: object
  additionalProperties: false
  required:
    - reason_code
  properties:
    reason_code:
      $ref: ./moderation.yaml#/UserReportReasonCode
    note:
      type: string
      nullable: true
UserReport:
  type: object
  required:
    - id
    - object
    - community
    - post
    - comment
    - reporter_user
    - reason_code
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - user_report
    community:
      type: string
    post:
      type: string
      nullable: true
    comment:
      type: string
      nullable: true
    reporter_user:
      type: string
    reason_code:
      $ref: ./moderation.yaml#/UserReportReasonCode
    note:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
ModerationSignal:
  type: object
  required:
    - id
    - object
    - community
    - post
    - comment
    - analysis_result_ref
    - source
    - signal_type
    - severity
    - provider
    - provider_label
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - moderation_signal
    community:
      type: string
    post:
      type: string
      nullable: true
    comment:
      type: string
      nullable: true
    analysis_result_ref:
      type: string
      nullable: true
    source:
      type: string
      enum:
        - platform_analysis
    signal_type:
      type: string
    severity:
      $ref: ./moderation.yaml#/ModerationSignalSeverity
    provider:
      type: string
    provider_label:
      type: string
    evidence_ref:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
ModerationAction:
  type: object
  required:
    - id
    - object
    - moderation_case
    - community
    - post
    - comment
    - actor_user
    - action_type
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - moderation_action
    moderation_case:
      type: string
    community:
      type: string
    post:
      type: string
      nullable: true
    comment:
      type: string
      nullable: true
    actor_user:
      type: string
    action_type:
      $ref: ./moderation.yaml#/ModerationActionType
    note:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
ModerationCase:
  type: object
  required:
    - id
    - object
    - community
    - post
    - comment
    - status
    - queue_scope
    - priority
    - opened_by
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - moderation_case
    community:
      type: string
    post:
      type: string
      nullable: true
    comment:
      type: string
      nullable: true
    status:
      $ref: ./moderation.yaml#/ModerationCaseStatus
    queue_scope:
      $ref: ./moderation.yaml#/ModerationQueueScope
    priority:
      $ref: ./moderation.yaml#/ModerationSignalSeverity
    opened_by:
      $ref: ./moderation.yaml#/ModerationCaseOpenedBy
    created:
      type: integer
      format: int64
    resolved_at:
      type: integer
      format: int64
      nullable: true
ModerationCaseListResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./moderation.yaml#/ModerationCase
    next_cursor:
      type: string
      nullable: true
ModerationCaseDetail:
  type: object
  required:
    - case
    - post
    - comment
    - signals
    - reports
    - actions
  properties:
    case:
      $ref: ./moderation.yaml#/ModerationCase
    post:
      $ref: ./posts.yaml#/Post
      nullable: true
    comment:
      $ref: ./comments.yaml#/Comment
      nullable: true
    signals:
      type: array
      items:
        $ref: ./moderation.yaml#/ModerationSignal
    reports:
      type: array
      items:
        $ref: ./moderation.yaml#/UserReport
    actions:
      type: array
      items:
        $ref: ./moderation.yaml#/ModerationAction
CreateModerationActionRequest:
  type: object
  additionalProperties: false
  required:
    - action_type
  properties:
    action_type:
      $ref: ./moderation.yaml#/ModerationActionType
    note:
      type: string
      nullable: true
