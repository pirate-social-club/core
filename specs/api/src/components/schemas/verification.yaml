RequestedVerificationCapability:
  type: string
  enum:
    - unique_human
    - age_over_18
    - nationality
    - gender
VerificationIntent:
  type: string
  enum:
    - profile_verification
    - community_creation
    - post_access_18_plus
    - commerce_pricing
    - qualifier_disclosure
StartVerificationSessionRequest:
  type: object
  required:
    - provider
    - requested_capabilities
  description: |
    Start an interactive verification session for a provider that requires a frontend launch flow.
    This surface is intentionally limited to interactive providers such as `self` and `very`.
    Human Passport wallet-score refresh is not modeled as a verification session because it is
    a server-side score lookup by address rather than a QR, widget, or redirect ceremony.
  properties:
    provider:
      type: string
      enum:
        - self
        - very
    provider_mode:
      type: string
      enum:
        - qr_deeplink
        - widget
      nullable: true
      description: |
        Optional requested launch mode. `self` sessions resolve to `qr_deeplink`.
        `very` sessions resolve to `widget` in public v0.
    requested_capabilities:
      type: array
      minItems: 1
      items:
        $ref: ./verification.yaml#/RequestedVerificationCapability
      description: |
        Capability set the session is intended to satisfy. The server owns the provider-specific
        verifier configuration and maps this request to an approved launch payload.
    wallet_attachment_id:
      type: string
      nullable: true
    verification_intent:
      $ref: ./verification.yaml#/VerificationIntent
      nullable: true
      description: |
        Product-flow identifier such as `profile_verification`, `community_creation`,
        `commerce_pricing`, or `qualifier_disclosure`.
    policy_id:
      type: string
      nullable: true
      description: |
        Optional server-defined verification policy identifier. When supplied, the server should
        use this policy as the source of truth for provider-specific verifier settings rather than
        trusting client-authored disclosure or widget configuration.
CompleteVerificationSessionRequest:
  type: object
  description: |
    Provider-agnostic completion or refresh payload for an interactive verification session.
    Fields are optional because some providers complete asynchronously through the callback path
    while others return proof material to the frontend first.
  properties:
    attestation_id:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    provider_payload_ref:
      type: string
      nullable: true
      description: |
        Opaque server-side reference to provider callback payload or proof material already stored
        by the backend.
ProviderVerificationCallbackRequest:
  type: object
  description: |
    Generic callback envelope used by server-owned verification callback handlers.
    Providers may send raw proof material, redirect parameters, or opaque event data.
  properties:
    provider:
      type: string
      enum:
        - self
        - very
    event_type:
      type: string
      nullable: true
    attestation_id:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    payload:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Opaque provider callback body as received or normalized by Pirate. Clients should not
        infer a shared schema across providers.
        Examples:
        - `self`: relayer payloads may include fields such as `attestationId`, `proof`,
          `publicSignals`, and `userContextData`
        - `very`: widget success payloads may include proof or result fields returned from the
          provider-managed widget flow
SelfVerificationDisclosures:
  type: object
  description: |
    Server-resolved disclosure and policy config for a Self launch payload.
  properties:
    issuing_state:
      type: boolean
      nullable: true
    name:
      type: boolean
      nullable: true
    passport_number:
      type: boolean
      nullable: true
    nationality:
      type: boolean
      nullable: true
    date_of_birth:
      type: boolean
      nullable: true
    gender:
      type: boolean
      nullable: true
    expiry_date:
      type: boolean
      nullable: true
    ofac:
      type: boolean
      nullable: true
    excluded_countries:
      type: array
      nullable: true
      items:
        type: string
    minimum_age:
      type: integer
      nullable: true
SelfVerificationLaunch:
  type: object
  description: |
    Pirate's server-resolved Self launch payload. This is not a direct one-to-one mapping of the
    Self SDK constructor; clients must map these fields to the SDK's expected parameters rather
    than spreading this object directly into `SelfAppBuilder`.
  required:
    - app_name
    - endpoint
    - endpoint_type
    - scope
    - session_id
    - user_id
    - user_id_type
    - disclosures
  properties:
    app_name:
      type: string
    logo_base64:
      type: string
      nullable: true
    header:
      type: string
      nullable: true
    endpoint:
      type: string
    endpoint_type:
      type: string
      enum:
        - https
        - staging_https
        - celo
        - staging_celo
    scope:
      type: string
    session_id:
      type: string
    user_id:
      type: string
    user_id_type:
      type: string
      enum:
        - uuid
        - hex
    disclosures:
      $ref: ./verification.yaml#/SelfVerificationDisclosures
    deeplink_callback:
      type: string
      nullable: true
    version:
      type: integer
      enum:
        - 1
        - 2
      nullable: true
    user_defined_data:
      type: string
      nullable: true
    chain_id:
      type: integer
      nullable: true
    dev_mode:
      type: boolean
      nullable: true
VeryWidgetLaunch:
  type: object
  required:
    - app_id
    - context
    - type_id
    - query
    - verify_url
  properties:
    app_id:
      type: string
    context:
      type: string
    type_id:
      type: string
    query:
      type: object
      additionalProperties: true
      description: |
        Opaque server-authored Very widget query payload for the current session. Clients should
        pass this through to the provider widget rather than constructing or mutating it.
        Example shape may include `conditions` plus `options` such as
        `expiredAtLowerBound`, `externalNullifier`, `equalCheckId`, and `pseudonym`.
    verify_url:
      type: string
VerificationSessionLaunch:
  type: object
  required:
    - mode
  description: |
    Frontend launch payload for an interactive verification session.
    Exactly one provider-specific launch object should be present for a non-`none` mode.
  properties:
    mode:
      type: string
      enum:
        - qr_deeplink
        - widget
        - none
    self_app:
      $ref: ./verification.yaml#/SelfVerificationLaunch
    very_widget:
      $ref: ./verification.yaml#/VeryWidgetLaunch
VerificationCapabilities:
  type: object
  required:
    - unique_human
    - age_over_18
    - nationality
    - gender
    - sanctions_clear
    - wallet_score
  properties:
    unique_human:
      $ref: ./verification.yaml#/VerificationCapabilityState
    age_over_18:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        proof_type:
          type: string
          enum:
            - age_over_18
          nullable: true
    nationality:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        proof_type:
          type: string
          enum:
            - nationality
          nullable: true
        value:
          type: string
          nullable: true
          description: ISO country code when verified
    gender:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        value:
          type: string
          enum:
            - M
            - F
          nullable: true
          description: Verified gender value when disclosed by an eligible flow
        proof_type:
          type: string
          enum:
            - gender
          nullable: true
    sanctions_clear:
      $ref: ./verification.yaml#/SanctionsClearCapabilityState
    wallet_score:
      $ref: ./verification.yaml#/WalletScoreCapabilityState
VerificationCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for unique_human, which may be pending during an active verification session.
  properties:
    state:
      type: string
      enum:
        - unverified
        - pending
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
        - very
      nullable: true
    proof_type:
      type: string
      enum:
        - unique_human
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
VerifiedCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for Self-backed disclosure capabilities in v0. These capabilities have no
    pending state — they are either unverified, verified from an accepted record, or expired after
    a re-verification requirement.
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
      nullable: true
    proof_type:
      type: string
      enum:
        - age_over_18
        - nationality
        - gender
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
SanctionsClearCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for Human Passport-backed sanctions screening in v0.
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - sanctions_clear
      nullable: true
    mechanism:
      type: string
      enum:
        - CleanHands
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
WalletScoreCapabilityState:
  type: object
  required:
    - state
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - wallet_score
      nullable: true
    mechanism:
      type: string
      enum:
        - stamps-api-v2
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
    score:
      type: number
      nullable: true
    score_threshold:
      type: number
      nullable: true
    passing_score:
      type: boolean
      nullable: true
    last_score_timestamp:
      type: string
      format: date-time
      nullable: true
    expiration_timestamp:
      type: string
      format: date-time
      nullable: true
    stamps:
      type: array
      nullable: true
      items:
        type: object
        properties:
          stamp_name:
            type: string
          stamp_score:
            type: number
VerificationSession:
  type: object
  required:
    - verification_session_id
    - user_id
    - provider
    - requested_capabilities
    - status
    - created_at
    - expires_at
  properties:
    verification_session_id:
      type: string
    user_id:
      type: string
    provider:
      type: string
      enum:
        - self
        - very
      description: |
        Interactive provider family for this session. Human Passport wallet-score lookups are
        intentionally excluded because they do not require a session ceremony.
    provider_mode:
      type: string
      enum:
        - qr_deeplink
        - widget
      nullable: true
    wallet_attachment_id:
      type: string
      nullable: true
    requested_capabilities:
      type: array
      items:
        $ref: ./verification.yaml#/RequestedVerificationCapability
    verification_intent:
      $ref: ./verification.yaml#/VerificationIntent
      nullable: true
    policy_id:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - pending
        - verified
        - failed
        - expired
    launch:
      $ref: ./verification.yaml#/VerificationSessionLaunch
    callback_path:
      type: string
      nullable: true
      description: |
        Server-owned callback path reserved for provider redirects, relayers, or webhook-style
        completion. Clients should treat this as informational.
    nationality:
      type: string
      nullable: true
    age_at_verification:
      type: integer
      nullable: true
    attestation_id:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    evidence_ref:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
    failure_reason:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
StartNamespaceVerificationSessionRequest:
  type: object
  required:
    - family
    - root_label
  properties:
    family:
      type: string
      enum:
        - hns
      description: |
        Public v0 supports HNS only. Future namespace families may extend this surface without changing the session model.
    root_label:
      type: string
      description: Root label as entered by the creator before server normalization.
CompleteNamespaceVerificationSessionRequest:
  type: object
  description: |
    Trigger a refresh of TXT challenge observations and assertion derivation after the creator has published the required record. The body is optional because many implementations can treat this as an idempotent recheck.
  properties:
    restart_challenge:
      type: boolean
      nullable: true
      description: |
        Optional hint to invalidate the current TXT challenge and issue a new one if the creator wants to restart the proof flow.
NamespaceVerificationAssertions:
  type: object
  description: |
    Accepted or in-flight namespace assertions derived from the current evidence bundle. These facts remain distinct so attach capability, routing capability, and Pirate-managed subdomain capability are not collapsed into one flag.
  properties:
    root_exists:
      type: boolean
      nullable: true
    root_control_verified:
      type: boolean
      nullable: true
    expiry_horizon_sufficient:
      type: boolean
      nullable: true
    routing_enabled:
      type: boolean
      nullable: true
    pirate_dns_authority_verified:
      type: boolean
      nullable: true
NamespaceVerificationCapabilities:
  type: object
  description: |
    Derived capabilities from the current accepted assertions. These are technical capability outputs, not automatic product permission for namespace commerce.
  properties:
    club_attach_allowed:
      type: boolean
      nullable: true
    pirate_web_routing_allowed:
      type: boolean
      nullable: true
    pirate_subdomain_issuance_allowed:
      type: boolean
      nullable: true
NamespaceVerificationSession:
  type: object
  required:
    - namespace_verification_session_id
    - user_id
    - family
    - submitted_root_label
    - status
    - created_at
    - expires_at
  properties:
    namespace_verification_session_id:
      type: string
    namespace_verification_id:
      type: string
      nullable: true
      description: |
        Populated only when the session reaches `verified` and Pirate has issued an accepted verification reference.
    user_id:
      type: string
    family:
      type: string
      enum:
        - hns
    submitted_root_label:
      type: string
    normalized_root_label:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - inspecting
        - dns_setup_required
        - challenge_required
        - challenge_pending
        - verifying
        - verified
        - failed
        - expired
        - disputed
    challenge_host:
      type: string
      nullable: true
      description: Exact host where the TXT challenge must be published when required.
    challenge_txt_value:
      type: string
      nullable: true
      description: TXT value Pirate expects to observe for root-control proof.
    challenge_expires_at:
      type: string
      format: date-time
      nullable: true
      description: Expiration time for the currently issued TXT challenge, distinct from the overall namespace verification session expiry.
    assertions:
      allOf:
        - $ref: ./verification.yaml#/NamespaceVerificationAssertions
      nullable: true
    capabilities:
      allOf:
        - $ref: ./verification.yaml#/NamespaceVerificationCapabilities
      nullable: true
    control_class:
      type: string
      enum:
        - single_holder_root
        - multisig_controlled_root
        - dao_controlled_root
        - burned_or_immutable_root
      nullable: true
    operation_class:
      type: string
      enum:
        - owner_managed_namespace
        - routing_only_namespace
        - pirate_delegated_namespace
      nullable: true
    observation_provider:
      type: string
      nullable: true
      description: |
        Trusted HNS-aware provider used for the most recent accepted observation in public v0, such as Fire HSD.
    evidence_bundle_ref:
      type: string
      nullable: true
    failure_reason:
      type: string
      nullable: true
    accepted_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
NamespaceVerification:
  type: object
  required:
    - namespace_verification_id
    - user_id
    - family
    - normalized_root_label
    - status
    - assertions
    - capabilities
    - accepted_at
    - expires_at
    - created_at
    - updated_at
  properties:
    namespace_verification_id:
      type: string
    user_id:
      type: string
    family:
      type: string
      enum:
        - hns
    normalized_root_label:
      type: string
    status:
      type: string
      enum:
        - verified
        - stale
        - expired
        - disputed
    assertions:
      $ref: ./verification.yaml#/NamespaceVerificationAssertions
    capabilities:
      $ref: ./verification.yaml#/NamespaceVerificationCapabilities
    control_class:
      type: string
      enum:
        - single_holder_root
        - multisig_controlled_root
        - dao_controlled_root
        - burned_or_immutable_root
      nullable: true
    operation_class:
      type: string
      enum:
        - owner_managed_namespace
        - routing_only_namespace
        - pirate_delegated_namespace
      nullable: true
    observation_provider:
      type: string
      nullable: true
    evidence_bundle_ref:
      type: string
      nullable: true
    accepted_at:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
