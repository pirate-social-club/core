VerificationCapabilities:
  type: object
  required:
    - unique_human
    - age_over_18
    - nationality
    - gender
    - wallet_score
  properties:
    unique_human:
      $ref: ./verification.yaml#/VerificationCapabilityState
    age_over_18:
      $ref: ./verification.yaml#/VerifiedCapabilityState
    nationality:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        value:
          type: string
          nullable: true
          description: ISO country code when verified
    gender:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        value:
          type: string
          enum:
            - M
            - F
          nullable: true
          description: Verified gender value when disclosed by an eligible flow
    wallet_score:
      $ref: ./verification.yaml#/WalletScoreCapabilityState
VerificationCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for unique_human, which may be pending during an active verification session.
  properties:
    state:
      type: string
      enum:
        - unverified
        - pending
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
        - very
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - unique_human
        - biometric_liveness
        - wallet_score
        - gov_id
        - age_over_18
        - nationality
        - sanctions_clear
        - gender
        - phone
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
VerifiedCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for age_over_18 and nationality, which have no pending state — they are either unverified, verified from an accepted record, or expired after a re-verification requirement.
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - age_over_18
        - nationality
        - gender
        - gov_id
        - sanctions_clear
        - phone
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
WalletScoreCapabilityState:
  type: object
  required:
    - state
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - wallet_score
      nullable: true
    mechanism:
      type: string
      enum:
        - stamps-api-v2
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
    score:
      type: number
      nullable: true
    score_threshold:
      type: number
      nullable: true
    passing_score:
      type: boolean
      nullable: true
    last_score_timestamp:
      type: string
      format: date-time
      nullable: true
    expiration_timestamp:
      type: string
      format: date-time
      nullable: true
    stamps:
      type: array
      nullable: true
      items:
        type: object
        properties:
          stamp_name:
            type: string
          stamp_score:
            type: number
VerificationSession:
  type: object
  required:
    - verification_session_id
    - user_id
    - provider
    - status
    - created_at
    - expires_at
  properties:
    verification_session_id:
      type: string
    user_id:
      type: string
    provider:
      type: string
      enum:
        - self
        - very
        - passport
    wallet_attachment_id:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - pending
        - verified
        - failed
        - expired
    nationality:
      type: string
      nullable: true
    age_at_verification:
      type: integer
      nullable: true
    attestation_id:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    evidence_ref:
      type: string
      nullable: true
    verified_at:
      type: string
      format: date-time
      nullable: true
    failure_reason:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
