RequestedVerificationCapability:
  type: string
  enum:
    - unique_human
    - age_over_18
    - minimum_age
    - nationality
    - gender
  description: |
    Canonical capability requested from an interactive verification flow. Public v0 should treat
    `unique_human`, `age_over_18`, `minimum_age`, `nationality`, and a document-derived `gender`
    marker as the actively supported Self-backed capability set.
VerificationIntent:
  type: string
  enum:
    - profile_verification
    - community_creation
    - community_join
    - post_access_18_plus
    - commerce_pricing
    - qualifier_disclosure
StartVerificationSessionRequest:
  type: object
  required:
    - provider
  description: |
    Start an interactive verification session for a provider that requires a frontend launch flow.
    This surface is intentionally limited to interactive providers such as `self` and `very`.
    Human Passport wallet-score refresh is not modeled as a verification session because it is
    a server-side score lookup by address rather than a QR, widget, or redirect ceremony.

    The server should treat this request as capability-driven. Clients should not ask the user to
    manually choose raw Self disclosures such as `minimum_age` or `nationality`; the backend should
    compile the provider-specific launch payload from the missing canonical capabilities and the
    current product intent.
  properties:
    provider:
      type: string
      enum:
        - self
        - very
    provider_mode:
      type: string
      enum:
        - qr_deeplink
        - widget
      nullable: true
      description: |
        Optional requested launch mode. `self` sessions resolve to `qr_deeplink`.
        `very` sessions resolve to `widget` in public v0.
    requested_capabilities:
      type: array
      minItems: 1
      items:
        $ref: ./verification.yaml#/RequestedVerificationCapability
      description: |
        Capability set the session is intended to satisfy. The server owns the provider-specific
        verifier configuration and maps this request to an approved launch payload.

        Public-v0 intent:
        - `very`: `unique_human` only
        - `self`: `unique_human`, `age_over_18`, `nationality`, and `gender` (document marker)

        When a Self session requests `age_over_18`, `nationality`, or `gender`, the server should
        also treat `unique_human` as part of the effective capability set.
    verification_requirements:
      type: array
      nullable: true
      items:
        $ref: ./verification.yaml#/VerificationRequirement
      description: |
        Additional typed verifier constraints for the requested capability set. Public v0 uses this
        to request a Self-backed `minimum_age` proof such as 21+ without encoding provider-specific
        verifier configuration in the client.
    wallet_attachment:
      type: string
      nullable: true
    verification_intent:
      $ref: ./verification.yaml#/VerificationIntent
      nullable: true
      description: |
        Product-flow identifier such as `profile_verification`, `community_creation`,
        `commerce_pricing`, or `qualifier_disclosure`.
    policy:
      type: string
      nullable: true
      description: |
        Optional server-defined verification policy identifier. When supplied, the server should
        use this policy as the source of truth for provider-specific verifier settings rather than
        trusting client-authored disclosure or widget configuration.
VerificationRequirement:
  oneOf:
    - type: object
      required:
        - proof_type
      properties:
        proof_type:
          type: string
          enum:
            - minimum_age
        minimum_age:
          type: integer
          minimum: 18
          maximum: 125
          description: Minimum age threshold requested from the verifier.
    - type: object
      required:
        - proof_type
      properties:
        proof_type:
          type: string
          enum:
            - nationality
        required_values:
          type: array
          items:
            type: string
CompleteVerificationSessionRequest:
  type: object
  description: |
    Provider-agnostic completion or refresh payload for an interactive verification session.
    Fields are optional because some providers complete asynchronously while others return proof
    material to the frontend first.
  properties:
    attestation:
      type: string
      nullable: true
    proof:
      nullable: true
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
        - type: array
          items: {}
      description: |
        Provider proof material returned to the browser and forwarded to Pirate for final
        verification. Self proof payloads are SDK-owned JSON; Very proof payloads are usually
        string material returned by the provider bridge.
    proof_hash:
      type: string
      nullable: true
    provider_payload_ref:
      nullable: true
      oneOf:
        - type: string
        - type: object
          additionalProperties: true
      description: |
        Opaque server-side reference to provider callback payload or proof material already stored
        by the backend.
RefreshPassportWalletScoreRequest:
  type: object
  properties:
    wallet_attachment:
      type: string
      nullable: true
    community:
      type: string
      nullable: true
RefreshPassportWalletScoreResponse:
  type: object
  required:
    - wallet_score
  properties:
    wallet_score:
      $ref: ./verification.yaml#/WalletScoreCapabilityState
    wallet_score_status:
      type: object
      nullable: true
      properties:
        current_score_decimal:
          type: string
          pattern: ^\d+(\.\d+)?$
          nullable: true
        required_score_decimal:
          type: string
          pattern: ^\d+(\.\d+)?$
          nullable: true
        passing_score:
          type: boolean
          nullable: true
        last_scored_at:
          type: integer
          nullable: true
    join_eligibility:
      $ref: ./communities-core.yaml#/JoinEligibility
      nullable: true
ProviderVerificationCallbackRequest:
  type: object
  description: |
    Generic callback envelope used by server-owned verification callback handlers.
    Providers may send raw proof material, redirect parameters, or opaque event data.
  properties:
    provider:
      type: string
      enum:
        - self
        - very
    event_type:
      type: string
      nullable: true
    attestation:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    payload:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Opaque provider callback body as received or normalized by Pirate. Clients should not
        infer a shared schema across providers.
        Examples:
        - `self`: relayer payloads may include fields such as `attestationId`, `proof`,
          `publicSignals`, and `userContextData`
        - `very`: widget success payloads may include proof or result fields returned from the
          provider-managed widget flow
SelfVerificationDisclosures:
  type: object
  description: |
    Server-resolved disclosure and policy config for a Self launch payload.
    This is backend-authored provider wiring, not a public community-settings surface.
    Public-v0 community and join flows should primarily rely on:
    - `minimum_age`
    - `nationality`
    - `gender` (document marker)

    Other Self disclosure knobs remain modeled for future or operator-controlled use, but public-v0
    product flows should not expose raw Self `ofac` or `excluded_countries` settings as first-class
    community toggles until Pirate locks their canonical capability and moderation semantics.
  properties:
    issuing_state:
      type: boolean
      nullable: true
    name:
      type: boolean
      nullable: true
    passport_number:
      type: boolean
      nullable: true
    nationality:
      type: boolean
      nullable: true
    date_of_birth:
      type: boolean
      nullable: true
    gender:
      type: boolean
      nullable: true
    expiry_date:
      type: boolean
      nullable: true
    excluded_countries:
      type: array
      nullable: true
      items:
        type: string
    minimum_age:
      type: integer
      nullable: true
SelfVerificationLaunch:
  type: object
  description: |
    Pirate's server-resolved Self launch payload. This is not a direct one-to-one mapping of the
    Self SDK constructor; clients must map these fields to the SDK's expected parameters rather
    than spreading this object directly into `SelfAppBuilder`.
  required:
    - app_name
    - endpoint
    - endpoint_type
    - scope
    - session_id
    - user_id
    - user_id_type
    - disclosures
  properties:
    app_name:
      type: string
    logo_base64:
      type: string
      nullable: true
    header:
      type: string
      nullable: true
    endpoint:
      type: string
    endpoint_type:
      type: string
      enum:
        - https
        - staging_https
        - celo
        - staging_celo
    scope:
      type: string
    session_id:
      type: string
    user_id:
      type: string
    user_id_type:
      type: string
      enum:
        - uuid
        - hex
    disclosures:
      $ref: ./verification.yaml#/SelfVerificationDisclosures
    deeplink_callback:
      type: string
      nullable: true
    version:
      type: integer
      enum:
        - 1
        - 2
      nullable: true
    user_defined_data:
      type: string
      nullable: true
    chain_id:
      type: integer
      nullable: true
    dev_mode:
      type: boolean
      nullable: true
VeryWidgetLaunch:
  type: object
  required:
    - app_id
    - context
    - type_id
    - query
    - verify_url
  properties:
    app_id:
      type: string
    context:
      type: string
    type_id:
      type: string
    query:
      type: object
      additionalProperties: true
      description: |
        Opaque server-authored Very widget query payload for the current session. Clients should
        pass this through to the provider widget rather than constructing or mutating it.
        Example shape may include `conditions` plus `options` such as
        `expiredAtLowerBound`, `externalNullifier`, `equalCheckId`, and `pseudonym`.
        For unique-human verification, the server must use a stable Pirate uniqueness domain for
        `externalNullifier` and a per-session binding value for `pseudonym` or an equivalent
        proof-bound field, then verify both values before minting capabilities.
    verify_url:
      type: string
    session_binding:
      $ref: ./verification.yaml#/VerySessionBinding
VerySessionBinding:
  type: object
  required:
    - uniqueness_domain
    - binding_value
    - challenge_expires_at
  description: |
    Server-authored binding material that the Very proof must cover. This separates the stable
    nullifier domain used for one-person-one-account enforcement from the per-session value used
    to prevent proof replay across verification sessions. For wallet-related flows this does not
    replace wallet-signature ownership proof; it only binds the Very proof to the current Pirate
    verification ceremony.
  properties:
    uniqueness_domain:
      type: string
      description: Stable Very external-nullifier domain for the Pirate capability being minted.
    binding_value:
      type: string
      description: Server-generated per-session challenge, nonce, or hash included in the Very proof.
    binding_field:
      type: string
      enum:
        - pseudonym
        - challenge
      nullable: true
      description: Provider field used to carry the binding value.
    challenge_expires_at:
      type: integer
      format: int64
VerificationSessionLaunch:
  type: object
  required:
    - mode
  description: |
    Frontend launch payload for an interactive verification session.
    Exactly one provider-specific launch object should be present for a non-`none` mode.
  properties:
    mode:
      type: string
      enum:
        - qr_deeplink
        - widget
        - none
    self_app:
      $ref: ./verification.yaml#/SelfVerificationLaunch
    very_widget:
      $ref: ./verification.yaml#/VeryWidgetLaunch
VerificationCapabilities:
  type: object
  required:
    - unique_human
    - age_over_18
    - minimum_age
    - nationality
    - gender
    - wallet_score
  properties:
    unique_human:
      $ref: ./verification.yaml#/VerificationCapabilityState
    age_over_18:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        proof_type:
          type: string
          enum:
            - age_over_18
          nullable: true
    minimum_age:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        proof_type:
          type: string
          enum:
            - minimum_age
          nullable: true
        value:
          type: integer
          nullable: true
          description: Highest reusable minimum-age threshold verified by Self.
    nationality:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        proof_type:
          type: string
          enum:
            - nationality
          nullable: true
        value:
          type: string
          nullable: true
          description: ISO country code when verified
    gender:
      allOf:
        - $ref: ./verification.yaml#/VerifiedCapabilityState
      type: object
      properties:
        value:
          type: string
          enum:
            - M
            - F
          nullable: true
          description: Verified document marker value when disclosed by an eligible Self flow; currently limited to `M` or `F`
        proof_type:
          type: string
          enum:
            - gender
          nullable: true
    wallet_score:
      $ref: ./verification.yaml#/WalletScoreCapabilityState
  description: |
    Current resolved account-level verification capability state. Public-v0 product policy should
    treat these capabilities as reusable until they expire, are revoked, or are replaced by a
    fresher accepted proof. For interactive identity capabilities, Pirate should use reactive
    refresh at gate time rather than background renewal. `gender` remains a high-sensitivity
    document-marker disclosure even when enabled as a supported gate capability.
VerificationCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for unique_human, which may be pending during an active verification session.
    Public-v0 product policy should treat `expired` as requiring a fresh verification before the
    next gated action that depends on this capability.
  properties:
    state:
      type: string
      enum:
        - unverified
        - pending
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
        - very
      nullable: true
    proof_type:
      type: string
      enum:
        - unique_human
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: integer
      format: int64
      nullable: true
VerifiedCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for Self-backed disclosure capabilities in v0. These capabilities have no
    pending state — they are either unverified, verified from an accepted record, or expired after
    a re-verification requirement. Public-v0 refresh should be reactive at gate time rather than
    background or silent.
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - self
      nullable: true
    proof_type:
      type: string
      enum:
        - age_over_18
        - minimum_age
        - nationality
        - gender
      nullable: true
    mechanism:
      type: string
      nullable: true
    verified_at:
      type: integer
      format: int64
      nullable: true
SanctionsClearCapabilityState:
  type: object
  required:
    - state
  description: |
    Capability state for provider-backed sanctions screening in v0. Public v0 currently accepts
    Human Passport-backed sanctions state only. Self OFAC support remains deferred until Pirate has
    pinned the Self launch config, backend verification config, response polarity, and fail-closed
    parser tests.
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - sanctions_clear
      nullable: true
    mechanism:
      type: string
      enum:
        - passport_clean_hands
        - CleanHands
      nullable: true
    verified_at:
      type: integer
      format: int64
      nullable: true
WalletScoreCapabilityState:
  type: object
  required:
    - state
  properties:
    state:
      type: string
      enum:
        - unverified
        - verified
        - expired
    provider:
      type: string
      enum:
        - passport
      nullable: true
    proof_type:
      type: string
      enum:
        - wallet_score
      nullable: true
    mechanism:
      type: string
      enum:
        - stamps-api-v2
      nullable: true
    verified_at:
      type: integer
      format: int64
      nullable: true
    score_decimal:
      type: string
      pattern: ^\d+(\.\d+)?$
      nullable: true
    score_threshold_decimal:
      type: string
      pattern: ^\d+(\.\d+)?$
      nullable: true
    passing_score:
      type: boolean
      nullable: true
    last_scored_at:
      type: integer
      nullable: true
    expires_at:
      type: integer
      nullable: true
    stamps:
      type: array
      nullable: true
      items:
        type: object
        properties:
          stamp_name:
            type: string
          stamp_score_decimal:
            type: string
            pattern: ^\d+(\.\d+)?$
VerificationSession:
  type: object
  required:
    - id
    - object
    - user
    - provider
    - requested_capabilities
    - status
    - created
    - expires_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - verification_session
    user:
      type: string
    provider:
      type: string
      enum:
        - self
        - very
      description: |
        Interactive provider family for this session. Human Passport wallet-score lookups are
        intentionally excluded because they do not require a session ceremony.
    provider_mode:
      type: string
      enum:
        - qr_deeplink
        - widget
      nullable: true
    wallet_attachment:
      type: string
      nullable: true
    requested_capabilities:
      type: array
      items:
        $ref: ./verification.yaml#/RequestedVerificationCapability
    verification_requirements:
      type: array
      items:
        $ref: ./verification.yaml#/VerificationRequirement
    verification_intent:
      $ref: ./verification.yaml#/VerificationIntent
      nullable: true
    policy:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - pending
        - verified
        - failed
        - expired
    launch:
      $ref: ./verification.yaml#/VerificationSessionLaunch
    callback_path:
      type: string
      nullable: true
      description: |
        Server-owned completion path for the session. Clients may treat this as informational.
    nationality:
      type: string
      nullable: true
    age_at_verification:
      type: integer
      nullable: true
    attestation:
      type: string
      nullable: true
    proof_hash:
      type: string
      nullable: true
    evidence_ref:
      type: string
      nullable: true
    verified_at:
      type: integer
      format: int64
      nullable: true
    failure_reason:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
StartNamespaceVerificationSessionRequest:
  type: object
  required:
    - family
    - root_label
  properties:
    family:
      type: string
      enum:
        - hns
        - spaces
      description: |
        Public v0 supports HNS and Spaces. Future namespace families may extend this surface without changing the session model.
    root_label:
      type: string
      description: Root label as entered by the creator before server normalization.
CompleteNamespaceVerificationSessionRequest:
  type: object
  description: |
    Trigger a refresh of challenge observations and assertion derivation after the creator has completed the required proof step. The body is optional because many implementations can treat this as an idempotent recheck.
  properties:
    restart_challenge:
      type: boolean
      nullable: true
      description: |
        Optional hint to invalidate the current challenge and issue a new one if the creator wants to restart the proof flow.
NamespaceVerificationAssertions:
  type: object
  description: |
    Accepted or in-flight namespace assertions derived from the current evidence bundle. These facts remain distinct so attach capability, routing capability, live root-key control, and protocol-specific managed-issuance capability are not collapsed into one flag.
  properties:
    root_exists:
      type: boolean
      nullable: true
    root_control_verified:
      type: boolean
      nullable: true
    expiry_horizon_sufficient:
      type: boolean
      nullable: true
    routing_enabled:
      type: boolean
      nullable: true
    pirate_dns_authority_verified:
      type: boolean
      nullable: true
    root_key_proof_verified:
      type: boolean
      nullable: true
    fabric_publish_verified:
      type: boolean
      nullable: true
    anchor_fresh_enough:
      type: boolean
      nullable: true
    owner_signed_updates_verified:
      type: boolean
      nullable: true
NamespaceVerificationCapabilities:
  type: object
  description: |
    Derived capabilities from the current accepted assertions. These are technical capability outputs, not automatic product permission for namespace commerce.
  properties:
    club_attach_allowed:
      type: boolean
      nullable: true
    pirate_web_routing_allowed:
      type: boolean
      nullable: true
    pirate_subdomain_issuance_allowed:
      type: boolean
      nullable: true
    owner_signed_record_updates_allowed:
      type: boolean
      nullable: true
    pirate_subspace_issuance_allowed:
      type: boolean
      nullable: true
NamespaceVerificationSession:
  type: object
  required:
    - id
    - object
    - user
    - family
    - submitted_root_label
    - status
    - created
    - expires_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - namespace_verification_session
    namespace_verification:
      type: string
      nullable: true
      description: |
        Populated only when the session reaches `verified` and Pirate has issued an accepted verification reference.
    user:
      type: string
    family:
      type: string
      enum:
        - hns
        - spaces
    submitted_root_label:
      type: string
    normalized_root_label:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - inspecting
        - dns_setup_required
        - challenge_required
        - challenge_pending
        - verifying
        - verified
        - failed
        - expired
        - disputed
      description: |
        Shared namespace-verification session status.
        `dns_setup_required` is HNS-only and should not be used for Spaces sessions.
    challenge_kind:
      type: string
      enum:
        - dns_txt
        - fabric_txt_publish
      nullable: true
      description: |
        Family-specific challenge type for the current session.
        `dns_txt` is used by HNS-style TXT proof flows.
        `fabric_txt_publish` is used by Spaces Fabric publish proof flows.
    challenge_host:
      type: string
      nullable: true
      description: |
        Explicit record host for DNS TXT flows such as `_pirate.<root>`.
    challenge_txt_value:
      type: string
      nullable: true
      description: |
        Exact TXT content Pirate expects for DNS TXT verification flows.
    challenge_payload:
      type: object
      nullable: true
      additionalProperties: true
      description: |
        Family-specific challenge payload.
        Example HNS payload fields may include `host` and `txt_value`.
        Example Spaces payload fields may include `message`, `digest`, and signer metadata.
    challenge_expires_at:
      type: integer
      format: int64
      nullable: true
      description: Expiration time for the currently issued challenge, distinct from the overall namespace verification session expiry.
    setup_nameservers:
      type: array
      nullable: true
      items:
        type: string
      description: |
        Nameservers the user should publish for the Pirate-managed HNS path before TXT verification can continue.
    assertions:
      allOf:
        - $ref: ./verification.yaml#/NamespaceVerificationAssertions
      nullable: true
    capabilities:
      allOf:
        - $ref: ./verification.yaml#/NamespaceVerificationCapabilities
      nullable: true
    control_class:
      type: string
      enum:
        - single_holder_root
        - multisig_controlled_root
        - dao_controlled_root
        - burned_or_immutable_root
      nullable: true
    operation_class:
      type: string
      enum:
        - owner_managed_namespace
        - routing_only_namespace
        - pirate_delegated_namespace
        - owner_signed_updates_namespace
      nullable: true
    observation_provider:
      type: string
      nullable: true
      description: |
        Trusted provider used for the most recent accepted namespace-verification observation in public v0.
    evidence_bundle_ref:
      type: string
      nullable: true
    failure_reason:
      type: string
      nullable: true
    accepted_at:
      type: integer
      format: int64
      nullable: true
    created:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
NamespaceVerification:
  type: object
  required:
    - id
    - object
    - user
    - family
    - normalized_root_label
    - status
    - assertions
    - capabilities
    - accepted_at
    - expires_at
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - namespace_verification
    user:
      type: string
    family:
      type: string
      enum:
        - hns
        - spaces
    normalized_root_label:
      type: string
    status:
      type: string
      enum:
        - verified
        - stale
        - expired
        - disputed
    assertions:
      $ref: ./verification.yaml#/NamespaceVerificationAssertions
    capabilities:
      $ref: ./verification.yaml#/NamespaceVerificationCapabilities
    control_class:
      type: string
      enum:
