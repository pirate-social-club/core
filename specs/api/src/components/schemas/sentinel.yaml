SentinelSubscriptionEnsureResponse:
  type: object
  required:
    - sentinel_subscription
    - wallet_attachment
    - wallet_address
    - plan_key
    - chain_subscription
    - status
    - created_now
  properties:
    sentinel_subscription:
      type: string
    wallet_attachment:
      type: string
    wallet_address:
      type: string
    plan_key:
      type: string
      description: |
        Pirate-side plan key used to map a paid dVPN entitlement onto Sentinel allocation.
    chain_subscription:
      type: string
    allocation_tx_hash:
      type: string
      nullable: true
    allocated_bytes:
      type: integer
      nullable: true
      format: int64
    expires_at:
      type: integer
      format: int64
      nullable: true
    status:
      type: string
      enum:
        - active
    created_now:
      type: boolean
      description: |
        `true` when this call created and persisted a new Sentinel subscription allocation.
