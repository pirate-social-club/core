Profile:
  type: object
  required:
    - id
    - object
    - global_handle
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - profile
    display_name:
      type: string
      nullable: true
    avatar_ref:
      type: string
      nullable: true
    avatar_source:
      type: string
      enum:
        - ens
        - upload
        - none
      nullable: true
    cover_ref:
      type: string
      nullable: true
    cover_source:
      type: string
      enum:
        - ens
        - upload
        - none
      nullable: true
    bio:
      type: string
      nullable: true
    bio_source:
      type: string
      enum:
        - ens
        - manual
        - none
      nullable: true
    preferred_locale:
      type: string
      nullable: true
    display_verified_nationality_badge:
      type: boolean
      nullable: true
    nationality_badge_country:
      type: string
      nullable: true
    linked_handles:
      type: array
      nullable: true
      items:
        $ref: ./profiles.yaml#/LinkedHandle
    primary_public_handle:
      allOf:
        - $ref: ./profiles.yaml#/LinkedHandle
      nullable: true
    primary_wallet_address:
      type: string
      nullable: true
      description: Public primary wallet address when Pirate product policy exposes wallet-linked identity on profile.
    xmtp_inbox:
      type: string
      nullable: true
      description: Optional published XMTP inbox ID for direct profile messaging. This is populated only after the user opts in to encrypted chat identity publication.
    verification_capabilities:
      allOf:
        - $ref: ./verification.yaml#/VerificationCapabilities
      nullable: true
      description: Public normalized trust projection shown on profile when Pirate enables public trust fields.
    global_handle:
      $ref: ./profiles.yaml#/GlobalHandle
    created:
      type: integer
      format: int64
PublicProfileResolution:
  type: object
  required:
    - profile
    - requested_handle_label
    - resolved_handle_label
    - is_canonical
    - created_communities
  properties:
    profile:
      $ref: ./profiles.yaml#/Profile
    requested_handle_label:
      type: string
    resolved_handle_label:
      type: string
    is_canonical:
      type: boolean
    created_communities:
      type: array
      items:
        type: object
        required:
          - community
          - display_name
          - created
        properties:
          community:
            type: string
          display_name:
            type: string
          route_slug:
            type: string
            nullable: true
          created:
            type: integer
            format: int64
LinkedHandle:
  type: object
  required:
    - linked_handle
    - label
    - kind
    - verification_state
  properties:
    linked_handle:
      type: string
    label:
      type: string
    kind:
      type: string
      enum:
        - pirate
        - ens
    verification_state:
      type: string
      enum:
        - verified
        - unverified
        - stale
    metadata:
      type: object
      additionalProperties: true
      nullable: true
GlobalHandle:
  type: object
  required:
    - id
    - object
    - label
    - tier
    - status
    - issuance_source
    - issued_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - global_handle
    label:
      type: string
    tier:
      type: string
      enum:
        - generated
        - standard
        - premium
    status:
      type: string
      enum:
        - active
        - redirect
        - retired
    issuance_source:
      type: string
      enum:
        - generated_signup
        - free_cleanup_rename
        - reddit_verified_claim
        - paid_upgrade
        - admin_grant
    redirect_target_global_handle:
      type: string
      nullable: true
    price_paid_cents:
      type: integer
      minimum: 0
      nullable: true
    free_rename_consumed:
      type: boolean
    issued_at:
      type: integer
      format: int64
    replaced_at:
      type: integer
      format: int64
      nullable: true
HandleUpgradeQuote:
  type: object
  required:
    - desired_label
    - tier
    - price_cents
    - eligible
  properties:
    desired_label:
      type: string
    tier:
      type: string
      enum:
        - standard
        - premium
    price_cents:
      type: integer
      minimum: 0
    eligible:
      type: boolean
    reason:
      type: string
      nullable: true
