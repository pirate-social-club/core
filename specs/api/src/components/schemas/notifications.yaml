UserTaskType:
  type: string
  enum:
    - namespace_verification_required
    - namespace_verification_pending
    - unique_human_verification_required
    - profile_completion_suggested
    - global_handle_cleanup_suggested
    - payout_setup_required
    - royalty_claim_available
    - membership_review
UserTaskStatus:
  type: string
  enum:
    - open
    - completed
    - dismissed
NotificationEventType:
  type: string
  enum:
    - comment_reply
    - post_commented
    - mention
    - mod_event
    - community_update
    - xmtp_message
    - royalty_earned
UserTask:
  type: object
  required:
    - id
    - object
    - user
    - type
    - subject_type
    - subject
    - status
    - priority
    - payload
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - user_task
    user:
      type: string
    type:
      $ref: ./notifications.yaml#/UserTaskType
    subject_type:
      type: string
    subject:
      type: string
    status:
      $ref: ./notifications.yaml#/UserTaskStatus
    priority:
      type: integer
    payload:
      type: object
      nullable: true
      additionalProperties: true
    resolved_at:
      type: integer
      format: int64
      nullable: true
    dismissed_at:
      type: integer
      format: int64
      nullable: true
    created:
      type: integer
      format: int64
NotificationEvent:
  type: object
  required:
    - id
    - object
    - type
    - actor_user
    - subject_type
    - subject
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - notification_event
    type:
      $ref: ./notifications.yaml#/NotificationEventType
    actor_user:
      type: string
      nullable: true
    subject_type:
      type: string
    subject:
      type: string
    object_type:
      type: string
      nullable: true
    payload:
      type: object
      nullable: true
      additionalProperties: true
    created:
      type: integer
      format: int64
NotificationReceipt:
  type: object
  required:
    - id
    - object
    - recipient_user
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - notification_receipt
    recipient_user:
      type: string
    seen_at:
      type: integer
      format: int64
      nullable: true
    read_at:
      type: integer
      format: int64
      nullable: true
    created:
      type: integer
      format: int64
NotificationSummary:
  type: object
  required:
    - open_task_count
    - unread_activity_count
    - has_unread
  properties:
    open_task_count:
      type: integer
    unread_activity_count:
      type: integer
    has_unread:
      type: boolean
NotificationFeedItem:
  type: object
  required:
    - event
    - receipt
  properties:
    event:
      $ref: ./notifications.yaml#/NotificationEvent
    receipt:
      $ref: ./notifications.yaml#/NotificationReceipt
NotificationFeedResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/NotificationFeedItem
    next_cursor:
      type: string
      nullable: true
NotificationTasksResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/UserTask
    next_cursor:
      type: string
      nullable: true
MarkNotificationsReadRequest:
  type: object
  properties:
    event_ids:
      type: array
      items:
        type: string
DismissTaskRequest:
  type: object
  required:
    - task
  properties:
    task:
      type: string
ClaimableRoyaltyItem:
  type: object
  required:
    - ip
    - claimable_wip_wei
    - asset
    - community
    - title
  properties:
    ip:
      type: string
    claimable_wip_wei:
      type: string
    asset:
      type: string
    community:
      type: string
    title:
      type: string
      nullable: true
ClaimableRoyaltiesResponse:
  type: object
  required:
    - items
    - total_claimable_wip_wei
    - checked_at
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/ClaimableRoyaltyItem
    total_claimable_wip_wei:
      type: string
    checked_at:
      type: integer
      format: int64
RoyaltyActivityItem:
  type: object
  required:
    - id
    - object
    - community
    - asset
    - title
    - story_ip
    - amount_wip_wei
    - buyer_wallet_address
    - tx_hash
    - purchase
    - created
    - read_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - royalty_activity_item
    community:
      type: string
    asset:
      type: string
    title:
      type: string
      nullable: true
    story_ip:
      type: string
    amount_wip_wei:
      type: string
    buyer_wallet_address:
      type: string
      nullable: true
    tx_hash:
      type: string
      nullable: true
    purchase:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
    read_at:
      type: integer
      format: int64
      nullable: true
RoyaltyActivityResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/RoyaltyActivityItem
    next_cursor:
      type: string
      nullable: true
RoyaltyClaimRecordRequest:
  type: object
  required:
    - tx_hash
    - wallet_address
    - chain
    - claimable_wip_wei_at_submission
    - ip_ids
    - auto_unwrap_ip_tokens
  properties:
    tx_hash:
      type: string
    wallet_address:
      type: string
    chain:
      type: integer
    claimable_wip_wei_at_submission:
      type: string
    ip_ids:
      type: array
      items:
        type: string
    auto_unwrap_ip_tokens:
      type: boolean
RoyaltyClaimRecord:
  type: object
  required:
    - id
    - object
    - user
    - tx_hash
    - wallet_address
    - chain
    - claimable_wip_wei_at_submission
    - ip_ids
    - auto_unwrap_ip_tokens
    - status
    - verified_at
    - verification_error
    - claimed_at
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - royalty_claim_record
    user:
      type: string
    tx_hash:
      type: string
    wallet_address:
      type: string
    chain:
      type: integer
    claimable_wip_wei_at_submission:
      type: string
    ip_ids:
      type: array
      items:
        type: string
    auto_unwrap_ip_tokens:
      type: boolean
    status:
      type: string
      enum:
        - pending
        - confirmed
        - failed
    verified_at:
      type: integer
      format: int64
      nullable: true
    verification_error:
      type: string
      nullable: true
    claimed_at:
      type: integer
      format: int64
    created:
      type: integer
      format: int64
RoyaltyClaimHistoryResponse:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/RoyaltyClaimRecord
