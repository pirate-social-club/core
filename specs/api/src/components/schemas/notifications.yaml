UserTaskType:
  type: string
  enum:
    - namespace_verification_required
    - namespace_verification_pending
    - unique_human_verification_required
    - profile_completion_suggested
    - global_handle_cleanup_suggested
    - payout_setup_required
    - royalty_claim_available
    - membership_review

UserTaskStatus:
  type: string
  enum:
    - open
    - completed
    - dismissed

NotificationEventType:
  type: string
  enum:
    - comment_reply
    - post_commented
    - mention
    - mod_event
    - community_update
    - xmtp_message
    - royalty_earned

UserTask:
  type: object
  required:
    - task_id
    - user_id
    - type
    - subject_type
    - subject_id
    - status
    - priority
    - payload
    - created_at
    - updated_at
  properties:
    task_id:
      type: string
    user_id:
      type: string
    type:
      $ref: ./notifications.yaml#/UserTaskType
    subject_type:
      type: string
    subject_id:
      type: string
    status:
      $ref: ./notifications.yaml#/UserTaskStatus
    priority:
      type: integer
    payload:
      type: object
      nullable: true
      additionalProperties: true
    resolved_at:
      type: string
      format: date-time
      nullable: true
    dismissed_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

NotificationEvent:
  type: object
  required:
    - event_id
    - type
    - actor_user_id
    - subject_type
    - subject_id
    - created_at
  properties:
    event_id:
      type: string
    type:
      $ref: ./notifications.yaml#/NotificationEventType
    actor_user_id:
      type: string
      nullable: true
    subject_type:
      type: string
    subject_id:
      type: string
    object_type:
      type: string
      nullable: true
    object_id:
      type: string
      nullable: true
    payload:
      type: object
      nullable: true
      additionalProperties: true
    created_at:
      type: string
      format: date-time

NotificationReceipt:
  type: object
  required:
    - event_id
    - recipient_user_id
    - created_at
  properties:
    event_id:
      type: string
    recipient_user_id:
      type: string
    seen_at:
      type: string
      format: date-time
      nullable: true
    read_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time

NotificationSummary:
  type: object
  required:
    - open_task_count
    - unread_activity_count
    - has_unread
  properties:
    open_task_count:
      type: integer
    unread_activity_count:
      type: integer
    has_unread:
      type: boolean

NotificationFeedItem:
  type: object
  required:
    - event
    - receipt
  properties:
    event:
      $ref: ./notifications.yaml#/NotificationEvent
    receipt:
      $ref: ./notifications.yaml#/NotificationReceipt

NotificationFeedResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/NotificationFeedItem
    next_cursor:
      type: string
      nullable: true

NotificationTasksResponse:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/UserTask

MarkNotificationsReadRequest:
  type: object
  properties:
    event_ids:
      type: array
      items:
        type: string

DismissTaskRequest:
  type: object
  required:
    - task_id
  properties:
    task_id:
      type: string

ClaimableRoyaltyItem:
  type: object
  required:
    - ip_id
    - claimable_wip_wei
    - asset_id
    - community_id
    - title
  properties:
    ip_id:
      type: string
    claimable_wip_wei:
      type: string
    asset_id:
      type: string
    community_id:
      type: string
    title:
      type: string
      nullable: true

ClaimableRoyaltiesResponse:
  type: object
  required:
    - items
    - total_claimable_wip_wei
    - checked_at
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/ClaimableRoyaltyItem
    total_claimable_wip_wei:
      type: string
    checked_at:
      type: string
      format: date-time

RoyaltyActivityItem:
  type: object
  required:
    - event_id
    - community_id
    - asset_id
    - title
    - story_ip_id
    - amount_wip_wei
    - buyer_wallet_address
    - tx_hash
    - purchase_id
    - created_at
    - read_at
  properties:
    event_id:
      type: string
    community_id:
      type: string
    asset_id:
      type: string
    title:
      type: string
      nullable: true
    story_ip_id:
      type: string
    amount_wip_wei:
      type: string
    buyer_wallet_address:
      type: string
      nullable: true
    tx_hash:
      type: string
      nullable: true
    purchase_id:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    read_at:
      type: string
      format: date-time
      nullable: true

RoyaltyActivityResponse:
  type: object
  required:
    - items
    - next_cursor
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/RoyaltyActivityItem
    next_cursor:
      type: string
      nullable: true

RoyaltyClaimRecordRequest:
  type: object
  required:
    - tx_hash
    - wallet_address
    - chain_id
    - claimable_wip_wei_at_submission
    - ip_ids
    - auto_unwrap_ip_tokens
  properties:
    tx_hash:
      type: string
    wallet_address:
      type: string
    chain_id:
      type: integer
    claimable_wip_wei_at_submission:
      type: string
    ip_ids:
      type: array
      items:
        type: string
    auto_unwrap_ip_tokens:
      type: boolean

RoyaltyClaimRecord:
  type: object
  required:
    - claim_id
    - user_id
    - tx_hash
    - wallet_address
    - chain_id
    - claimable_wip_wei_at_submission
    - ip_ids
    - auto_unwrap_ip_tokens
    - status
    - verified_at
    - verification_error
    - claimed_at
    - created_at
  properties:
    claim_id:
      type: string
    user_id:
      type: string
    tx_hash:
      type: string
    wallet_address:
      type: string
    chain_id:
      type: integer
    claimable_wip_wei_at_submission:
      type: string
    ip_ids:
      type: array
      items:
        type: string
    auto_unwrap_ip_tokens:
      type: boolean
    status:
      type: string
      enum:
        - pending
        - confirmed
        - failed
    verified_at:
      type: string
      format: date-time
      nullable: true
    verification_error:
      type: string
      nullable: true
    claimed_at:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time

RoyaltyClaimHistoryResponse:
  type: object
  required:
    - items
  properties:
    items:
      type: array
      items:
        $ref: ./notifications.yaml#/RoyaltyClaimRecord
