PostFlair:
  type: object
  description: |
    Resolved flair summary for a post read surface. Historical posts may continue to return flair definitions whose current `status` is `archived`; clients should still render the flair pill normally in that case rather than treating it as hidden or as a special archived badge.
  required:
    - flair_id
    - label
    - status
  properties:
    flair_id:
      type: string
    label:
      type: string
    color_token:
      type: string
      nullable: true
    status:
