    - position
  additionalProperties: false
  properties:
    label:
      type: string
    description:
      type: string
      nullable: true
    color_token:
      type: string
      nullable: true
    position:
      type: integer
      minimum: 0
    allowed_post_types:
      type: array
      items:
        type: string
        enum:
          - text
          - image
          - video
          - song
      nullable: true
