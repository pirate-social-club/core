CreateLiveRoomRequest:
  type: object
  required:
    - title
    - access_mode
    - room_kind
    - visibility
    - performer_allocations
    - initial_setlist
  properties:
    title:
      type: string
    description:
      type: string
      nullable: true
    event_start_at:
      type: string
      format: date-time
      nullable: true
    access_mode:
      type: string
      enum:
        - free
        - gated
        - paid
    room_kind:
      type: string
      enum:
        - solo
        - duet
    visibility:
      type: string
      enum:
        - public
        - unlisted
    guest_user_id:
      type: string
      nullable: true
    performer_allocations:
      type: array
      minItems: 1
      items:
        $ref: ./livestreams.yaml#/LiveRoomPerformerAllocationInput
    cover_ref:
      type: string
      nullable: true
    participant_capacity:
      type: integer
      nullable: true
    listing_id:
      type: string
      nullable: true
    replay_listing_id:
      type: string
      nullable: true
    anchor_post_id:
      type: string
      nullable: true
    initial_setlist:
      $ref: ./livestreams.yaml#/InitialLiveSetlistInput
InitialLiveSetlistInput:
  type: object
  description: |
    Initial setlist payload required when creating a live room. The setlist may begin in `draft` state, but it must exist from creation time onward.
  required:
    - status
    - items
  properties:
    status:
      type: string
      enum:
        - draft
        - active
    items:
      type: array
      minItems: 1
      items:
        $ref: ./livestreams.yaml#/LiveSetlistItemInput
LiveSetlistItemInput:
  type: object
  description: |
    Setlist items should resolve against Pirate's canonical track catalog by default. `title_text` and `artist_text` are stored as display snapshots or manual fallback metadata when canonical resolution is not yet available.
  required:
    - sequence_index
    - title_text
    - performance_kind
    - rights_hint
  properties:
    sequence_index:
      type: integer
      minimum: 0
    title_text:
      type: string
    artist_text:
      type: string
      nullable: true
    declared_track_id:
      type: string
      nullable: true
    performance_kind:
      type: string
      enum:
        - original
        - cover
        - remix
        - dj_playback
        - unknown
    rights_hint:
      type: string
      enum:
        - community_catalog
        - story_catalog
        - third_party
        - unknown
    notes:
      type: string
      nullable: true
LiveRoomPerformerAllocationInput:
  type: object
  description: |
    Explicit performer-side revenue allocation for the room. In v0, solo rooms should provide one host allocation at 100, and duet rooms should provide two allocations whose shares sum to 100.
  required:
    - user_id
    - role
    - share_pct
  properties:
    user_id:
      type: string
    role:
      type: string
      enum:
        - host
        - guest
    share_pct:
      type: number
      minimum: 0
      maximum: 100
LiveRoom:
  type: object
  required:
    - live_room_id
    - guild_id
    - anchor_post_id
    - host_user_id
    - title
    - status
    - access_mode
    - room_kind
    - visibility
    - performer_allocations
    - replay_status
    - created_at
    - updated_at
  properties:
    live_room_id:
      type: string
    guild_id:
      type: string
    anchor_post_id:
      type: string
    host_user_id:
      type: string
    title:
      type: string
    description:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - scheduled
        - live
        - ended
        - canceled
    access_mode:
      type: string
      enum:
        - free
        - gated
        - paid
    room_kind:
      type: string
      enum:
        - solo
        - duet
    visibility:
      type: string
      enum:
        - public
        - unlisted
    guest_user_id:
      type: string
      nullable: true
    performer_allocations:
      type: array
      items:
        $ref: ./livestreams.yaml#/LiveRoomPerformerAllocationInput
    listing_id:
      type: string
      nullable: true
    replay_listing_id:
      type: string
      nullable: true
    broadcast_ref:
      type: string
      nullable: true
    event_start_at:
      type: string
      format: date-time
      nullable: true
    live_started_at:
      type: string
      format: date-time
      nullable: true
    ended_at:
      type: string
      format: date-time
      nullable: true
    canceled_at:
      type: string
      format: date-time
      nullable: true
    cover_ref:
      type: string
      nullable: true
    participant_capacity:
      type: integer
      nullable: true
    replay_asset_id:
      type: string
      nullable: true
    replay_status:
      type: string
      enum:
        - none
        - processing
        - review_pending
        - published
        - failed
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
HostAttachRequest:
  type: object
  description: |
    Optional host-attach request parameters. The host-attach flow is idempotent for a given host session and may refresh credentials.
  properties:
    client_kind:
      type: string
      enum:
        - web_host_console
        - desktop_native
    refresh:
      type: boolean
      default: false
GuestAttachRequest:
  type: object
  description: |
    Optional guest-attach request parameters. The caller must match the invited collaborator for the room.
  properties:
    client_kind:
      type: string
      enum:
        - desktop_native
        - web_host_console
    refresh:
      type: boolean
      default: false
LiveRoomAttachSession:
  type: object
  required:
    - live_room_id
    - broadcast_ref
    - agora_channel
    - agora_role
    - agora_token
    - bridge_token
    - expires_at
  properties:
    live_room_id:
      type: string
    broadcast_ref:
      type: string
    agora_channel:
      type: string
    agora_role:
      type: string
      enum:
        - host
        - guest
    agora_token:
      type: string
    bridge_token:
      type: string
    route_base:
      type: string
      nullable: true
    expires_at:
      type: string
      format: date-time
LiveRoomAccessView:
  type: object
  required:
    - live_room_id
    - access_mode
    - join_state
  properties:
    live_room_id:
      type: string
    access_mode:
      type: string
      enum:
        - free
        - gated
        - paid
    join_state:
      type: string
      enum:
        - allowed
        - gate_failed
        - payment_required
        - not_live
        - ended
        - canceled
    listing_id:
      type: string
      nullable: true
    replay_listing_id:
      type: string
      nullable: true
    replay_available:
      type: boolean
    reason:
      type: string
      nullable: true
LiveRoomReplayView:
  type: object
  required:
    - live_room_id
    - anchor_post_id
    - replay_status
    - is_playable
    - is_purchasable
    - viewer_entitled
  properties:
    live_room_id:
      type: string
    anchor_post_id:
      type: string
    replay_status:
      type: string
      enum:
        - none
        - processing
        - review_pending
        - published
        - failed
    replay_asset_id:
      type: string
      nullable: true
    replay_listing_id:
      type: string
      nullable: true
    is_playable:
      type: boolean
    is_purchasable:
      type: boolean
    viewer_entitled:
      type: boolean
    preview_ref:
      type: string
      nullable: true
    reason:
      type: string
      nullable: true
LiveRoomReplayAccessView:
  type: object
  required:
    - live_room_id
    - replay_status
    - access_state
  properties:
    live_room_id:
      type: string
    replay_status:
      type: string
      enum:
        - none
        - processing
        - review_pending
        - published
        - failed
    access_state:
      type: string
      enum:
        - not_available
        - processing
        - under_review
        - allowed
        - purchase_required
        - failed
    replay_asset_id:
      type: string
      nullable: true
    replay_listing_id:
      type: string
      nullable: true
    reason:
      type: string
      nullable: true
