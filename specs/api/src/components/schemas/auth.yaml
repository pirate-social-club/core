SessionExchangeResponse:
  type: object
  required:
    - access_token
    - user
    - profile
    - onboarding
    - wallet_attachments
  properties:
    access_token:
      type: string
    user:
      $ref: ./users.yaml#/User
    profile:
      $ref: ./profiles.yaml#/Profile
    onboarding:
      $ref: ./onboarding.yaml#/OnboardingStatus
    wallet_attachments:
      type: array
      description: |
        Wallet attachments available to the authenticated Pirate user at session bootstrap time.
        This lets clients render the active execution wallet without relying on provider SDK
        side channels or an immediate follow-up fetch. This field is always present. In the first
        executable `jwt_based_auth` slice, newly created JWT-path users return `[]` because that
        request variant does not create wallet attachments.
      items:
        $ref: ./auth.yaml#/WalletAttachmentSummary
OAuthDeviceAuthorizeRequest:
  type: object
  required:
    - client_id
  properties:
    client_id:
      type: string
      enum:
        - freedom-desktop
    scope:
      type: string
      description: Space-delimited OAuth scopes requested by Freedom.
      example: live_room:attach live_room:manage song_artifacts:read profile:read
OAuthDeviceAuthorizeResponse:
  type: object
  required:
    - device_code
    - user_code
    - verification_uri
    - verification_uri_complete
    - expires_in
    - interval
  properties:
    device_code:
      type: string
    user_code:
      type: string
      example: PTR-4X7K-9M2Q
    verification_uri:
      type: string
      format: uri
    verification_uri_complete:
      type: string
      format: uri
    expires_in:
      type: integer
      minimum: 1
    interval:
      type: integer
      minimum: 1
OAuthDeviceVerifyRequest:
  type: object
  required:
    - user_code
  properties:
    user_code:
      type: string
OAuthDeviceVerifyResponse:
  type: object
  required:
    - client_id
    - scope
    - status
    - user_code
  properties:
    client_id:
      type: string
    scope:
      type: string
    status:
      type: string
      enum:
        - authorized
    user_code:
      type: string
OAuthDeviceTokenRequest:
  oneOf:
    - type: object
      required:
        - client_id
        - device_code
      properties:
        grant_type:
          type: string
          enum:
            - urn:ietf:params:oauth:grant-type:device_code
        client_id:
          type: string
          enum:
            - freedom-desktop
        device_code:
          type: string
    - type: object
      required:
        - grant_type
        - client_id
        - refresh_token
      properties:
        grant_type:
          type: string
          enum:
            - refresh_token
        client_id:
          type: string
          enum:
            - freedom-desktop
        refresh_token:
          type: string
OAuthDeviceTokenResponse:
  type: object
  required:
    - access_token
    - refresh_token
    - token_type
    - expires_in
    - refresh_expires_in
    - scope
  properties:
    access_token:
      type: string
    refresh_token:
      type: string
    token_type:
      type: string
      enum:
        - Bearer
    expires_in:
      type: integer
      minimum: 1
    refresh_expires_in:
      type: integer
      minimum: 1
    scope:
      type: string
OAuthDeviceAuthorizationPendingResponse:
  type: object
  required:
    - error
    - error_description
    - interval
  properties:
    error:
      type: string
      enum:
        - authorization_pending
    error_description:
      type: string
    interval:
      type: integer
      minimum: 1
WalletAttachmentSummary:
  type: object
  required:
    - wallet_attachment
    - chain_namespace
    - wallet_address
    - is_primary
  properties:
    wallet_attachment:
      type: string
    chain_namespace:
      type: string
    wallet_address:
      type: string
    is_primary:
      type: boolean
