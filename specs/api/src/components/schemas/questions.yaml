Question:
  type: object
  required:
    - id
    - object
    - post
    - community
    - author_user
    - question_kind
    - prompt
    - status
    - published_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - question
    post:
      type: string
    community:
      type: string
    author_user:
      type: string
    question_kind:
      type: string
      enum:
        - meaning
        - slang_context
        - song_id
        - artist_fact
        - translation
    prompt:
      type: string
    choices:
      type: array
      items:
        type: string
      nullable: true
    correct_answer_ref:
      type: integer
      minimum: 0
      nullable: true
    explanation:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - lyrics
        - annotation
        - artist_catalog
        - club_lore
    source_ref:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - published
        - closed
        - revealed
    published_at:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
      nullable: true
CreateQuestionRequest:
  type: object
  required:
    - question_kind
    - prompt
    - choices
    - correct_answer_ref
  properties:
    question_kind:
      type: string
      enum:
        - meaning
        - slang_context
        - song_id
        - artist_fact
        - translation
    prompt:
      type: string
    choices:
      type: array
      minItems: 2
      items:
        type: string
    correct_answer_ref:
      type: integer
      minimum: 0
    explanation:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - lyrics
        - annotation
        - artist_catalog
        - club_lore
    source_ref:
      type: string
      nullable: true
    expires_at:
      type: integer
      format: int64
      nullable: true
QuestionAnswer:
  type: object
  required:
    - id
    - object
    - question
    - user
    - selected_answer_ref
    - is_correct
    - submitted_at
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - question_answer
    question:
      type: string
    user:
      type: string
    selected_answer_ref:
      type: integer
      minimum: 0
    is_correct:
      type: boolean
      nullable: true
    rewarded_at:
      type: integer
      format: int64
      nullable: true
    submitted_at:
      type: integer
      format: int64
