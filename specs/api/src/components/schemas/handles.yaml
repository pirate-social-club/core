NamespaceAttachmentInput:
  type: object
  required:
    - namespace_verification
  properties:
    namespace_verification:
      type: string
      description: |
        Opaque server-issued identifier for the previously accepted namespace verification session. The server resolves this to the underlying root-control evidence and assertions at create time. Creation must be rejected if the referenced verification is stale, disputed, or does not satisfy `club_attach_allowed` for the relevant protocol family. This field is required for public v0 create. Label and route fields below are derived from the verification session and are used for display and routing, not as proof of root control.
    display_label:
      type: string
      description: |
        Optional derived display label for the verified namespace root. Clients may omit this on create and let the server derive it from `namespace_verification`. If submitted, it must match the verified namespace session.
    normalized_label:
      type: string
      description: |
        Optional derived normalized root label. Clients may omit this on create and let the server derive it from `namespace_verification`. If submitted, it must match the verified namespace session.
    resolver_label:
      type: string
      nullable: true
      description: |
        Optional derived resolver-facing label for routing or downstream namespace operations. Clients may omit this on create and let the server derive it from `namespace_verification`.
    route_family:
      type: string
      nullable: true
      description: |
        Optional derived route family such as bare-label or `@`-style routing. Clients may omit this on create and let the server derive it from `namespace_verification_id`. If submitted, it must match the verified namespace session.
HandlePolicyInput:
  type: object
  required:
    - policy_template
  properties:
    policy_template:
      type: string
      enum:
        - standard
        - premium
        - membership_gated
        - custom
      description: |
        Namespace handle-policy template. This describes how community-local handles should behave once claims are enabled. Public v0 new communities should normally start with `standard`, while claim and sale availability remain disabled until server-derived capability flags enable them.
    pricing_model:
      type: string
      enum:
        - free
        - flat_by_length
        - custom_curve
        - gated_then_flat
      nullable: true
      description: |
        Optional pricing model for commerce-enabled templates. This does not by itself enable public claims or sales; launch availability is controlled separately by server-derived capability flags.
HandleAvailability:
  type: object
  required:
    - label
    - available
    - eligible
  properties:
    label:
      type: string
    available:
      type: boolean
    eligible:
      type: boolean
    estimated_price_cents:
      type: integer
      minimum: 0
      nullable: true
    reason:
      type: string
      nullable: true
      description: |
        Optional explanatory text when `eligible = false` or when availability is otherwise constrained. This may describe a claims-disabled launch posture, missing namespace delegation, governance preconditions, or policy-specific eligibility failures.
CommunityHandle:
  type: object
  required:
    - id
    - object
    - community
    - user
    - namespace
    - label
    - label_normalized
    - status
    - issuance_source
    - quote
    - price_cents
    - currency
    - pricing_model
    - pricing_tier
    - settlement_wallet_attachment
    - protocol_owner_wallet_attachment
    - funding_tx_ref
    - settlement_tx_ref
    - lease_started_at
    - lease_expires_at
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - community_handle
    community:
      type: string
    user:
      type: string
    namespace:
      type: string
    label:
      type: string
    label_normalized:
      type: string
    status:
      type: string
      enum:
        - active
        - grace_period
        - expired
        - revoked
        - reserved
    issuance_source:
      type: string
      enum:
        - claim
        - auction
        - admin_grant
    quote:
      type: string
      nullable: true
    price_cents:
      type: integer
      minimum: 0
    currency:
      type: string
      enum:
        - USD
    pricing_model:
      type: string
      enum:
        - free
        - flat_by_length
        - custom_curve
        - gated_then_flat
      nullable: true
    pricing_tier:
      type: string
      nullable: true
    settlement_wallet_attachment:
      type: string
      nullable: true
    protocol_owner_wallet_attachment:
      type: string
      nullable: true
    funding_tx_ref:
      type: string
      nullable: true
    settlement_tx_ref:
      type: string
      nullable: true
    lease_started_at:
      type: integer
      format: int64
      nullable: true
    lease_expires_at:
      type: integer
      format: int64
      nullable: true
    protocol_issuance:
      $ref: ./handles.yaml#/CommunityHandleProtocolIssuance
      nullable: true
    created:
      type: integer
      format: int64
CommunityHandleProtocolIssuance:
  type: object
  required:
