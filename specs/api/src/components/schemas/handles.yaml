      type: integer
      format: int64
      nullable: true
CommunityHandlePolicySettings:
  type: object
  properties:
    flat_price_cents:
      type: integer
      minimum: 0
    premium_price_cents:
      type: integer
      minimum: 0
    premium_max_length:
      type: integer
      minimum: 1
    min_length:
      type: integer
      minimum: 1
    max_length:
      type: integer
      minimum: 1
    quote_ttl_seconds:
      type: integer
      minimum: 60
    reserved_labels:
      type: array
      items:
        type: string
    special_price_cents_by_label:
      type: object
