User:
  type: object
  description: |
    Public user read model. Sensitive verified-identity fields that may exist in canonical storage,
    such as `date_of_birth`, `age_at_verification`, provider nullifiers, and
    `verification_session_id`, are intentionally omitted from this schema in v0.
  required:
    - user_id
    - verification_state
    - verification_capabilities
    - created_at
    - updated_at
  properties:
    user_id:
      type: string
    community_posting_state:
      type: object
      nullable: true
      properties:
        community_ref:
          type: string
        community_id:
          type: string
        has_created_text_post:
          type: boolean
    primary_wallet_attachment_id:
      type: string
      nullable: true
    verification_state:
      type: string
      enum:
        - unverified
        - pending
        - verified
        - reverification_required
    capability_provider:
      type: string
      enum:
        - self
        - very
      nullable: true
      description: |
        Convenience summary for the provider that produced the most recent accepted core capability set. Per-capability `provider` fields inside `verification_capabilities` remain authoritative.
    verification_capabilities:
      $ref: ./verification.yaml#/VerificationCapabilities
    verified_at:
      type: string
      format: date-time
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
