PublicNameQuoteRequest:
  type: object
  additionalProperties: false
  required:
    - desired_label
    - buyer_wallet_address
  properties:
    desired_label:
      type: string
      description: Requested .pirate label, with or without the .pirate suffix.
      example: captain
    buyer_wallet_address:
      type: string
      description: EVM wallet address that will fund and own the public registration.
      example: "0x2000000000000000000000000000000000000002"
PublicNamePaymentInstructions:
  type: object
  additionalProperties: false
  required:
    - chain
    - token_address
    - recipient_address
    - amount_atomic
    - amount_display
  properties:
    chain:
      type: object
      additionalProperties: false
      required:
        - chain_namespace
        - chain_id
        - display_name
      properties:
        chain_namespace:
          type: string
          enum:
            - eip155
        chain_id:
          type: integer
          example: 84532
        display_name:
          type: string
          example: Base Sepolia
    token_address:
      type: string
    recipient_address:
      type: string
    amount_atomic:
      type: string
      description: Exact token amount in atomic units.
    amount_display:
      type: string
      description: Human-readable USD amount.
PublicNameQuote:
  type: object
  additionalProperties: false
  required:
    - quote
    - desired_label
    - label_normalized
    - buyer
    - price_cents
    - currency
    - eligible
    - reason
    - policy_version
    - quote_ttl_seconds
    - quoted_at
    - expires_at
    - payment_instructions
  properties:
    quote:
      type: string
      example: pnq_01JZ0000000000000000000000
    desired_label:
      type: string
      example: captain.pirate
    label_normalized:
      type: string
      example: captain
    buyer:
      type: object
      additionalProperties: false
      required:
        - kind
        - wallet_address
        - chain_ref
      properties:
        kind:
          type: string
          enum:
            - wallet
        wallet_address:
          type: string
        chain_ref:
          type: string
          example: eip155:84532
    price_cents:
      type: integer
      minimum: 0
    currency:
      type: string
      enum:
        - USD
    eligible:
      type: boolean
      enum:
        - true
    reason:
      type: string
      nullable: true
    policy_version:
      type: string
      example: global_handle_paid_v1
    pricing_tier:
      type: string
      nullable: true
    quote_ttl_seconds:
      type: integer
      minimum: 1
      example: 900
    quoted_at:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
    payment_instructions:
      $ref: "#/PublicNamePaymentInstructions"
PublicNameClaimRequest:
  type: object
  additionalProperties: false
  required:
    - quote
    - funding_tx_ref
  properties:
    quote:
      type: string
      example: pnq_01JZ0000000000000000000000
    funding_tx_ref:
      type: string
      description: Confirmed source-chain transaction hash that funded the quoted checkout transfer.
PublicNameRegistration:
  type: object
  additionalProperties: false
  required:
    - id
    - label
    - label_normalized
    - status
    - owner_kind
    - owner_wallet_address
    - chain_ref
    - price_paid_cents
    - currency
    - issued_at
    - expires_at
    - pirate_user_id
  properties:
    id:
      type: string
      example: pnr_01JZ0000000000000000000000
    label:
      type: string
      example: captain.pirate
    label_normalized:
      type: string
      example: captain
    status:
      type: string
      enum:
        - active
        - expired
        - revoked
    owner_kind:
      type: string
      enum:
        - wallet
    owner_wallet_address:
      type: string
    chain_ref:
      type: string
      example: eip155:84532
    price_paid_cents:
      type: integer
      minimum: 0
    currency:
      type: string
      enum:
        - USD
    issued_at:
      type: integer
      format: int64
    expires_at:
      type: integer
      format: int64
      nullable: true
    pirate_user_id:
      type: string
      nullable: true
PublicNameRegistrationResponse:
  type: object
  additionalProperties: false
  required:
    - registration
    - quote
    - funding_tx_ref
    - settlement_tx_ref
  properties:
    registration:
      $ref: "#/PublicNameRegistration"
    quote:
      type: string
    funding_tx_ref:
      type: string
      nullable: true
    settlement_tx_ref:
      type: string
      nullable: true
PublicNameStatus:
  oneOf:
    - type: object
      additionalProperties: false
      required:
        - label
        - label_normalized
        - status
      properties:
        label:
          type: string
        label_normalized:
          type: string
        status:
          type: string
          enum:
            - available
    - type: object
      additionalProperties: false
      required:
        - label
        - label_normalized
        - status
        - registration
      properties:
        label:
          type: string
        label_normalized:
          type: string
        status:
          type: string
          enum:
            - registered
        registration:
          $ref: "#/PublicNameRegistration"
    - type: object
      additionalProperties: false
      required:
        - label
        - label_normalized
        - status
        - owner_kind
      properties:
        label:
          type: string
        label_normalized:
          type: string
        status:
          type: string
          enum:
            - taken
        owner_kind:
          type: string
          enum:
            - user
