CreateGuildRequestBase:
  type: object
  required:
    - display_name
    - membership_mode
    - allow_anonymous_identity
    - namespace
    - handle_policy
  properties:
    display_name:
      type: string
    description:
      type: string
      nullable: true
    artist_identity_id:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - guild_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      default: none
      description: |
        Guild-wide default viewer age gate. Setting this to `18_plus` requires the acting creator or updating owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
    namespace:
      $ref: ./handles.yaml#/NamespaceAttachmentInput
    handle_policy:
      $ref: ./handles.yaml#/HandlePolicyInput
    donation_policy:
      allOf:
        - $ref: ./guilds-community.yaml#/CreateGuildDonationPolicyInput
      type: object
      nullable: true
    community_bootstrap:
      $ref: ./guilds-community.yaml#/CreateGuildCommunityBootstrapInput
      nullable: true
    gate_rules:
      type: array
      items:
        $ref: ./guilds-core.yaml#/GateRuleInput
      nullable: true
GateRuleInput:
  type: object
  required:
    - scope
    - gate_family
    - gate_type
  properties:
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - erc721_holding
        - erc1155_holding
        - erc20_balance
        - solana_nft_holding
        - unique_human
        - age_over_18
        - nationality
        - wallet_score
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./guilds-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
GateRule:
  type: object
  required:
    - gate_rule_id
    - guild_id
    - scope
    - gate_family
    - gate_type
    - status
    - created_at
    - updated_at
  properties:
    gate_rule_id:
      type: string
    guild_id:
      type: string
    scope:
      type: string
      enum:
        - membership
        - viewer
        - posting
    gate_family:
      type: string
      enum:
        - token_holding
        - identity_proof
    gate_type:
      type: string
      enum:
        - erc721_holding
        - erc1155_holding
        - erc20_balance
        - solana_nft_holding
        - unique_human
        - age_over_18
        - nationality
        - wallet_score
    proof_requirements:
      type: array
      nullable: true
      items:
        $ref: ./guilds-core.yaml#/ProofRequirement
    chain_namespace:
      type: string
      nullable: true
    gate_config:
      type: object
      nullable: true
      additionalProperties: true
    status:
      type: string
      enum:
        - active
        - disabled
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
ProofRequirement:
  type: object
  required:
    - proof_type
  properties:
    proof_type:
      type: string
      enum:
        - unique_human
        - biometric_liveness
        - wallet_score
        - gov_id
        - age_over_18
        - nationality
        - sanctions_clear
        - phone
    accepted_providers:
      type: array
      nullable: true
      items:
        type: string
        enum:
          - self
          - very
          - passport
    accepted_mechanisms:
      type: array
      nullable: true
      items:
        type: string
    config:
      type: object
      nullable: true
      additionalProperties: true
RootPostQuotaRule:
  type: object
  required:
    - window_hours
    - max_root_posts
    - max_song_posts
    - max_video_posts
  properties:
    window_hours:
      type: integer
    max_root_posts:
      type: integer
    max_song_posts:
      type: integer
    max_video_posts:
      type: integer
RootPostQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./guilds-core.yaml#/RootPostQuotaRule
    established:
      $ref: ./guilds-core.yaml#/RootPostQuotaRule
    trusted:
      $ref: ./guilds-core.yaml#/RootPostQuotaRule
    high_trust:
      $ref: ./guilds-core.yaml#/RootPostQuotaRule
ReplyQuotaRule:
  type: object
  required:
    - window_hours
    - max_replies
    - burst_window_minutes
    - max_replies_per_burst
  properties:
    window_hours:
      type: integer
    max_replies:
      type: integer
    burst_window_minutes:
      type: integer
    max_replies_per_burst:
      type: integer
ReplyQuotaByTrustTier:
  type: object
  properties:
    new:
      $ref: ./guilds-core.yaml#/ReplyQuotaRule
    established:
      $ref: ./guilds-core.yaml#/ReplyQuotaRule
    trusted:
      $ref: ./guilds-core.yaml#/ReplyQuotaRule
    high_trust:
      $ref: ./guilds-core.yaml#/ReplyQuotaRule
CreateGuildRequest:
  oneOf:
    - $ref: ./guilds-governance.yaml#/CreateCentralizedGuildRequest
    - $ref: ./guilds-governance.yaml#/CreateMultisigGuildRequest
    - $ref: ./guilds-governance.yaml#/CreateMajeurGuildRequest
  discriminator:
    propertyName: governance_mode
    mapping:
      centralized: "#/components/schemas/CreateCentralizedGuildRequest"
      multisig: "#/components/schemas/CreateMultisigGuildRequest"
      majeur: "#/components/schemas/CreateMajeurGuildRequest"
UpdateGuildRequest:
  type: object
  properties:
    display_name:
      type: string
    description:
      type: string
      nullable: true
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - guild_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
    root_post_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/RootPostQuotaByTrustTier
    reply_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/ReplyQuotaByTrustTier
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      description: |
        Guild-wide default viewer age gate. Updating this field from `none` to `18_plus` requires the acting owner/admin to satisfy an accepted `age_over_18` proof requirement, such as `self` age verification.
Guild:
  type: object
  required:
    - guild_id
    - display_name
    - status
    - membership_mode
    - allow_anonymous_identity
    - governance_mode
    - donation_policy_mode
    - donation_partner_status
    - created_by_user_id
    - created_at
    - updated_at
  properties:
    guild_id:
      type: string
    display_name:
      type: string
    description:
      type: string
      nullable: true
    status:
      type: string
      enum:
        - draft
        - active
        - frozen
        - archived
        - deleted
    artist_identity_id:
      type: string
      nullable: true
    guild_agent_user_id:
      type: string
      nullable: true
      description: |
        App-level system actor for platform-managed guild content such as daily questions. In v0, this actor is exempt from ordinary member trust-tier minima and posting quotas when publishing system-tagged content.
    membership_mode:
      type: string
      enum:
        - open
        - request
        - gated
    allow_anonymous_identity:
      type: boolean
    anonymous_identity_scope:
      type: string
      enum:
        - guild_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    allowed_disclosed_qualifiers:
      type: array
      items:
        type: string
      nullable: true
    allow_qualifiers_on_anonymous_posts:
      type: boolean
      nullable: true
    root_post_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    reply_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    anonymous_posting_min_trust_tier:
      type: string
      enum:
        - new
        - established
        - trusted
        - high_trust
      nullable: true
    root_post_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/RootPostQuotaByTrustTier
      nullable: true
    reply_quota_by_trust_tier:
      $ref: ./guilds-core.yaml#/ReplyQuotaByTrustTier
      nullable: true
    probation_window_days:
      type: integer
      nullable: true
    link_post_policy:
      type: string
      enum:
        - allow
        - require_established
      nullable: true
    default_age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
      description: |
        Guild-wide default viewer age gate.
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
    donation_partner_id:
      type: string
      nullable: true
    donation_partner:
      $ref: ./guilds-community.yaml#/DonationPartnerSummary
      nullable: true
    flair_policy:
      $ref: ./guilds-community.yaml#/GuildFlairPolicy
      nullable: true
    community_profile:
      $ref: ./guilds-community.yaml#/GuildCommunityProfile
      nullable: true
    governance_mode:
      type: string
      enum:
        - centralized
        - multisig
        - majeur
    governance_backend:
      $ref: ./guilds-governance.yaml#/GuildGovernanceBackend
      nullable: true
    gate_rules:
      type: array
      items:
        $ref: ./guilds-core.yaml#/GateRule
      nullable: true
    created_by_user_id:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
MembershipResult:
  type: object
  required:
    - guild_id
    - status
  properties:
    guild_id:
      type: string
    status:
      type: string
      enum:
        - joined
        - requested
        - left
