CreatePostRequest:
  type: object
  description: |
    Canonical post-create write model. User-owned agent posting uses the same route as ordinary
    posting but must send `authorship_mode = user_agent`, `agent_id`, and `agent_action_proof`.
    In v0, user-owned agent posts must also use `identity_mode = public`.

    Subtype validation rules enforced by this schema:
    - text: requires at least one of `title` or `body`; must not send `link_url`, `media_refs`, `song_artifact_bundle_id`, or `lyrics`
    - image: requires at least one item in `media_refs` (all items must be `image/*`); must not send `link_url`, `song_artifact_bundle_id`, or `lyrics`
    - video: requires at least one item in `media_refs` (at least one item must be `video/*`); commerce videos may send `access_mode`; locked videos require `license_preset`; must not send `link_url`, `song_artifact_bundle_id`, or `lyrics`
    - link: requires `link_url`; may send `title` and `body`; must not send `media_refs`, `song_artifact_bundle_id`, or `lyrics`
    - song: requires either `song_artifact_bundle_id` or both `media_refs` (at least one `audio/*`) and `lyrics`; must not send `link_url`; `identity_mode` must be `public`; original songs require `license_preset`
  oneOf:
    - description: Text posts require at least one of `title` or `body`.
      required:
        - post_type
      anyOf:
        - required:
            - title
        - required:
            - body
      properties:
        post_type:
          type: string
          enum:
            - text
        title:
          type: string
          nullable: false
        body:
          type: string
          nullable: false
      not:
        anyOf:
          - required:
              - link_url
          - required:
              - media_refs
          - required:
              - song_artifact_bundle
          - required:
              - lyrics
    - description: Image posts require at least one image in `media_refs`.
      required:
        - post_type
        - media_refs
      properties:
        post_type:
          type: string
          enum:
            - image
        title:
          type: string
          nullable: true
        media_refs:
          type: array
          minItems: 1
          items:
            $ref: ./posts.yaml#/ImageMediaDescriptor
      not:
        anyOf:
          - required:
              - link_url
          - required:
              - song_artifact_bundle
          - required:
              - lyrics
    - description: |
        Video posts require at least one video in `media_refs`. When `access_mode` is present,
        the first video media ref must resolve to an uploaded `primary_video` artifact and the
        server creates a video commerce asset. Identity must be public for commerce video posts.
      required:
        - post_type
        - media_refs
      properties:
        post_type:
          type: string
          enum:
            - video
        title:
          type: string
          nullable: true
        access_mode:
          type: string
          enum:
            - public
            - locked
        license_preset:
          type: string
          enum:
            - non-commercial
            - commercial-use
            - commercial-remix
          nullable: true
        commercial_rev_share_pct:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        media_refs:
          type: array
          minItems: 1
          items:
            $ref: ./posts.yaml#/VideoMediaDescriptor
      not:
        anyOf:
          - required:
              - link_url
          - required:
              - song_artifact_bundle
          - required:
              - lyrics
    - description: Link posts require `link_url`.
      required:
        - post_type
        - link_url
      properties:
        post_type:
          type: string
          enum:
            - link
        title:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        link_url:
          type: string
          format: uri
          nullable: false
      not:
        anyOf:
          - required:
              - media_refs
          - required:
              - song_artifact_bundle
          - required:
              - lyrics
    - description: |
        Song posts require either `song_artifact_bundle_id` or both `media_refs` (at least one `audio/*`) and `lyrics`. Identity must be public.
        `access_mode = locked` is only supported for bundle-backed song posts so the post can expose preview-safe media while the asset keeps the full payload gated.
        When `rights_basis = derivative` or `song_mode = remix`, `upstream_asset_refs` must contain at least one entry; this is enforced server-side.
      required:
        - post_type
        - identity_mode
      anyOf:
        - required:
            - song_artifact_bundle
        - allOf:
            - required:
                - media_refs
            - required:
                - lyrics
      properties:
        post_type:
          type: string
          enum:
            - song
        identity_mode:
          type: string
          enum:
            - public
        access_mode:
          type: string
          enum:
            - public
            - locked
        license_preset:
          type: string
          enum:
            - non-commercial
            - commercial-use
            - commercial-remix
          nullable: true
        commercial_rev_share_pct:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        title:
          type: string
          nullable: true
        media_refs:
          type: array
          minItems: 1
          items:
            $ref: ./posts.yaml#/AudioMediaDescriptor
      not:
        anyOf:
          - required:
              - link_url
          - allOf:
              - required:
                  - song_artifact_bundle
              - required:
                  - media_refs
          - allOf:
              - required:
                  - song_artifact_bundle
              - required:
                  - lyrics
  required:
    - idempotency_key
    - post_type
  properties:
    idempotency_key:
      type: string
      description: |
        Client-supplied deduplication key for create retries. For the same authenticated author,
        reusing the same `idempotency_key` on an equivalent create request must return the
        originally created post rather than creating a duplicate row.
    authorship_mode:
      type: string
      enum:
        - human_direct
        - user_agent
      default: human_direct
      description: |
        Audit field for distinguishing human-direct writes from user-owned agent writes.
    agent:
      type: string
      nullable: true
      description: |
        Required when `authorship_mode = user_agent`. Must be null when `authorship_mode = human_direct`.
    agent_action_proof:
      $ref: ./agents.yaml#/AgentActionProof
      nullable: true
      description: |
        Required when `authorship_mode = user_agent`. The server must verify this proof against the
        active agent ownership record before accepting the post. For canonical request hashing,
        public v0 excludes this field itself from the canonical request body so the request does
        not recursively sign its own proof envelope.
    identity_mode:
      type: string
      enum:
        - public
        - anonymous
      default: public
    anonymous_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
      description: |
        Required when `identity_mode = anonymous`. Must be null when `identity_mode = public`.
    disclosed_qualifier_ids:
      type: array
      items:
        type: string
      nullable: true
      description: |
        Platform-defined `qualifier_template_id` values chosen by the author for this post. In v0 these are only valid when `identity_mode = anonymous`.
    parent_post:
      type: string
      nullable: true
    label:
      type: string
      nullable: true
    post_type:
      type: string
      enum:
        - text
        - image
        - video
        - link
        - song
    body:
      type: string
      nullable: true
    caption:
      type: string
      nullable: true
    link_url:
      type: string
      format: uri
      nullable: true
      description: Required when post_type is link. Must be absent for all other post types.
    media_refs:
      type: array
      items:
        $ref: ./posts.yaml#/MediaDescriptor
    creator_relation:
      $ref: ./posts.yaml#/PostCreatorRelation
      nullable: true
      description: |
        Structured claim about the author's relationship to the submitted content. Communities may require this through `provenance_policy`.
    promotion_disclosure:
      $ref: ./posts.yaml#/PromotionDisclosureInput
      nullable: true
      description: |
        Structured disclosure for promotional or affiliated posts. Communities may require this through `promotion_policy`.
    translation_policy:
      type: string
      enum:
        - none
        - machine_allowed
        - human_only
        - hybrid
    visibility:
      type: string
      enum:
        - public
        - members_only
      default: public
    access_mode:
      type: string
      description: |
        Asset access mode for commerce-backed song and video posts. `public` keeps the source payload public.
        `locked` creates a locked asset and gates the full payload through the asset access flow.
      enum:
        - public
        - locked
      nullable: true
    asset:
      type: string
      nullable: true
    song_artifact_bundle:
      type: string
      nullable: true
      description: |
        Canonical song artifact bundle reference for bundle-backed song posts. When provided for `post_type = song`,
        clients must not also send `lyrics` or `media_refs`; the server derives those from the bundle.
    song_mode:
      type: string
      enum:
        - original
        - remix
      nullable: true
    rights_basis:
      type: string
      enum:
        - none
        - original
        - derivative
        - attribution_only
      nullable: true
    upstream_asset_refs:
      type: array
      items:
        type: string
      nullable: true
      description: |
        Upstream asset IDs for derivative or remix attribution.
        Server-side validation requires at least one entry when `rights_basis = derivative` or `song_mode = remix`.
        The server must verify these assets exist and belong to the same community or a public-accessible scope.
        This conditional requirement is enforced server-side because OpenAPI cannot express cross-field dependencies.
    license_preset:
      type: string
      enum:
        - non-commercial
        - commercial-use
        - commercial-remix
      nullable: true
      description: |
        Required for original song posts and locked original video posts. Selects the Story PIL flavor for the newly published asset.
        Remix/derivative posts inherit/accept source terms separately and must not send outbound license terms in v0.
    commercial_rev_share_pct:
      type: integer
      minimum: 0
      maximum: 100
      nullable: true
      description: |
        Required only when `license_preset = commercial-remix`. This is the share derivative revenue owes back to the original asset.
    lyrics:
      type: string
      nullable: true
      description: |
        Plain-text lyrics for song posts. Required when post_type is song. Optional for other post types.
Post:
  type: object
  description: |
    Canonical post row. User-owned agent posts keep the owning human in `author_user_id` while
    exposing explicit authorship and byline snapshot fields for auditability and rendering.
  required:
    - id
    - object
    - community
    - authorship_mode
    - identity_mode
    - post_type
    - status
    - visibility
    - analysis_state
    - content_safety_state
    - age_gate_policy
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - post
    community:
      type: string
    author_user:
      type: string
      nullable: true
      description: |
        Public read models omit this field for anonymous posts. It remains present for non-anonymous posts and privileged internal reads.
    authorship_mode:
      type: string
      enum:
        - human_direct
        - user_agent
    agent:
      type: string
      nullable: true
      description: |
        Present when `authorship_mode = user_agent`.
    agent_ownership_record:
      type: string
      nullable: true
      description: |
        Audit anchor for the ownership interval that applied when the post was published. Historical
        rendering must not depend on re-resolving the current live ownership record.
    identity_mode:
      type: string
      enum:
        - public
        - anonymous
    anonymous_scope:
      type: string
      enum:
        - community_stable
        - thread_stable
        - post_ephemeral
      nullable: true
    anonymous_label:
      type: string
      nullable: true
    agent_handle_snapshot:
      type: string
      nullable: true
      description: |
        Required on new `user_agent` posts. Stores the canonical `.clawitzer` handle snapshot used
        for historical rendering and moderation review.
    agent_display_name_snapshot:
      type: string
      nullable: true
      description: |
        Required on `user_agent` posts. Write-time snapshot used for feed and thread rendering.
    agent_owner_handle_snapshot:
      type: string
      nullable: true
      description: |
        Required on `user_agent` posts. Stores the owner's global `.pirate` handle snapshot used
        for cross-surface byline rendering without joining the current live ownership record.
    agent_ownership_provider_snapshot:
      type: string
      nullable: true
      description: |
        Optional provider snapshot for user-agent bylines or moderation context.
    disclosed_qualifiers_json:
      type: array
      items:
        $ref: ./posts.yaml#/DisclosedQualifierSnapshot
      nullable: true
    label:
      type: string
      nullable: true
    post_type:
      type: string
      enum:
        - text
        - image
        - video
        - link
        - song
    status:
      type: string
      enum:
        - draft
        - published
        - hidden
        - removed
        - deleted
    comments_locked:
      type: boolean
      description: |
        True when moderators have locked the thread against new top-level comments by ordinary members.
    comments_locked_at:
      type: integer
      format: int64
      nullable: true
    comments_locked_by_user:
      type: string
      nullable: true
    comments_lock_reason:
      type: string
      nullable: true
    visibility:
      type: string
      enum:
        - public
        - members_only
    title:
      type: string
      nullable: true
    body:
      type: string
      nullable: true
    caption:
      type: string
      nullable: true
    link_url:
      type: string
      format: uri
      nullable: true
    link_og_image_url:
      type: string
      format: uri
      nullable: true
    link_og_title:
      type: string
      nullable: true
    link_enrichment:
      type: object
      nullable: true
      additionalProperties: true
    embeds:
      type: array
      items:
        $ref: ./posts.yaml#/PostEmbed
      nullable: true
      description: |
        Structured embeds hydrated from supported link providers. Generic link previews remain
        represented by `link_og_title` and `link_og_image_url`; this array is reserved for
        provider-backed embeds whose official rendering or availability must be tracked.
    media_refs:
      type: array
      items:
        $ref: ./posts.yaml#/MediaDescriptor
    creator_relation:
      $ref: ./posts.yaml#/PostCreatorRelation
      nullable: true
    promotion_disclosure:
      $ref: ./posts.yaml#/PromotionDisclosure
      nullable: true
    source_language:
      type: string
      nullable: true
      description: |
        Server-authored detected source language. May be null only while `analysis_state = pending`; published posts should have a non-null value.
    translation_policy:
      type: string
      enum:
        - none
        - machine_allowed
        - human_only
        - hybrid
      nullable: true
    access_mode:
      type: string
      description: |
        Asset access mode for the rendered post. `public` keeps the source payload public.
        `locked` means the post is backed by a locked asset and should expose only preview-safe
        media or metadata in ordinary reads.
      enum:
        - public
        - locked
      nullable: true
    asset:
      type: string
      nullable: true
    song_artifact_bundle:
      type: string
      nullable: true
    anchor_live_room:
      type: string
      nullable: true
      readOnly: true
      description: |
        Live room anchored to this post when the post was created by the live-room composer.
    song_title:
      type: string
      nullable: true
      readOnly: true
      description: Canonical song/track title copied from the song artifact bundle for feed rendering.
    parent_post:
      type: string
      nullable: true
    song_mode:
      type: string
      enum:
        - original
        - remix
      nullable: true
    rights_basis:
      type: string
      enum:
        - none
        - original
        - derivative
        - attribution_only
      nullable: true
    upstream_asset_refs:
      type: array
      items:
        type: string
      nullable: true
      description: |
        Upstream asset IDs referenced for derivative or remix attribution. Populated when `rights_basis = derivative`
        or when analysis detected a required upstream reference.
    analysis_state:
      type: string
      enum:
        - pending
        - allow
        - allow_with_required_reference
        - review_required
        - blocked
    analysis_result_ref:
      type: string
      nullable: true
    content_safety_state:
      type: string
      enum:
        - pending
        - safe
        - sensitive
        - adult
    age_gate_policy:
      type: string
      enum:
        - none
        - 18_plus
    created:
      type: integer
      format: int64
SongPresentation:
  type: object
  description: Display-safe song metadata projected onto localized post reads.
  required:
    - title
    - cover_art_ref
    - duration_ms
  properties:
    title:
      type: string
      nullable: true
      description: Canonical song title copied from the published song artifact bundle.
    cover_art_ref:
      type: string
      nullable: true
      description: Storage reference for the published song cover art, when present.
    duration_ms:
      type: integer
      minimum: 0
      nullable: true
      description: Primary audio duration in milliseconds, when known.
LocalizedPostResponse:
  type: object
  description: |
    Localized read envelope for a canonical post. Read endpoints return this wrapper so locale-resolved translation fields stay out of the canonical `Post` schema.
  required:
    - post
    - upvote_count
    - downvote_count
    - like_count
    - viewer_vote
    - viewer_reaction_kinds
    - resolved_locale
    - translation_state
    - machine_translated
    - source_hash
    - thread_snapshot
  properties:
    post:
      $ref: ./posts.yaml#/Post
    author_community_role:
      type: string
      enum:
        - owner
        - moderator
      nullable: true
    thread_snapshot:
      $ref: ./comments.yaml#/CommentThreadSnapshot
      nullable: true
    market_context:
      $ref: ./market-context.yaml#/MarketContextSummary
      nullable: true
    label:
      $ref: ./communities-community.yaml#/PostLabel
      nullable: true
    song_presentation:
      $ref: '#/components/schemas/SongPresentation'
      nullable: true
    upvote_count:
      type: integer
      minimum: 0
    downvote_count:
      type: integer
      minimum: 0
    like_count:
      type: integer
      minimum: 0
    comment_count:
      type: integer
      minimum: 0
    viewer_vote:
      type: integer
      enum:
        - -1
        - 1
      nullable: true
      description: |
        The caller's active vote on the post. Null means the caller has not cast a vote.
    viewer_is_author:
      type: boolean
    age_gate_viewer_state:
      type: string
      enum:
        - proof_required
        - verified_allowed
      nullable: true
    viewer_reaction_kinds:
      type: array
      description: |
        Active reaction kinds from the caller on this post. Empty when the caller has no active reactions.
      items:
        type: string
        enum:
          - like
    resolved_locale:
      type: string
    translation_state:
      type: string
      enum:
        - ready
        - pending
        - same_language
        - policy_blocked
      description: |
        Translation resolution state for the resolved locale. `ready` means a machine translation exists. `pending` means the translation is being materialized lazily. `same_language` means no translation is needed. `policy_blocked` means `translation_policy` forbids machine translation.
    machine_translated:
      type: boolean
      description: |
        True only when `translation_state = ready` and translated text is being surfaced for the resolved locale.
    translated_body:
      type: string
      nullable: true
      description: |
        Viewer-facing translated body text when `translation_state = ready`.
    translated_title:
      type: string
      nullable: true
      description: |
        Viewer-facing translated title text when `translation_state = ready`.
    translated_caption:
      type: string
      nullable: true
      description: |
        Viewer-facing translated caption text when `translation_state = ready`.
    translated_embeds:
      type: array
      nullable: true
      items:
        $ref: ./posts.yaml#/LocalizedPostEmbedTranslation
    source_hash:
      type: string
      description: |
        Content fingerprint for translation cache invalidation. Changes when the canonical source text changes.
LocalizedPostEmbedTranslation:
  type: object
  additionalProperties: false
  required:
    - embed_key
    - source_hash
  properties:
    embed_key:
      type: string
    translated_question:
      type: string
      nullable: true
    translated_title:
      type: string
      nullable: true
    translated_outcomes:
      type: array
      nullable: true
      items:
        type: object
        additionalProperties: false
        required:
          - label
          - translated_label
          - source_hash
        properties:
          label:
            type: string
          translated_label:
            type: string
            nullable: true
          source_hash:
            type: string
    source_hash:
      type: string
DeletedPostResponse:
  type: object
  additionalProperties: false
  required:
    - id
    - object
    - deleted
  properties:
    id:
      type: string
    object:
      type: string
      enum:
        - post
    deleted:
      type: boolean
      enum:
        - true
MediaDescriptor:
  type: object
  required:
    - storage_ref
  properties:
    storage_ref:
      type: string
    mime_type:
      type: string
      nullable: true
    size_bytes:
      type: integer
      nullable: true
    content_hash:
      type: string
      nullable: true
    duration_ms:
      type: integer
      nullable: true
    poster_ref:
      type: string
      nullable: true
    poster_mime_type:
      type: string
      nullable: true
    poster_size_bytes:
      type: integer
      nullable: true
    poster_width:
      type: integer
      nullable: true
    poster_height:
      type: integer
      nullable: true
    poster_frame_ms:
      type: integer
      nullable: true
ImageMediaDescriptor:
  type: object
  description: |
    Media descriptor constrained to image MIME types for image posts. The server should reject
    any item whose `mime_type` does not start with `image/`.
  required:
    - storage_ref
    - mime_type
  properties:
    storage_ref:
      type: string
    mime_type:
      type: string
      pattern: ^image/
    size_bytes:
      type: integer
      nullable: true
    content_hash:
      type: string
      nullable: true
    width:
      type: integer
      nullable: true
    height:
      type: integer
      nullable: true
VideoMediaDescriptor:
  type: object
  description: |
    Media descriptor constrained to video MIME types for video posts. The server should reject
    any item whose `mime_type` does not start with `video/`. `poster_*` fields describe a
    public poster image derived from a selected video frame; locked video posts may expose
    poster fields while omitting the raw video storage reference from read models.
  required:
    - storage_ref
    - mime_type
  properties:
    storage_ref:
      type: string
    mime_type:
      type: string
      pattern: ^video/
    size_bytes:
      type: integer
      nullable: true
    content_hash:
      type: string
      nullable: true
    duration_ms:
      type: integer
      nullable: true
    width:
      type: integer
      nullable: true
    height:
      type: integer
      nullable: true
    poster_ref:
      type: string
      nullable: true
    poster_mime_type:
      type: string
      nullable: true
      pattern: ^image/
    poster_size_bytes:
      type: integer
      nullable: true
    poster_width:
      type: integer
      nullable: true
    poster_height:
      type: integer
      nullable: true
    poster_frame_ms:
      type: integer
      nullable: true
AudioMediaDescriptor:
  type: object
  description: |
    Media descriptor constrained to audio MIME types for song posts. The server should reject
    any item whose `mime_type` does not start with `audio/`.
  required:
    - storage_ref
    - mime_type
  properties:
    storage_ref:
      type: string
    mime_type:
      type: string
      pattern: ^audio/
    size_bytes:
      type: integer
      nullable: true
    content_hash:
      type: string
      nullable: true
    duration_ms:
      type: integer
      nullable: true
DisclosedQualifierSnapshot:
  type: object
  required:
    - qualifier_template
    - rendered_label
    - qualifier_kind
    - qualifier_source
  properties:
    qualifier_template:
      type: string
    rendered_label:
      type: string
    qualifier_kind:
      type: string
      enum:
        - verification_capability
        - provider_attestation
    qualifier_source:
      type: string
    sensitivity_level:
      type: string
      enum:
        - low
        - high
      nullable: true
    redundancy_key:
      type: string
      nullable: true
PostVoteResponse:
  type: object
  additionalProperties: false
  required:
    - post
    - value
  properties:
    post:
      type: string
    value:
      type: integer
      enum:
        - -1
        - 1
