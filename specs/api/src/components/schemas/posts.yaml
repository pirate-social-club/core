  type: string
  enum:
    - captured
    - created
    - subject
    - authorized_repost
    - fan_work
    - found
PromotionAffiliationKind:
  type: string
  enum:
    - self
    - brand
    - client
    - partner
    - employer
    - other
PromotionDisclosureInput:
  type: object
  additionalProperties: false
  required:
    - is_promotional
