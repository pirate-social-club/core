        - replay_access
        - license
    entitlement_target_ref:
      type: string
    created_at:
      type: string
      format: date-time
CommunityPurchaseListResponse:
  type: object
  required:
    - items
  additionalProperties: false
  properties:
    items:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPurchase
CommunityPurchaseFundingMode:
  type: string
  enum:
    - direct
    - routed
CommunityPurchaseSettlementMode:
  type: string
  enum:
    - delivery_only_story_settlement
    - royalty_native_story_payment
CommunityPurchaseQuotePreflightRequest:
  type: object
  description: |
    Funding-lane preflight input for a future community purchase quote. This validates the proposed buyer funding lane against the community's effective money policy and returns a quote snapshot for the settlement lane Pirate would require. This does not price a listing, reserve liquidity, or execute settlement. Route estimate fields are client-estimated in this implementation slice and must not be interpreted as server-verified route telemetry.
  required:
    - client_estimated_slippage_bps
    - client_estimated_hop_count
  additionalProperties: false
  properties:
    funding_asset:
      $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
      nullable: true
    source_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
      nullable: true
    route_provider:
      type: string
      nullable: true
    client_estimated_slippage_bps:
      type: integer
      minimum: 0
    client_estimated_hop_count:
      type: integer
      minimum: 0
    client_route_valid_for_seconds:
      type: integer
      minimum: 0
      nullable: true
CommunityPurchaseQuotePreflight:
  type: object
  description: |
    Effective community purchase quote preflight snapshot. A successful response means the requested funding lane satisfies the community's current money policy. The response surfaces the required settlement lane and policy-derived quote expiry, but does not include listing pricing or a reserved route.
  required:
    - community_id
    - eligible
    - funding_mode
    - policy_origin
    - funding_preference
    - destination_settlement_chain
    - destination_settlement_token
    - max_slippage_bps
    - quote_ttl_seconds
    - route_required
    - route_status_policy
    - route_hop_tolerance
    - quoted_at
    - expires_at
  additionalProperties: false
  properties:
    community_id:
      type: string
    eligible:
      type: boolean
    funding_mode:
      $ref: ./communities-community.yaml#/CommunityPurchaseFundingMode
    policy_origin:
      $ref: ./communities-community.yaml#/CommunityPolicyOrigin
    funding_preference:
      type: string
    funding_asset:
      $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
      nullable: true
    source_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
      nullable: true
    route_provider:
      type: string
      nullable: true
    destination_settlement_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    destination_settlement_token:
      type: string
    treasury_denomination:
      type: string
      nullable: true
    max_slippage_bps:
      type: integer
      minimum: 0
    quote_ttl_seconds:
      type: integer
      minimum: 1
    route_required:
      type: boolean
    route_status_policy:
      $ref: ./communities-community.yaml#/CommunityFundingRouteStatusPolicy
    route_hop_tolerance:
      type: integer
      minimum: 0
    quoted_at:
      type: string
      format: date-time
    expires_at:
      type: string
      format: date-time
CommunityPurchaseQuoteRequest:
  type: object
  description: |
    Request a short-lived priced purchase quote for a persisted community listing. The server must load the listing by `listing_id`, verify it belongs to the community and is currently sellable, and derive the quote from the authoritative stored listing price rather than trusting a client-supplied amount. Route estimate fields are client-estimated in this implementation slice and must not be interpreted as server-verified route telemetry.
  required:
    - listing_id
    - client_estimated_slippage_bps
    - client_estimated_hop_count
  additionalProperties: false
  properties:
    listing_id:
      type: string
    funding_asset:
      $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
      nullable: true
    source_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
      nullable: true
    route_provider:
      type: string
      nullable: true
    client_estimated_slippage_bps:
      type: integer
      minimum: 0
    client_estimated_hop_count:
      type: integer
      minimum: 0
    client_route_valid_for_seconds:
      type: integer
      minimum: 0
      nullable: true
CommunityPurchaseQuote:
  type: object
  description: |
    Short-lived purchase quote snapshot for a community commerce object. This response is priced in USD using the persisted authored listing price and the community's current money policy. It is a quote record, not a completed purchase or settlement. In this implementation slice, route-policy compliance is checked server-side, but live bridge/swap liquidity is not yet verified.
  required:
    - quote_id
    - community_id
    - listing_id
    - buyer_user_id
    - base_price_usd
    - final_price_usd
    - settlement_mode
    - allocation_snapshot
    - funding_mode
    - route_policy_compliant
    - policy_origin
    - destination_settlement_chain
    - destination_settlement_token
    - quote_ttl_seconds
    - route_required
    - route_status_policy
    - route_hop_tolerance
    - quoted_at
    - expires_at
  additionalProperties: false
  properties:
    quote_id:
      type: string
    community_id:
      type: string
    listing_id:
      type: string
    buyer_user_id:
      type: string
    asset_id:
