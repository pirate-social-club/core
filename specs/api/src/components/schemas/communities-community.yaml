CommunityAuthenticityDetectionProfileSummary:
  type: object
  description: |
    Public/admin-safe summary of a platform-approved authenticity-detection profile. Communities choose from these platform-managed profiles rather than configuring raw provider parameters directly.
  required:
    - authenticity_detection_profile_id
    - profile_key
    - provider_key
    - supported_capabilities
    - status
  properties:
    authenticity_detection_profile_id:
      type: string
    profile_key:
      type: string
    provider_key:
      type: string
      description: |
        Provider implementation key such as `hive`, `truthscan`, or a future Pirate-managed detector.
    supported_capabilities:
      type: array
      items:
        type: string
        enum:
          - image_authenticity
          - video_authenticity
          - audio_authenticity
          - deepfake_detection
    status:
      $ref: ./communities-community.yaml#/CommunityAuthenticityDetectionProfileStatus
