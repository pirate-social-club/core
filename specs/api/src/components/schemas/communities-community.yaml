CommunityContentAuthenticityPolicy:
  type: object
  description: |
    Resolved community authenticity policy. This setting is separate from freeform rules text and separate from rights or source authorization policy. When no explicit policy has been configured, the server must still return the restrictive default policy with `policy_origin = default`. In that case, `updated_at` may be synthesized from the applicable default-policy revision timestamp or another server-defined default-policy source.
  required:
    - community_id
    - policy_origin
    - authenticity_stance
    - text_policy
    - image_policy
    - video_policy
    - song_policy
    - updated_at
