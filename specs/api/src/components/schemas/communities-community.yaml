  required:
    - purchase_id
    - community_id
    - listing_id
    - buyer_user_id
    - settlement_wallet_attachment_id
    - purchase_price_usd
    - settlement_mode
    - settlement_chain
    - settlement_token
    - settlement_tx_ref
    - allocations
    - purchase_entitlement_id
    - entitlement_kind
    - entitlement_target_ref
    - created_at
  additionalProperties: false
  properties:
    purchase_id:
      type: string
    community_id:
      type: string
    listing_id:
      type: string
    asset_id:
      type: string
      nullable: true
    live_room_id:
      type: string
      nullable: true
    buyer_user_id:
      type: string
    settlement_wallet_attachment_id:
      type: string
    purchase_price_usd:
      type: number
      minimum: 0
    pricing_tier:
      type: string
      nullable: true
    settlement_mode:
      $ref: ./communities-community.yaml#/CommunityPurchaseSettlementMode
    settlement_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    settlement_token:
      type: string
    settlement_tx_ref:
      type: string
    allocations:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunitySaleAllocationLeg
    donation_partner_id:
      type: string
      nullable: true
    donation_share_pct:
      type: number
      nullable: true
    donation_amount_usd:
      type: number
      nullable: true
    purchase_entitlement_id:
      type: string
    entitlement_kind:
      type: string
