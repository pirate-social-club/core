    Confirm successful settlement for an already-issued community purchase quote. The server must reload the stored quote by `community_id` and `quote_id`, verify the quote belongs to the authenticated buyer, ensure it is still active and unexpired, then create the canonical purchase row and entitlement snapshot before marking the quote consumed.
