CreateCommunityContentAuthenticityDetectionPolicyInput:
  type: object
  description: |
    Structured community setting for selecting which platform-approved authenticity-detection profile Pirate should use for community-optional authenticity decisions. Platform-required safety and age-gating analysis remain outside this setting and are never community-configurable.
  required:
    - selection_mode
  additionalProperties: false
  properties:
    selection_mode:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityDetectionSelectionMode
    authenticity_detection_profile_id:
      type: string
      nullable: true
      description: |
        Required when `selection_mode = approved_profile`. Must reference an active platform-approved authenticity-detection profile.
UpdateCommunityContentAuthenticityDetectionPolicyRequest:
  type: object
  description: |
    Replace or update the community's authenticity-detection selection. Changes apply prospectively to future authenticity analysis and moderation decisions; existing posts are not automatically reclassified.
  required:
    - selection_mode
  additionalProperties: false
  properties:
    selection_mode:
      $ref: ./communities-community.yaml#/CommunityContentAuthenticityDetectionSelectionMode
    authenticity_detection_profile_id:
      type: string
      nullable: true
      description: |
        Required when `selection_mode = approved_profile`. Must reference an active platform-approved authenticity-detection profile.
CommunityContentAuthenticityDetectionPolicy:
  type: object
  description: |
    Resolved community authenticity-detection policy. When no explicit selection has been configured, the server must still return the platform-default detection profile with `policy_origin = default`. The platform-default authenticity-detection profile is an operational invariant and must always exist while this feature is enabled. In that case, `updated_at` may be synthesized from the active platform-default profile version timestamp or another server-defined default-policy source.
  required:
    - community_id
    - policy_origin
    - selection_mode
    - resolved_profile
    - updated_at
  properties:
    community_id:
      type: string
    policy_origin:
      $ref: ./communities-community.yaml#/CommunityPolicyOrigin
