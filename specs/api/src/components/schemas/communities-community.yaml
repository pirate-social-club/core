CreateCommunityDonationPolicyInput:
  type: object
  description: |
    Optional community-level donation configuration supplied at creation time. If omitted, the community defaults to no donation policy. If `donation_policy_mode = optional_creator_sidecar` or `fundraiser_default`, `donation_partner_id` must be non-null. If `donation_policy_mode = none`, `donation_partner_id` must be null.
  required:
    - donation_policy_mode
  properties:
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_id:
      type: string
      nullable: true
UpdateCommunityDonationPolicyRequest:
  type: object
  description: |
    Update the community donation policy. If `donation_policy_mode = optional_creator_sidecar` or `fundraiser_default`, `donation_partner_id` must be non-null. If `donation_policy_mode = none`, `donation_partner_id` must be null. Donation partner lifecycle management is platform-admin-controlled in v0.
  required:
    - donation_policy_mode
  properties:
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_id:
      type: string
      nullable: true
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
      nullable: true
DonationPartnerSummary:
  type: object
  description: |
    Public/admin-safe summary of a reviewed donation partner. Full payout routing details remain internal to Pirate settlement systems in v0.
  required:
    - donation_partner_id
    - display_name
    - provider
    - review_status
    - status
  properties:
    donation_partner_id:
      type: string
    display_name:
      type: string
    provider:
      type: string
      enum:
        - endaoment
    provider_partner_ref:
      type: string
      nullable: true
    image_url:
      type: string
      nullable: true
    review_status:
      type: string
      enum:
        - pending
        - approved
        - rejected
    status:
      type: string
      enum:
        - active
        - paused
        - retired
CommunityDonationPolicy:
  type: object
  description: |
    Resolved donation policy attached to a community. This policy enables or disables listing-level creator donation sidecars for content sold inside the community.
  required:
    - community_id
    - donation_policy_mode
    - donation_partner_status
  properties:
    community_id:
      type: string
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
    donation_partner_id:
      type: string
      nullable: true
    donation_partner:
      $ref: ./communities-community.yaml#/DonationPartnerSummary
      nullable: true
    updated_at:
      type: string
      format: date-time
CommunityContentAuthenticityStance:
  type: string
  enum:
    - human_only
    - human_first
    - ai_allowed_with_disclosure
    - ai_allowed
CommunityPolicyOrigin:
  type: string
  enum:
    - default
    - explicit
CommunityFundingRouteStatusPolicy:
  type: string
  enum:
    - fail
    - fallback_display
    - queue
CommunityMoneyAssetRef:
  type: object
  description: |
    Executable funding asset reference for community purchase funding. This may be narrower than the community's user-facing funding preference. For example, `funding_preference = BTC` may still only permit `cBTC` on Citrea as an executable purchase-funding asset.
  required:
    - asset_symbol
  additionalProperties: false
  properties:
    asset_symbol:
      type: string
    chain_namespace:
      type: string
      nullable: true
    chain_id:
      type: integer
      nullable: true
    display_name:
      type: string
      nullable: true
CommunityMoneyChainRef:
  type: object
  description: |
    Source-chain reference for a community funding lane. This is an attached commerce-policy concept, not a mutation of the community's core identity.
  required:
    - chain_namespace
  additionalProperties: false
  properties:
    chain_namespace:
      type: string
    chain_id:
      type: integer
      nullable: true
    display_name:
      type: string
      nullable: true
CreateCommunityMoneyPolicyInput:
  type: object
  description: |
    Optional community funding policy supplied at creation time. When omitted, the server must resolve the platform-default community money policy for the community. This policy defines allowed funding lanes for purchases and must not be interpreted as the community's execution or unlock chain.
  required:
    - funding_preference
    - accepted_funding_assets
    - accepted_source_chains
    - destination_settlement_chain
    - destination_settlement_token
    - max_slippage_bps
    - quote_ttl_seconds
    - route_required
    - route_status_policy
    - route_hop_tolerance
  additionalProperties: false
  properties:
    funding_preference:
      type: string
      description: |
        User-facing funding identity for the community such as `BTC`, `ETH`, `SOL`, or `TEMPO`. This may be broader than the executable funding asset list.
    accepted_funding_assets:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
    accepted_source_chains:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    approved_route_providers:
      type: array
      items:
        type: string
      nullable: true
      description: |
        External route venues Pirate is willing to support for this community. When `route_required = true`, the server should require this list to be non-empty after validation, even if clients omit it on create.
    destination_settlement_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    destination_settlement_token:
      type: string
      description: |
        Destination settlement token required by the purchase execution path, such as `WIP` on Story.
    treasury_denomination:
      type: string
      nullable: true
      description: |
        Treasury denomination preference for reporting and later treasury policy. This does not imply that settlement proceeds are automatically converted into that denomination.
    max_slippage_bps:
      type: integer
      minimum: 0
    quote_ttl_seconds:
      type: integer
      minimum: 1
    route_required:
      type: boolean
    route_status_policy:
      $ref: ./communities-community.yaml#/CommunityFundingRouteStatusPolicy
    route_hop_tolerance:
      type: integer
      minimum: 0
UpdateCommunityMoneyPolicyRequest:
  type: object
  description: |
    Replace or update the community funding policy. Changes apply prospectively to future quotes and purchases. Existing purchases remain pinned to the quote and settlement snapshots used at execution time.
  required:
    - funding_preference
    - accepted_funding_assets
    - accepted_source_chains
    - destination_settlement_chain
    - destination_settlement_token
    - max_slippage_bps
    - quote_ttl_seconds
    - route_required
    - route_status_policy
    - route_hop_tolerance
  additionalProperties: false
  properties:
    funding_preference:
      type: string
    accepted_funding_assets:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
    accepted_source_chains:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    approved_route_providers:
      type: array
      items:
        type: string
      nullable: true
    destination_settlement_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    destination_settlement_token:
      type: string
    treasury_denomination:
      type: string
      nullable: true
    max_slippage_bps:
      type: integer
      minimum: 0
    quote_ttl_seconds:
      type: integer
      minimum: 1
    route_required:
      type: boolean
    route_status_policy:
      $ref: ./communities-community.yaml#/CommunityFundingRouteStatusPolicy
    route_hop_tolerance:
      type: integer
      minimum: 0
CommunityMoneyPolicy:
  type: object
  description: |
    Resolved community funding policy for commerce. This policy controls allowed buyer funding lanes and route constraints. It does not redefine the community object as a chain object, and it does not imply that the funding asset itself performs settlement or locked-asset unlocks. When no explicit money policy has been configured, the server must still return the effective default policy with `policy_origin = default`.
  required:
    - community_id
    - policy_origin
    - funding_preference
    - accepted_funding_assets
    - accepted_source_chains
    - destination_settlement_chain
    - destination_settlement_token
    - max_slippage_bps
    - quote_ttl_seconds
    - route_required
    - route_status_policy
    - route_hop_tolerance
    - updated_at
  properties:
    community_id:
      type: string
    policy_origin:
      $ref: ./communities-community.yaml#/CommunityPolicyOrigin
    funding_preference:
      type: string
    accepted_funding_assets:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyAssetRef
    accepted_source_chains:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    approved_route_providers:
      type: array
      items:
        type: string
      nullable: true
    destination_settlement_chain:
      $ref: ./communities-community.yaml#/CommunityMoneyChainRef
    destination_settlement_token:
      type: string
    treasury_denomination:
      type: string
      nullable: true
    max_slippage_bps:
      type: integer
      minimum: 0
    quote_ttl_seconds:
      type: integer
      minimum: 1
    route_required:
      type: boolean
    route_status_policy:
      $ref: ./communities-community.yaml#/CommunityFundingRouteStatusPolicy
    route_hop_tolerance:
      type: integer
      minimum: 0
    updated_at:
      type: string
      format: date-time
CommunityPricingVerificationProvider:
  type: string
  enum:
    - self
CommunityPricingAdjustmentType:
  type: string
  enum:
    - multiplier
CommunityPricingTier:
  type: object
  required:
    - tier_key
    - adjustment_type
    - adjustment_value
  additionalProperties: false
  properties:
    tier_key:
      type: string
    display_name:
      type: string
      nullable: true
    adjustment_type:
      $ref: ./communities-community.yaml#/CommunityPricingAdjustmentType
    adjustment_value:
      type: number
      minimum: 0
CommunityPricingCountryAssignment:
  type: object
  required:
    - country_code
    - tier_key
  additionalProperties: false
  properties:
    country_code:
      type: string
      minLength: 2
      maxLength: 2
      description: |
        ISO 3166-1 alpha-2 country code used for nationality-backed pricing.
    tier_key:
      type: string
CreateCommunityPricingPolicyInput:
  type: object
  description: |
    Optional community pricing policy supplied at creation time. This policy is distinct from the money policy: it controls buyer-visible USD quote adjustments, not allowed funding lanes or settlement rails. If omitted, the server must resolve the default non-tiered pricing posture with `policy_origin = default`.
  required:
    - regional_pricing_enabled
    - tiers
    - country_assignments
  additionalProperties: false
  properties:
    regional_pricing_enabled:
      type: boolean
    verification_provider_requirement:
      $ref: ./communities-community.yaml#/CommunityPricingVerificationProvider
      nullable: true
    default_tier_key:
      type: string
      nullable: true
    tiers:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingTier
    country_assignments:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingCountryAssignment
    source_template_id:
      type: string
      nullable: true
    source_template_version:
      type: string
      nullable: true
UpdateCommunityPricingPolicyRequest:
  type: object
  description: |
    Replace or update the community pricing policy. Changes apply prospectively to future quote generation only. Existing purchases remain pinned to the pricing tier and pricing-policy version captured in their quote and settlement snapshots.
  required:
    - regional_pricing_enabled
    - tiers
    - country_assignments
  additionalProperties: false
  properties:
    regional_pricing_enabled:
      type: boolean
    verification_provider_requirement:
      $ref: ./communities-community.yaml#/CommunityPricingVerificationProvider
      nullable: true
    default_tier_key:
      type: string
      nullable: true
    tiers:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingTier
    country_assignments:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingCountryAssignment
    source_template_id:
      type: string
      nullable: true
    source_template_version:
      type: string
      nullable: true
CommunityPricingPolicy:
  type: object
  description: |
    Resolved community pricing policy for commerce. This policy controls whether a listing that opts in may adjust the authored USD base price using buyer verification-backed tiering. It is separate from money policy, which controls allowed funding lanes and settlement constraints. When no explicit pricing policy has been configured, the server must still return the default non-tiered policy with `policy_origin = default`.
  required:
    - community_id
    - policy_origin
    - pricing_policy_version
    - regional_pricing_enabled
    - tiers
    - country_assignments
    - updated_at
  additionalProperties: false
  properties:
    community_id:
      type: string
    policy_origin:
      $ref: ./communities-community.yaml#/CommunityPolicyOrigin
    pricing_policy_version:
      type: string
      description: |
        Version identifier that the quote layer must snapshot whenever this policy affects price resolution.
    regional_pricing_enabled:
      type: boolean
    verification_provider_requirement:
      $ref: ./communities-community.yaml#/CommunityPricingVerificationProvider
      nullable: true
    default_tier_key:
      type: string
      nullable: true
    tiers:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingTier
    country_assignments:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityPricingCountryAssignment
    source_template_id:
      type: string
      nullable: true
    source_template_version:
      type: string
      nullable: true
    updated_at:
      type: string
      format: date-time
CommunityListing:
  type: object
  required:
    - listing_id
    - community_id
    - listing_mode
    - status
    - price_usd
    - regional_pricing_enabled
    - created_by_user_id
    - created_at
    - updated_at
  additionalProperties: false
  properties:
    listing_id:
      type: string
    community_id:
      type: string
    asset_id:
      type: string
      nullable: true
    live_room_id:
      type: string
      nullable: true
    listing_mode:
      type: string
      enum:
        - fixed_price
    status:
      type: string
      enum:
        - draft
        - active
        - paused
        - archived
    price_usd:
      type: number
      minimum: 0
    regional_pricing_enabled:
      type: boolean
    donation_partner_id:
      type: string
      nullable: true
    donation_share_pct:
      type: number
      nullable: true
    created_by_user_id:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
CreateCommunityListingRequest:
  type: object
  required:
    - price_usd
    - regional_pricing_enabled
    - status
  additionalProperties: false
  properties:
    asset_id:
      type: string
      nullable: true
    live_room_id:
      type: string
      nullable: true
    price_usd:
      type: number
      minimum: 0
    regional_pricing_enabled:
      type: boolean
    donation_partner_id:
      type: string
      nullable: true
    donation_share_pct:
      type: number
      nullable: true
    status:
      type: string
      enum:
        - draft
        - active
        - paused
        - archived
UpdateCommunityListingRequest:
  type: object
  additionalProperties: false
  properties:
    price_usd:
      type: number
      minimum: 0
    regional_pricing_enabled:
      type: boolean
    donation_partner_id:
      type: string
      nullable: true
    donation_share_pct:
      type: number
      nullable: true
    status:
      type: string
      enum:
        - draft
        - active
        - paused
        - archived
CommunityListingListResponse:
  type: object
  required:
    - items
  additionalProperties: false
  properties:
    items:
      type: array
      items:
        $ref: ./communities-community.yaml#/CommunityListing
CommunitySaleAllocationRecipientType:
  type: string
  enum:
    - creator
    - charity
    - community_treasury
CommunitySaleAllocationSettlementStrategy:
  type: string
  enum:
    - story_payout
    - provider_payout
    - treasury_payout
CommunitySaleAllocationStatus:
  type: string
  enum:
    - quoted
    - pending
    - confirmed
    - failed
CommunitySaleAllocationSnapshot:
  type: object
  description: |
    Immutable quote-time allocation snapshot for a priced sale. Settlement must consume this snapshot directly rather than recomputing money flow from the current listing or community state.
  required:
    - recipient_type
    - waterfall_position
    - share_bps
    - amount_usd
    - settlement_strategy
  additionalProperties: false
  properties:
    recipient_type:
      $ref: ./communities-community.yaml#/CommunitySaleAllocationRecipientType
    recipient_ref:
      type: string
      nullable: true
    waterfall_position:
      type: integer
      minimum: 0
    share_bps:
      type: integer
      minimum: 0
      maximum: 10000
    amount_usd:
      type: number
      minimum: 0
    settlement_strategy:
      $ref: ./communities-community.yaml#/CommunitySaleAllocationSettlementStrategy
CommunitySaleAllocationLeg:
  allOf:
    - $ref: ./communities-community.yaml#/CommunitySaleAllocationSnapshot
    - type: object
      required:
        - status
      additionalProperties: false
      properties:
        status:
          $ref: ./communities-community.yaml#/CommunitySaleAllocationStatus
        settlement_ref:
          type: string
          nullable: true
        failure_reason:
          type: string
          nullable: true
CommunityPurchase:
