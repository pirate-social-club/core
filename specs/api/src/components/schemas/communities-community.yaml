CreateCommunityDonationPolicyInput:
  type: object
  description: |
    Optional community-level donation configuration supplied at creation time. If omitted, the community defaults to no donation policy. If `donation_policy_mode = optional_creator_sidecar` or `fundraiser_default`, `donation_partner_id` must be non-null. If `donation_policy_mode = none`, `donation_partner_id` must be null.
  required:
    - donation_policy_mode
  properties:
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_id:
      type: string
      nullable: true
UpdateCommunityDonationPolicyRequest:
  type: object
  description: |
    Update the community donation policy. If `donation_policy_mode = optional_creator_sidecar` or `fundraiser_default`, `donation_partner_id` must be non-null. If `donation_policy_mode = none`, `donation_partner_id` must be null. Donation partner lifecycle management is platform-admin-controlled in v0.
  required:
    - donation_policy_mode
  properties:
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_id:
      type: string
      nullable: true
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
      nullable: true
DonationPartnerSummary:
  type: object
  description: |
    Public/admin-safe summary of a reviewed donation partner. Full payout routing details remain internal to Pirate settlement systems in v0.
  required:
    - donation_partner_id
    - display_name
    - provider
    - review_status
    - status
  properties:
    donation_partner_id:
      type: string
    display_name:
      type: string
    provider:
      type: string
      enum:
        - endaoment
    provider_partner_ref:
      type: string
      nullable: true
    review_status:
      type: string
      enum:
        - pending
        - approved
        - rejected
    status:
      type: string
      enum:
        - active
        - paused
        - retired
CommunityDonationPolicy:
  type: object
  description: |
    Resolved donation policy attached to a community. This policy enables or disables listing-level creator donation sidecars for content sold inside the community.
  required:
    - community_id
    - donation_policy_mode
    - donation_partner_status
  properties:
    community_id:
      type: string
    donation_policy_mode:
      type: string
      enum:
        - none
        - optional_creator_sidecar
        - fundraiser_default
    donation_partner_status:
      type: string
      enum:
        - unconfigured
        - active
        - paused
    donation_partner_id:
      type: string
      nullable: true
    donation_partner:
      $ref: ./communities-community.yaml#/DonationPartnerSummary
      nullable: true
    updated_at:
      type: string
      format: date-time
