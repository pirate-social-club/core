Error:
  type: object
  required:
    - code
    - message
  properties:
    code:
      type: string
      enum:
        - bad_request
        - auth_error
        - payment_required
        - verification_required
        - eligibility_failed
        - gate_failed
        - posting_trust_tier_too_low
        - posting_quota_exhausted
        - analysis_blocked
        - analysis_review_required
        - label_required
        - invalid_label_selection
        - label_required_but_none_applicable
        - conflict
        - not_found
        - rate_limited
        - payment_failed
        - settlement_pending
        - internal_error
    message:
      type: string
    retryable:
      type: boolean
      default: false
