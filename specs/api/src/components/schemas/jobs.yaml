Job:
  type: object
  required:
    - id
    - object
    - job_type
    - status
    - subject_type
    - subject
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - job
    job_type:
      type: string
      enum:
        - community_provisioning
        - reddit_snapshot_import
        - club_threads_export
        - media_analysis
        - story_publication
        - purchase_settlement_confirmation
        - entitlement_grant
        - artist_metadata_enrichment
        - track_reconciliation
        - catalog_track_preregistration
        - stem_separation
        - forced_alignment
        - karaoke_package_assembly
    status:
      type: string
      enum:
        - queued
        - running
        - succeeded
        - failed
    subject_type:
      type: string
    subject:
      type: string
    result_ref:
      type: string
      description: |
        Opaque result reference. For succeeded machine-export jobs this may be a signed download URL.
      nullable: true
    error_code:
      type: string
      nullable: true
    created:
      type: integer
      format: int64
JobAcceptedResponse:
  type: object
  required:
    - job
  properties:
    job:
      $ref: ./jobs.yaml#/Job
