CreateScrobbleRequest:
  type: object
  required:
    - track_id
    - source_type
    - playback_started_at
  properties:
    track_id:
      type: string
    community_id:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - web
        - desktop
        - mobile
        - operator_ingested
    playback_started_at:
      type: string
      format: date-time
    playback_position_ms:
      type: integer
      nullable: true
    credited_duration_ms:
      type: integer
      nullable: true
    ingestion_mode:
      type: string
      enum:
        - first_party
        - trusted_import
      default: first_party
    idempotency_key:
      type: string
Scrobble:
  type: object
  required:
    - scrobble_id
    - track_id
    - user_id
    - source_type
    - playback_started_at
    - ingestion_mode
    - anchor_status
    - accepted_at
    - created_at
  properties:
    scrobble_id:
      type: string
    track_id:
      type: string
    user_id:
      type: string
    community_id:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - web
        - desktop
        - mobile
        - operator_ingested
    playback_started_at:
      type: string
      format: date-time
    playback_position_ms:
      type: integer
      nullable: true
    credited_duration_ms:
      type: integer
      nullable: true
    ingestion_mode:
      type: string
      enum:
        - first_party
        - trusted_import
    anchor_status:
      type: string
      enum:
        - queued
        - awaiting_wallet
        - awaiting_track
        - anchoring
        - anchored
        - failed
        - suppressed
    accepted_at:
      type: string
      format: date-time
    anchored_at:
      type: string
      format: date-time
      nullable: true
    chain_tx_hash:
      type: string
      nullable: true
    chain_log_index:
      type: integer
      nullable: true
    created_at:
      type: string
      format: date-time
ListenerSummary:
  type: object
  required:
    - user_id
    - scrobble_count
  properties:
    user_id:
      type: string
    display_handle:
      type: string
      nullable: true
    scrobble_count:
      type: integer
