CreateScrobbleRequest:
  type: object
  required:
    - track
    - source_type
    - playback_started_at
  properties:
    track:
      type: string
    community:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - web
        - desktop
        - mobile
        - operator_ingested
    playback_started_at:
      type: integer
      format: int64
    playback_position_ms:
      type: integer
      nullable: true
    credited_duration_ms:
      type: integer
      nullable: true
    ingestion_mode:
      type: string
      enum:
        - first_party
        - trusted_import
      default: first_party
    idempotency_key:
      type: string
Scrobble:
  type: object
  required:
    - id
    - object
    - track
    - user
    - source_type
    - playback_started_at
    - ingestion_mode
    - anchor_status
    - accepted_at
    - created
  properties:
    id:
      type: string
      readOnly: true
    object:
      type: string
      readOnly: true
      enum:
        - scrobble
    track:
      type: string
    user:
      type: string
    community:
      type: string
      nullable: true
    source_type:
      type: string
      enum:
        - web
        - desktop
        - mobile
        - operator_ingested
    playback_started_at:
      type: integer
      format: int64
    playback_position_ms:
      type: integer
      nullable: true
    credited_duration_ms:
      type: integer
      nullable: true
    ingestion_mode:
      type: string
      enum:
        - first_party
        - trusted_import
    anchor_status:
      type: string
      enum:
        - queued
        - awaiting_wallet
        - awaiting_track
        - anchoring
        - anchored
        - failed
        - suppressed
    accepted_at:
      type: integer
      format: int64
    anchored_at:
      type: integer
      format: int64
      nullable: true
    chain_tx_hash:
      type: string
      nullable: true
    chain_log_index:
      type: integer
      nullable: true
    created:
      type: integer
      format: int64
ListenerSummary:
  type: object
  required:
    - user
    - scrobble_count
  properties:
    user:
      type: string
    display_handle:
      type: string
      nullable: true
    scrobble_count:
      type: integer
