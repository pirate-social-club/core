  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    paymentAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Payment credential sent as `Authorization: Payment ...` on retry after an MPP `402 Payment Required` challenge.
