    Contract-first API surface for Pirate v2.
    This modular source carries the broader planned v0 design surface alongside the first executable slice.
    Operations marked `x-implemented: true` are filtered into `specs/api/openapi-implemented.yaml`, which is the strict generated surface for SDKs and other implementation-bound tooling.
