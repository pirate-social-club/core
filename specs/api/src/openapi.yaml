openapi: 3.0.3
info:
  title: Pirate API
  version: 0.1.0
  description: |
    First-pass happy-path API for Pirate v2.
    This OpenAPI file is intentionally narrow. It encodes the core v0 flows that are already stable in the domain specs: auth bootstrap, verification, onboarding, global profile identity, guilds, namespace handles, posts, daily questions, tracks, scrobbles, feeds, and async jobs.
servers:
  - url: https://api.pirate.example
    description: Placeholder production server
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Verification
  - name: Onboarding
  - name: Users
  - name: Profiles
  - name: Guilds
  - name: Handles
  - name: Posts
  - name: Livestreams
  - name: Questions
  - name: Feeds
  - name: Tracks
  - name: Scrobbles
  - name: MPP
  - name: Jobs
