services:
  powerdns:
    image: powerdns/pdns-auth-50
    container_name: pirate-hns-authdns
    restart: unless-stopped
    ports:
      - "173.199.93.117:53:53/udp"
      - "173.199.93.117:53:53/tcp"
      - "127.0.0.1:8081:8081/tcp"
    entrypoint: ["/bin/sh", "-lc", "umask 0002 && exec /usr/local/sbin/pdns_server-startup"]
    volumes:
      - ./config/pdns.conf:/etc/pdns/pdns.conf:ro
      - ./data:/var/lib/powerdns
