services:
  coredns:
    image: coredns/coredns:1.12.1
    container_name: pirate-hns-authdns
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    ports:
      - "173.199.93.117:53:53/udp"
      - "173.199.93.117:53:53/tcp"
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
      - ./zones:/zones:ro
